// Channel Modal (create / edit)
// ═══════════════════════════════════════════════
const CH_COLORS = [
  'var(--accent-green)', 'var(--accent-blue)', 'var(--accent-amber)',
  'var(--accent-purple)', 'var(--accent-cyan)', 'var(--accent-red)',
  '#22c55e', '#60a5fa'
];

function ChannelModal({ existing, takenNums, onSave, onClose }) {
  const editMode = existing != null;
  const firstAvailable = editMode ? null : ([1,2,3,4,5,6,7].find(n => !takenNums.includes(n)) ?? null);
  const [mode, setMode] = useState('create');
  const [num, setNum] = useState(editMode ? existing.channel_num : firstAvailable);
  const [name, setName] = useState(editMode ? existing.name : '');
  const [psk, setPsk] = useState('');
  const [error, setError] = useState('');
  const [saving, setSaving] = useState(false);
  const [shareData, setShareData] = useState(null);
  const [copyState, setCopyState] = useState('');
  const isPrimary = !!existing?.is_primary || num === 0;
  const workflow = editMode ? 'edit' : mode;
  const isJoinMode = workflow === 'join';
  const title = editMode ? 'Edit Channel' : (isJoinMode ? 'Join Channel' : 'Create Channel');

  const save = async () => {
    if (num === null) { setError('Please select a channel slot.'); return; }
    if (!isJoinMode && !name.trim()) { setError('Please enter a channel name.'); return; }
    if (isJoinMode && !psk.trim()) {
      setError('Paste an invite link, or enter the channel name and key manually.');
      return;
    }
    if (isJoinMode && psk.trim() && !psk.trim().includes('/#') && !psk.trim().includes('/?add=true#') && !name.trim()) {
      setError('Enter the channel name when joining with a manual key.');
      return;
    }
    setSaving(true);
    try {
      const result = editMode
        ? await api.put(`/api/channels/${num}`, { name: name.trim(), psk: psk.trim() || undefined })
        : await api.post('/api/channels', { channel_num: num, name: name.trim(), psk: psk.trim() || undefined });
      if (result && result.error) { setError(result.error); return; }
      onSave(result?.channels);
      if (!editMode && !isJoinMode) {
        try {
          const share = await api.get(`/api/channels/${num}/share`);
          setShareData(share);
        } catch (_) {
          setShareData({ share_url: '', qr_base64: null, unavailable: true });
        }
        return;
      }
      onClose();
    } catch(e) {
      setError(e?.message || 'Failed to save channel. Please try again.');
    } finally {
      setSaving(false);
    }
  };

  const copyShare = async () => {
    if (!shareData?.share_url) return;
    try {
      await navigator.clipboard.writeText(shareData.share_url);
      setCopyState('Copied');
      setTimeout(() => setCopyState(''), 1200);
    } catch (_) {
      setCopyState('Copy failed');
      setTimeout(() => setCopyState(''), 1600);
    }
  };

  if (shareData) {
    return (
      <div className="rename-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
        <div className="rename-modal" style={{width:400}}>
          <h3>Channel Ready</h3>
          <p style={{marginBottom:12}}>
            Atlas created <span style={{color:'var(--text-primary)',fontWeight:700}}>{name.trim()}</span> on channel {num}. Share this invite with the other nodes you want to add.
          </p>
          <div className="channel-help-card">
            {shareData?.qr_base64 && (
              <div style={{textAlign:'center',marginBottom:12}}>
                <img
                  src={`data:image/png;base64,${shareData.qr_base64}`}
                  alt="Meshtastic channel invite QR"
                  style={{width:'100%',maxWidth:240,borderRadius:8,background:'white',padding:8}}
                />
              </div>
            )}
            {!shareData?.unavailable ? (
              <>
                <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.05em'}}>Invite link</div>
                <textarea
                  readOnly
                  value={shareData?.share_url || ''}
                  style={{width:'100%',minHeight:84,resize:'vertical',fontSize:12,fontFamily:'var(--font-mono)'}}
                />
              </>
            ) : (
              <div style={{fontSize:12,color:'var(--accent-amber)',lineHeight:1.5}}>
                The channel was created, but Atlas could not load the invite QR or link right now. Open the channel and use <span style={{color:'var(--text-primary)'}}>Invite Nodes</span> to try again.
              </div>
            )}
            <div className="channel-helper-steps">
              <div>1. Open the Meshtastic app on the other node.</div>
              <div>2. Scan this QR code or paste the invite link.</div>
              <div>3. The node joins <span style={{color:'var(--text-primary)'}}>{name.trim()}</span> with the correct key.</div>
            </div>
          </div>
          <div className="rename-modal-actions">
            <button className="btn btn-sm" onClick={onClose}>Done</button>
            <button className="btn btn-sm btn-primary" onClick={copyShare} disabled={!shareData?.share_url}>
              {copyState || 'Copy Invite Link'}
            </button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="rename-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="rename-modal" style={{width:400}}>
        <h3>{title}</h3>
        <p style={{marginBottom:12}}>
          {editMode
            ? `Update channel ${num}.`
            : isJoinMode
              ? 'Join with either an invite link or the channel name and key.'
              : 'Create a new shared channel, then invite the other nodes from the next step.'}
        </p>

        {!editMode && (
          <div className="channel-mode-row">
            <button className={`channel-mode-btn ${mode === 'create' ? 'active' : ''}`} onClick={() => { setMode('create'); setError(''); }}>
              <div className="channel-mode-title">Create new</div>
              <div className="channel-mode-copy">Make a fresh channel and invite other nodes after saving.</div>
            </button>
            <button className={`channel-mode-btn ${mode === 'join' ? 'active' : ''}`} onClick={() => { setMode('join'); setError(''); }}>
              <div className="channel-mode-title">Join existing</div>
              <div className="channel-mode-copy">Paste an invite link, or type the channel name and key if you only have those.</div>
            </button>
          </div>
        )}

        {!editMode && (
          <>
            <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.05em'}}>Channel slot</div>
            <div className="channel-num-selector">
              {[1,2,3,4,5,6,7].map(n => (
                <button key={n}
                  className={`channel-num-btn ${num === n ? 'selected' : ''}`}
                  disabled={takenNums.includes(n)}
                  onClick={() => setNum(n)}
                  title={takenNums.includes(n) ? 'Already configured' : `Channel ${n}`}
                >
                  {takenNums.includes(n) ? '✓' : n}
                </button>
              ))}
            </div>
          </>
        )}

        <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.05em'}}>
          {isJoinMode ? 'Channel name' : 'Channel name'}
        </div>
        <input
          value={name}
          onChange={e => { setName(e.target.value); setError(''); }}
          placeholder={isJoinMode ? 'Needed for manual key entry. Optional if you paste an invite link.' : 'e.g. Team Alpha, Ops, Base Camp...'}
          onKeyDown={e => { if (e.key === 'Enter') save(); if (e.key === 'Escape') onClose(); }}
          autoFocus
        />
        <div style={{fontSize:11,color:'var(--text-muted)',margin:'10px 0 6px',textTransform:'uppercase',letterSpacing:'0.05em'}}>
          {isJoinMode ? 'Invite link or channel key' : 'Channel key or invite link'}
        </div>
        <input
          value={psk}
          onChange={e => { setPsk(e.target.value); setError(''); }}
          placeholder={
            editMode
              ? 'Leave blank to keep current key, or paste a Meshtastic invite link'
              : isJoinMode
                ? 'Paste the invite link, or enter default / random / simple0 / 0x... / base64'
                : 'Optional: leave blank for a secure random key, or paste an invite link'
          }
          onKeyDown={e => { if (e.key === 'Enter') save(); if (e.key === 'Escape') onClose(); }}
        />
        <div className="channel-help-card" style={{marginTop:8}}>
          <div style={{fontSize:12,color:'var(--text-muted)',lineHeight:1.5}}>
            {isPrimary
              ? 'This is the primary channel. Changing its key changes the radio’s main mesh channel.'
              : isJoinMode
                ? 'If you have an invite link, paste it and Atlas will import the name and key. If the Meshtastic app does not give you a link, enter the same channel name and key used on the other node.'
                : 'Leave the key blank and Atlas will generate a secure random key for this new channel. After saving, you will get a QR code and invite link to add other nodes.'}
          </div>
        </div>
        {existing?.psk_state && (
          <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:8}}>
            Current key state: <span style={{color:'var(--text-secondary)'}}>{existing.psk_state}</span>
          </div>
        )}
        {error && <div style={{color:'var(--accent-red)',fontSize:12,marginBottom:8}}>{error}</div>}
        <div className="rename-modal-actions">
          <button className="btn btn-sm" onClick={onClose}>Cancel</button>
          <button className="btn btn-sm btn-primary" onClick={save}>
            {saving ? 'Saving…' : editMode ? 'Save Changes' : isJoinMode ? 'Join Channel' : 'Create Channel'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════
// Messages Page
// ═══════════════════════════════════════════════
function MessagesPage({ messages, nodes, device, refresh }) {
  const [selection, setSelection] = useState({ type: 'channel', num: 0 });
  const [text, setText] = useState('');
  const [channels, setChannels] = useState([]);
  const [dmDiagnostics, setDmDiagnostics] = useState(null);
  const [contactsOpen, setContactsOpen] = useState(() => !isAtlasMobileClient());
  const [renameTarget, setRenameTarget] = useState(null);       // node for contact rename
  const [channelModal, setChannelModal] = useState(null);       // null | 'new' | channel obj
  const [channelShare, setChannelShare] = useState(null);       // null | channel obj
  const [aliases, setAliases] = useState({});
  const [sendError, setSendError] = useState(null);
  const [sendStatus, setSendStatus] = useState(null);
  const [sending, setSending] = useState(false);
  const [dmLastRead, setDmLastRead] = useState(() => {
    try {
      const stored = localStorage.getItem('dmLastRead');
      const parsed = stored ? JSON.parse(stored) : {};
      return parsed && typeof parsed === 'object' ? parsed : {};
    } catch {
      return {};
    }
  });
  const [channelLastRead, setChannelLastRead] = useState(() => {
    try {
      const stored = localStorage.getItem('channelLastRead');
      const parsed = stored ? JSON.parse(stored) : {};
      return parsed && typeof parsed === 'object' ? parsed : {};
    } catch {
      return {};
    }
  });
  const chatEndRef = useRef(null);
  const myNodeId = device && device.my_node_id ? String(device.my_node_id) : null;

  const loadChannels = useCallback(async (nextChannels=null) => {
    if (Array.isArray(nextChannels)) {
      setChannels(nextChannels);
      return nextChannels;
    }
    const loaded = await api.get('/api/channels');
    setChannels(loaded);
    return loaded;
  }, []);

  useEffect(() => { loadChannels(); }, [loadChannels]);

  // Merge aliases from nodes into the aliases state.  Use a merge (not replace)
  // so a locally-set alias survives until the node_update socket event arrives.
  useEffect(() => {
    setAliases(prev => {
      const next = { ...prev };
      let changed = false;
      nodes.forEach(n => {
        if (n.alias && next[n.node_id] !== n.alias) {
          next[n.node_id] = n.alias;
          changed = true;
        } else if (!n.alias && n.node_id in next && n.alias === null) {
          // alias explicitly cleared in DB (null, not just absent from partial update)
          delete next[n.node_id];
          changed = true;
        }
      });
      return changed ? next : prev;
    });
  }, [nodes]);

  const resolveName = useCallback((id) => {
    if (!id) return '?';
    if (aliases[id]) return aliases[id];
    const n = nodes.find(x => x.node_id === id);
    return n ? (n.long_name || n.short_name || id) : id;
  }, [nodes, aliases]);

  const channelName = useCallback((num) => {
    const ch = channels.find(c => c.channel_num === num);
    return ch ? ch.name : `Channel ${num}`;
  }, [channels]);

  const directNodes = useMemo(() => (
    nodes.filter(n => n.node_id && n.node_id !== 'local_gps' && (!myNodeId || n.node_id !== myNodeId))
  ), [nodes, myNodeId]);

  useEffect(() => {
    try {
      localStorage.setItem('dmLastRead', JSON.stringify(dmLastRead));
    } catch {}
  }, [dmLastRead]);

  useEffect(() => {
    try {
      localStorage.setItem('channelLastRead', JSON.stringify(channelLastRead));
    } catch {}
  }, [channelLastRead]);

  const dmUnreadCounts = useMemo(() => {
    const counts = {};
    for (const m of messages) {
      if (!m.is_direct || !m.from_id || m.from_id === myNodeId) continue;
      const nodeId = m.from_id;
      const lastReadTs = Number(dmLastRead[nodeId] || 0);
      const msgTs = Number(m.rx_time || 0);
      if (msgTs > lastReadTs) counts[nodeId] = (counts[nodeId] || 0) + 1;
    }
    return counts;
  }, [messages, dmLastRead, myNodeId]);

  const channelUnreadCounts = useMemo(() => {
    const counts = {};
    for (const m of messages) {
      if (m.is_direct || !m.from_id || m.from_id === myNodeId) continue;
      const ch = m.channel || 0;
      const lastReadTs = Number(channelLastRead[ch] || 0);
      const msgTs = Number(m.rx_time || 0);
      if (msgTs > lastReadTs) counts[ch] = (counts[ch] || 0) + 1;
    }
    return counts;
  }, [messages, channelLastRead, myNodeId]);

  // Filter messages for current selection
  const conversation = useMemo(() => {
    if (selection.type === 'node') {
      return [...messages.filter(m => {
        if (!m.is_direct) return false;
        return m.from_id === selection.nodeId || m.to_id === selection.nodeId;
      })].reverse();
    }
    return [...messages.filter(m => (m.channel || 0) === selection.num && m.to_id === '^all')].reverse();
  }, [messages, selection]);

  useEffect(() => {
    if (chatEndRef.current) chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
  }, [conversation.length, selection]);

  useEffect(() => {
    if (!sendStatus) return undefined;
    const timer = setTimeout(() => setSendStatus(null), 4000);
    return () => clearTimeout(timer);
  }, [sendStatus]);

  useEffect(() => {
    if (selection.type !== 'node' || !selection.nodeId) return;
    const latestIncomingTs = conversation.reduce((latest, m) => {
      if (m.is_direct && m.from_id === selection.nodeId) return Math.max(latest, Number(m.rx_time || 0));
      return latest;
    }, 0);
    if (!latestIncomingTs) return;
    setDmLastRead(prev => {
      if (Number(prev[selection.nodeId] || 0) >= latestIncomingTs) return prev;
      return { ...prev, [selection.nodeId]: latestIncomingTs };
    });
  }, [selection, conversation]);

  useEffect(() => {
    if (selection.type !== 'channel') return;
    const ch = selection.num;
    const latestIncomingTs = conversation.reduce((latest, m) => {
      if (!m.is_direct && (m.channel || 0) === ch && m.from_id !== myNodeId)
        return Math.max(latest, Number(m.rx_time || 0));
      return latest;
    }, 0);
    if (!latestIncomingTs) return;
    setChannelLastRead(prev => {
      if (Number(prev[ch] || 0) >= latestIncomingTs) return prev;
      return { ...prev, [ch]: latestIncomingTs };
    });
  }, [selection, conversation]);

  useEffect(() => {
    let cancelled = false;
    if (selection.type !== 'node' || !selection.nodeId) {
      setDmDiagnostics(null);
      return;
    }
    api.get(`/api/nodes/${encodeURIComponent(selection.nodeId)}/dm-diagnostics`)
      .then(data => {
        if (!cancelled) setDmDiagnostics(data && !data.error ? data : null);
      })
      .catch(() => {
        if (!cancelled) setDmDiagnostics(null);
      });
    return () => { cancelled = true; };
  }, [selection, messages, nodes]);

  const send = async () => {
    if (!text.trim()) return;
    setSending(true);
    setSendError(null);
    setSendStatus(null);
    const payload = selection.type === 'node'
      ? { text: text.trim(), destination: selection.nodeId, channel: 0 }
      : { text: text.trim(), destination: null, channel: selection.num };
    try {
      const res = await api.post('/api/messages/send', payload);
      setText('');
      const targetLabel = selection.type === 'node'
        ? (selNodeObj ? resolveName(selNodeObj.node_id) : selection.nodeId)
        : channelName(selection.num);
      setSendStatus({
        kind: 'success',
        text: selection.type === 'node'
          ? `Message sent to ${targetLabel}.`
          : `Message sent on ${targetLabel}.`,
      });
      refresh();
    } catch (err) {
      const message = err?.message || 'Message send failed';
      setSendError(message);
      setSendStatus({
        kind: 'error',
        text: `Send failed: ${message}`,
      });
    } finally {
      setSending(false);
    }
  };

  const deleteChannel = async (num) => {
    if (num === 0) return;
    await fetch(`/api/channels/${num}`, { method: 'DELETE' });
    loadChannels();
    if (selection.type === 'channel' && selection.num === num) {
      setSelection({ type: 'channel', num: 0 });
    }
  };

  const handleAliasUpdate = (nodeId, alias) => {
    setAliases(prev => { const next = { ...prev }; if (alias) next[nodeId] = alias; else delete next[nodeId]; return next; });
  };

  const selChannelObj = channels.find(c => c.channel_num === selection.num) || null;
  const selNodeObj = selection.type === 'node'
    ? directNodes.find(n => n.node_id === selection.nodeId) || null
    : null;

  const PencilIcon = () => (
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
      <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
      <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
    </svg>
  );

  return (
    <div className="page messages-page-wrap">

      {/* Modals */}
      {renameTarget && (
        <RenameModal node={renameTarget} currentAlias={aliases[renameTarget.node_id]}
          onSave={handleAliasUpdate} onClose={() => setRenameTarget(null)} />
      )}
      {channelModal !== null && (
        <ChannelModal
          existing={channelModal === 'new' ? null : channelModal}
          takenNums={channelModal === 'new' ? channels.map(c => c.channel_num) : []}
          onSave={loadChannels}
          onClose={() => setChannelModal(null)}
        />
      )}
      {channelShare && (
        <ChannelShareModal
          channel={channelShare}
          onClose={() => setChannelShare(null)}
        />
      )}

      <div className="messages-layout">
        {/* ── Left panel ── */}
        <div className="contacts-panel">

          {/* Mobile collapse toggle */}
          <div className={`contacts-panel-toggle ${contactsOpen ? 'open' : ''}`}
            onClick={() => setContactsOpen(o => !o)}>
            <span className="contacts-panel-toggle-label">Channels &amp; Messages</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="6 9 12 15 18 9"/></svg>
          </div>

          <div className={`contacts-panel-body ${contactsOpen ? '' : 'closed'}`}>
          {/* Channels section */}
          <div className="contacts-section-label">
            <span>Channels</span>
            <button className="contacts-add-btn" title="Create or join a channel" onClick={() => setChannelModal('new')}>+</button>
          </div>
          <div style={{
            margin:'0 12px 10px',
            padding:'10px 12px',
            border:'1px solid rgba(255,255,255,0.06)',
            borderRadius:14,
            background:'linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01))'
          }}>
            <div style={{fontSize:12,color:'var(--text-primary)',fontWeight:600,marginBottom:4}}>Need another shared channel?</div>
            <div style={{fontSize:11,color:'var(--text-muted)',lineHeight:1.45}}>
              Use <span style={{color:'var(--text-primary)'}}>+</span> to create a new channel for your group or paste an invite link to join one from another node.
            </div>

                <div>Preferred fallback channel: <span style={{color:'var(--text-primary)'}}>{dmDiagnostics.preferred_channel ?? 0}</span></div>
                <div>Usable local channels: <span style={{color:'var(--text-primary)'}}>{(dmDiagnostics.configured_channels || []).length ? dmDiagnostics.configured_channels.join(', ') : 'none'}</span></div>

                  <div>Last broadcast seen from peer: <span style={{color:'var(--text-primary)'}}>channel {dmDiagnostics.last_broadcast_channel}</span>{dmDiagnostics.last_broadcast_rx_time ? ` at ${fmtTime(dmDiagnostics.last_broadcast_rx_time)}` : ''}</div>

                {dmDiagnostics.recent_send && (
                  <div>
                    Last Atlas send: <span style={{color:'var(--text-primary)'}}>{dmDiagnostics.recent_send.status}</span>
                    {dmDiagnostics.recent_send.transport ? ` via ${dmDiagnostics.recent_send.transport}` : ''}
                    {dmDiagnostics.recent_send.channel != null ? ` on channel ${dmDiagnostics.recent_send.channel}` : ''}
                    {dmDiagnostics.recent_send.updated_at ? ` at ${fmtTime(dmDiagnostics.recent_send.updated_at)}` : ''}
                  </div>
                )}
                {dmDiagnostics.recent_send && dmDiagnostics.recent_send.error && (
                  <div style={{color:'var(--accent-red)'}}>Last error: {dmDiagnostics.recent_send.error}</div>
                )}
              </div>
            </div>
          )}

          <div className="chat-messages">
            {conversation.length === 0 && (
              <div className="empty-state">
                {selection.type === 'node'
                  ? `No direct messages yet with ${selNodeObj ? resolveName(selNodeObj.node_id) : selection.nodeId}`
                  : `No messages yet in ${channelName(selection.num)}`}
              </div>
            )}
            {conversation.map((m, i) => {
              const isMine = myNodeId && m.from_id === myNodeId;
              const metaLabel = selection.type === 'node'
                ? (m.raw_json && m.raw_json.includes('"transport": "pki"') ? 'PKC DM' : 'Direct')
                : null;
              return (
                <div key={i} className={`chat-bubble-row ${isMine ? 'mine' : 'theirs'}`}>
                  <div className="chat-bubble-stack">
                    {!isMine && (
                      <div style={{fontSize:11,color:'var(--accent-cyan)',fontFamily:'var(--font-mono)',marginBottom:3,marginLeft:2}}>
                        {resolveName(m.from_id)}
                      </div>
                    )}
                    <div className="chat-bubble">{m.text}</div>
                    <div className="chat-bubble-meta">
                      <span>{fmtTime(m.rx_time)}</span>
                      {metaLabel && <span>{metaLabel}</span>}
                      {m.rx_snr != null && <span>SNR {m.rx_snr.toFixed(1)}</span>}
                      {m.hop_limit != null && m.hop_start != null && <span>{m.hop_start - m.hop_limit}/{m.hop_start} hops</span>}
                    </div>
                  </div>
                </div>
              );
            })}
            <div ref={chatEndRef}/>
          </div>

          <div className="chat-input-area">
            <input
              value={text} onChange={e => setText(e.target.value)}
              placeholder={selection.type === 'node'
                ? `Direct message ${selNodeObj ? resolveName(selNodeObj.node_id) : selection.nodeId}...`
                : `Message ${channelName(selection.num)}...`}
              onKeyDown={e => e.key === 'Enter' && send()}
            />
            <button className="btn btn-primary" onClick={send} disabled={sending}>{Icons.send}</button>
          </div>
          {sendStatus && (
            <div style={{
              padding:'0 14px 8px',
              fontSize:12,
              color: sendStatus.kind === 'success' ? 'var(--accent-green)' : 'var(--accent-red)'
            }}>
              {sendStatus.text}
            </div>
          )}
          {sendError && (
            <div style={{padding:'0 14px 12px', fontSize:12, color:'var(--accent-red)'}}>
              {sendError}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function haversineKm(lat1, lon1, lat2, lon2) {
  if (lat1 == null || lon1 == null || lat2 == null || lon2 == null) return null;
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// Minimum distance (km) from point to a GeoJSON LineString geometry.
// Uses flat-earth projection — accurate for short distances (<1 km).
function distToRouteKm(pLat, pLon, geometry) {
  if (!geometry || !geometry.coordinates || geometry.coordinates.length < 2) return null;
  const R = 6371;
  const cosLat = Math.cos(pLat * Math.PI / 180);
  let minD2 = Infinity;
  const coords = geometry.coordinates;
  for (let i = 0; i < coords.length - 1; i++) {
    const [aLon, aLat] = coords[i];
    const [bLon, bLat] = coords[i + 1];
    // Flat-earth vectors in km, with point A as origin
    const ax = (pLon - aLon) * Math.PI / 180 * cosLat * R;
    const ay = (pLat - aLat) * Math.PI / 180 * R;
    const bx = (bLon - aLon) * Math.PI / 180 * cosLat * R;
    const by = (bLat - aLat) * Math.PI / 180 * R;
    const segLen2 = bx * bx + by * by;
    let d2;
    if (segLen2 === 0) {
      d2 = ax * ax + ay * ay;
    } else {
      const t = Math.max(0, Math.min(1, (ax * bx + ay * by) / segLen2));
      const px = ax - t * bx;
      const py = ay - t * by;
      d2 = px * px + py * py;
    }
    if (d2 < minD2) minD2 = d2;
  }
  return minD2 === Infinity ? null : Math.sqrt(minD2);
}

function fmtDist(km, units) {
  if (km == null) return '—';
  if (units === 'imperial') {
    const miles = km * 0.621371;
    if (miles < 0.1) return `${Math.round(miles * 5280)}ft`;
    return `${miles.toFixed(2)}mi`;
  }
  if (km < 1) return `${Math.round(km * 1000)}m`;
  return `${km.toFixed(2)}km`;
}

function NodesPage({ nodes, device }) {
  const { units, date_format, show_offline_nodes, node_online_window_h, timezone } = useSettings();
  const [selectedId, setSelectedId] = useState(null);
  const [telemetry, setTelemetry] = useState([]);
  const canvasRef = useRef(null);
  const myNodeId = device && device.my_node_id ? device.my_node_id : null;
  const myNode = myNodeId ? nodes.find(n => n.node_id === myNodeId) : null;
  // Always derive selected from live nodes so name/alias updates reflect immediately
  const selected = selectedId ? (nodes.find(n => n.node_id === selectedId) || null) : null;
  const distTo = (n) => myNode && n.node_id !== myNodeId
    ? haversineKm(myNode.latitude, myNode.longitude, n.latitude, n.longitude)
    : null;
  const visibleNodes = show_offline_nodes === 'false'
    ? nodes.filter(n => nodeOnline(n, myNodeId, device && device.connected, node_online_window_h))
    : nodes;

  useEffect(() => {
    if (selected) {
      api.get(`/api/telemetry?node_id=${selected.node_id}&hours=24`).then(setTelemetry);
    }
  }, [selected]);

  useEffect(() => {
    if (!selected || !telemetry.length || !canvasRef.current) return;
    drawChart(canvasRef.current, telemetry);
  }, [telemetry, selected]);

  return (
    <div className="page">
      {!selected ? (
        <div className="card">
          <div className="card-header">
            <div className="card-title">All Nodes ({visibleNodes.length})</div>
          </div>
          <div className="table-wrap">
            <table>
              <thead><tr><th>Node</th><th className="nodes-col-hw">Hardware</th><th>Role</th><th>Signal</th><th>Battery</th><th className="nodes-col-chutil">Ch Util</th><th className="nodes-col-dist">Distance</th><th>Last Heard</th><th>Health</th></tr></thead>
              <tbody>
                {visibleNodes.map(n => {
                  const sq = signalQuality(n.snr, n.rssi);
                  const online = nodeOnline(n, myNodeId, device && device.connected, node_online_window_h);
                  return (
                    <tr key={n.node_id} onClick={() => setSelectedId(n.node_id)} style={{cursor:'pointer'}}>
                      <td>
                        <span style={{display:'inline-block',width:8,height:8,borderRadius:'50%',background:online?'var(--accent-green)':'var(--accent-red)',marginRight:8}}/>
                        <span style={{color:'var(--text-primary)',fontWeight:500}}>{n.alias||n.long_name}</span>
                        <br/><span className="mono" style={{fontSize:11,color:'var(--text-muted)'}}>{n.node_id}</span>
                      </td>
                      <td className="nodes-col-hw mono" style={{fontSize:12}}>{n.hw_model}</td>
                      <td><span className="tag tag-purple">{n.role || '—'}</span></td>
                      <td><span className={`tag ${sq.cls}`}>{n.snr != null ? `${n.snr.toFixed(1)} dB` : '—'}</span></td>
                      <td>
                        {n.battery_level != null ? (
                          <div>
                            <span style={{color:batColor(n.battery_level),fontFamily:'var(--font-mono)',fontSize:13}}>{n.battery_level}%</span>
                            <div className="battery-bar"><div className="battery-fill" style={{width:`${n.battery_level}%`,background:batColor(n.battery_level)}}/></div>
                          </div>
                        ) : '—'}
                      </td>
                      <td className="nodes-col-chutil mono" style={{fontSize:12}}>{n.channel_util != null ? `${n.channel_util.toFixed(1)}%` : '—'}</td>
                      <td className="nodes-col-dist mono" style={{fontSize:12}}>{fmtDist(distTo(n), units)}</td>
                      <td className="mono" style={{fontSize:12}}>{fmtTimestamp(n.last_heard, date_format, timezone)}</td>
                      <td><HealthBadge node={n}/></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      ) : (
        <div>
          <button className="btn" onClick={() => setSelectedId(null)} style={{marginBottom:16}}>← Back to Nodes</button>
          <div className="card" style={{marginBottom:16}}>
            <div className="card-header">
              <div>
                <h2 style={{fontSize:20,fontWeight:700,marginBottom:4}}>{selected.alias || selected.long_name}</h2>
                <span className="mono" style={{color:'var(--text-muted)',fontSize:13}}>{selected.node_id} · {selected.hw_model} · {selected.role}</span>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <HealthBadge node={selected} size="large"/>
                <span className={`tag ${nodeOnline(selected, myNodeId, device && device.connected, node_online_window_h) ? 'tag-green' : 'tag-red'}`}>
                  {nodeOnline(selected, myNodeId, device && device.connected, node_online_window_h) ? 'ONLINE' : 'OFFLINE'}

              </div>
            </div>
            <div className="node-grid">
              <div className="node-metric">
                <div className="node-metric-label">Battery</div>
                <div className="node-metric-value" style={{color:batColor(selected.battery_level)}}>{selected.battery_level != null ? `${selected.battery_level}%` : '—'}</div>
              </div>
              <div className="node-metric">
                <div className="node-metric-label">Voltage</div>
                <div className="node-metric-value">{selected.voltage != null ? `${selected.voltage}V` : '—'}</div>
              </div>
              <div className="node-metric">
                <div className="node-metric-label">SNR</div>
                <div className="node-metric-value" style={{color:snrColor(selected.snr)}}>{selected.snr != null ? `${selected.snr.toFixed(1)} dB` : '—'}</div>

              </div>

              </div>
              <div className="node-metric">
                <div className="node-metric-label">Air Util TX</div>

              </div>

                <div className="node-metric-label">Uptime</div>
                <div className="node-metric-value">{selected.uptime ? `${Math.floor(selected.uptime/3600)}h` : '—'}</div>
              </div>
              <div className="node-metric">
                <div className="node-metric-label">Position</div>
                <div className="node-metric-value" style={{fontSize:14}}>{selected.latitude && selected.longitude ? `${selected.latitude.toFixed(4)}, ${selected.longitude.toFixed(4)}` : '—'}</div>

                <div className="node-metric-label">Distance</div>
                <div className="node-metric-value">{fmtDist(distTo(selected), units)}</div>
              </div>
            </div>
          </div>
          {telemetry.length > 0 && (
            <div className="card">
              <div className="card-title" style={{marginBottom:12}}>Telemetry (24h)</div>
              <div className="chart-container">
                <canvas ref={canvasRef}/>

  );
}

function TopologyPage({ nodes }) {
  const canvasRef = useRef(null);
  const [topo,    setTopo]    = useState({ nodes: [], links: [] });
  const [visible, setVisible] = useState(false);  // off by default — load on demand
  const [loading, setLoading] = useState(false);

  const loadTopology = () => {
    setLoading(true);
    api.get('/api/topology').then(d => { setTopo(d); setVisible(true); setLoading(false); });
  };

  const refresh = () => {
    setLoading(true);
    api.get('/api/topology').then(d => { setTopo(d); setLoading(false); });
  };

  // Merge fresh names from the polled `nodes` prop into topo nodes so name
  // changes are reflected without a manual Refresh.
  const mergedTopo = useMemo(() => {
    if (!nodes || !nodes.length) return topo;
    const nameMap = {};
    nodes.forEach(n => { nameMap[n.node_id] = { long_name: n.alias || n.long_name, short_name: n.short_name }; });
    return {
      ...topo,
      nodes: topo.nodes.map(n => ({ ...n, ...(nameMap[n.node_id] || {}) })),
    };
  }, [topo, nodes]);

  useEffect(() => {
    if (!visible || !canvasRef.current || !mergedTopo.nodes.length) return;
    const raf = requestAnimationFrame(() => {
      if (canvasRef.current) drawTopology(canvasRef.current, mergedTopo);
    });
    return () => cancelAnimationFrame(raf);
  }, [mergedTopo, visible]);

  return (
    <div className="page">
      <div className="card">
        <div className="card-header">
          <div className="card-title">Mesh Topology</div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            {visible ? (
              <>
                <button className="btn btn-sm" onClick={refresh} disabled={loading}>
                  {loading ? 'Loading…' : 'Refresh'}
                </button>
                <button className="btn btn-sm" onClick={() => setVisible(false)}>Hide</button>
              </>
            ) : (
              <button className="btn btn-sm btn-primary" onClick={loadTopology} disabled={loading}>
                {loading ? 'Loading…' : 'Load Topology'}
              </button>
            )}
          </div>
        </div>
        {!visible && (
          <div style={{padding:'40px 0',textAlign:'center',color:'var(--text-muted)',fontSize:13}}>
            Topology rendering is off. Click <b>Load Topology</b> to fetch and display the current mesh graph.
          </div>
        )}
        {visible && (
          <div className="topo-container">
            <canvas ref={canvasRef} />
          </div>
        )}
        {visible && mergedTopo.links.length > 0 && (
          <div style={{marginTop:16}}>
            <div className="card-title" style={{marginBottom:8}}>Links</div>
            <div className="table-wrap">
              <table>
                <thead><tr><th>From</th><th>To</th><th>SNR</th><th>RSSI</th></tr></thead>
                <tbody>
                  {mergedTopo.links.map((l, i) => {
                    const fromNode = mergedTopo.nodes.find(n => n.node_id === l.from_id);
                    const toNode = mergedTopo.nodes.find(n => n.node_id === l.to_id);
                    return (
                      <tr key={i}>
                        <td className="mono" style={{fontSize:12}}>{fromNode ? (fromNode.alias || fromNode.long_name) : l.from_id}</td>
                        <td className="mono" style={{fontSize:12}}>{toNode ? (toNode.alias || toNode.long_name) : l.to_id}</td>
                        <td style={{color:snrColor(l.snr)}}>{l.snr != null ? `${l.snr.toFixed(1)} dB` : '—'}</td>
                        <td className="mono">{l.rssi != null ? `${l.rssi} dBm` : '—'}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// Register pmtiles:// protocol handler once for the page lifetime.
let _pmtilesProtocolReady = false;
function ensurePMTilesProtocol() {
  if (_pmtilesProtocolReady) return;
  const proto = new pmtiles.Protocol();
  // Prefer the newer async protocol handler when available, but fall back to
  // the legacy adapter for older MapLibre builds.
  const handler = typeof proto.tilev4 === 'function'
    ? proto.tilev4.bind(proto)
    : proto.tile.bind(proto);
  maplibregl.addProtocol('pmtiles', handler);
  _pmtilesProtocolReady = true;
}

// Build the MapLibre GL style: Protomaps light basemap + amplified trail/NPS layers.

  const theme = protomapsThemes.namedTheme('light');

  const basemapUrl = `pmtiles://${window.location.origin}/tiles/map.pmtiles`;
  const topoUrl = `pmtiles://${window.location.origin}/tiles/topo.pmtiles`;

    version: 8,
    glyphs: '/fonts/{fontstack}/{range}.pbf',

          '<a href="https://maplibre.org" target="_blank">MapLibre</a>',

        filter: ['in', ['get', 'pmap:kind'],
          ['literal', ['national_park', 'nature_reserve', 'protected_area']]],
        paint: { 'fill-color': '#1c3a28', 'fill-opacity': 0.4 },

// Create a configured MapLibre GL map on the given DOM container.
function showMapUnavailable(container, error) {
  const detail = error?.message || error?.statusMessage || String(error || 'Unknown WebGL error');
  container.innerHTML = `
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(180deg,#0b1220,#111827);color:#e5e7eb;">
      <div style="max-width:560px;border:1px solid rgba(148,163,184,0.25);background:rgba(17,24,39,0.92);border-radius:14px;padding:20px 22px;box-shadow:0 12px 36px rgba(0,0,0,0.35)">
        <div style="font-size:18px;font-weight:700;margin-bottom:8px">Map Unavailable</div>
        <div style="font-size:14px;line-height:1.55;color:#cbd5e1;margin-bottom:12px">
          This browser could not create a WebGL context, so Atlas cannot render the map on this device.
        </div>
        <div style="font-size:13px;line-height:1.55;color:#94a3b8;margin-bottom:12px">
          Try enabling hardware acceleration or WebGL in the browser, or open Atlas in a different browser/device.
        </div>
        <div class="mono" style="font-size:11px;line-height:1.45;color:#fca5a5;word-break:break-word">${escHtml(detail)}</div>
      </div>
    </div>`;
}

function makeAtlasMap(container, opts = {}) {
  ensurePMTilesProtocol();
  const mobile = isAtlasMobileClient();
  try {
    return new maplibregl.Map({
      container,
      style: atlasMapStyle(),
      center:   opts.center ?? [-98.35, 39.5],
      zoom:     opts.zoom   ?? 4,
      maxZoom:  19,
      attributionControl: true,
      dragRotate: false,
      touchZoomRotate: true,
      // Cap tile cache on mobile to avoid OOM in Android WebView renderer
      maxTileCacheSize: mobile ? 50 : 512,
      fadeDuration:     mobile ? 0  : 300,
    });
  } catch (err) {
    console.error('[atlas-map] init failed:', err);
    showMapUnavailable(container, err);
    return null;
  }
}

// ════════════════════════════════════════════════════════════════════════════
// Map Page — MapLibre GL
// ════════════════════════════════════════════════════════════════════════════
function MapPage({ nodes, trackerDevices = [], onRemoveTracker, device }) {
  const containerRef = useRef(null);
  const mapRef       = useRef(null);
  const markersRef   = useRef(new Map()); // nodeId  → {marker, popup, el, color}
  const phoneRef     = useRef(new Map()); // devId   → marker
  const fetchedRef   = useRef(new Set());
  const fitDoneRef   = useRef(false);
  const [mapLoaded,  setMapLoaded]  = useState(false);
  const [positions,  setPositions]  = useState({});
  const [showTrails, setShowTrails] = useState(false);
  const [showPhones, setShowPhones] = useState(true);
  const [showTopo,   setShowTopo]   = useState(false);
  const [scanning,   setScanning]   = useState(false);
  const [scanMsg,    setScanMsg]    = useState(null);
  const [showNoGps,  setShowNoGps]  = useState(true);

  // Init map
  useEffect(() => {
    if (!containerRef.current || mapRef.current) return;
    const m = makeAtlasMap(containerRef.current);
    if (!m) return;
    m.on('error', e => console.error('[atlas-map] error:', e.error));
    // Force resize — fire at 0 ms AND 200 ms in case layout isn't settled yet
    m.resize();
    const resizeTimer = setTimeout(() => m.resize(), 200);
    m.on('load', () => {
      m.addSource('node-trails', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
      m.addLayer({
        id: 'node-trails', type: 'line', source: 'node-trails',
        paint: { 'line-color': ['get', 'color'], 'line-width': 3, 'line-opacity': 0.9 },
      });
      setMapLoaded(true);
    });
    mapRef.current = m;
    return () => { clearTimeout(resizeTimer); m.remove(); mapRef.current = null; };
  }, []);

  // Fetch position history once per node (all nodes, not just those with a current fix)
  useEffect(() => {
    nodes.forEach(n => {
      if (fetchedRef.current.has(n.node_id)) return;
      fetchedRef.current.add(n.node_id);
      api.get(`/api/positions?node_id=${n.node_id}`)
         .then(pts => setPositions(prev => ({ ...prev, [n.node_id]: pts })))
         .catch(() => {});
    });
  }, [nodes]);

  // Append live position fixes to trails in real time via the shared socket.
  // Without this, trail polylines are static (loaded once via fetchedRef and never refreshed).
  useEffect(() => {
    const socket = window._atlasSocket;
    if (!socket) return;
    const onPos = data => {
      if (!data || !data.node_id || !data.latitude || !data.longitude) return;
      setPositions(prev => ({
        ...prev,
        [data.node_id]: [data, ...(prev[data.node_id] || [])].slice(0, 500),
      }));
    };
    socket.on('position_update', onPos);
    return () => socket.off('position_update', onPos);
  }, []);

  // Node markers — incremental updates
  useEffect(() => {
    const m = mapRef.current;
    if (!m || !mapLoaded) return;
    const myNodeId   = device?.my_node_id ?? null;
    const validNodes = nodes.filter(n => n.latitude && n.longitude);
    const activeIds  = new Set(validNodes.map(n => n.node_id));

    for (const [id, { marker }] of markersRef.current) {
      if (!activeIds.has(id)) { marker.remove(); markersRef.current.delete(id); }
    }

    // Spread coincident markers using a fixed geographic offset so the markers
    // sit at stable real-world positions and never drift when zooming.
    // Nodes are grouped by coordinate rounded to 4dp (~11 m) and sorted by
    // node_id so the angle assignment is deterministic across re-renders.
    const GEO_SPREAD_M = 120; // radius in metres — ~25 px at zoom 15, ~12 px at zoom 13
    const coordKey = n => `${n.latitude.toFixed(4)},${n.longitude.toFixed(4)}`;
    const groups = {};
    validNodes.forEach(n => { const k = coordKey(n); (groups[k] = groups[k] || []).push(n); });
    // nodeLngLat: node_id → [displayLon, displayLat] (geographic, not pixel)
    const nodeLngLat = {};
    Object.values(groups).forEach(group => {
      if (group.length < 2) return;
      const sorted = [...group].sort((a, b) => a.node_id < b.node_id ? -1 : 1);
      sorted.forEach((n, i) => {
        const angle  = (2 * Math.PI * i / sorted.length) - Math.PI / 2;
        const dy_deg = (GEO_SPREAD_M * Math.sin(angle)) / 110540;           // latitude degrees
        const dx_deg = (GEO_SPREAD_M * Math.cos(angle)) /                   // longitude degrees
                       (111320 * Math.cos(n.latitude * Math.PI / 180) || 1);
        nodeLngLat[n.node_id] = [n.longitude + dx_deg, n.latitude + dy_deg];
      });
    });

    const lnglats = [];
    validNodes.forEach(n => {
      const online = nodeOnline(n, myNodeId, !!(device?.connected));
      const isOwn  = !!(myNodeId && n.node_id === myNodeId);
      const color  = isOwn ? '#f59e0b' : (online ? '#00e5a0' : '#ef4444');
      const displayLngLat = nodeLngLat[n.node_id] || [n.longitude, n.latitude];
      const popupExtra = isOwn
        ? `Lat: ${n.latitude.toFixed(6)}<br>Lon: ${n.longitude.toFixed(6)}${n.altitude != null ? '<br>Alt: ' + n.altitude.toFixed(1) + ' m' : ''}`
        : `Battery: ${n.battery_level != null ? n.battery_level + '%' : '—'}<br>SNR: ${n.snr != null ? n.snr.toFixed(1) + ' dB' : '—'}`;
      const navBtn = isOwn ? '' :
        `<button onclick="window._atlasNavTo&&window._atlasNavTo(${n.latitude},${n.longitude},${JSON.stringify(n.alias||n.long_name||n.node_id).replace(/"/g,'&quot;')})" ` +
        `style="margin-top:10px;padding:6px 0;background:#0ea5e9;color:#fff;border:none;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600;width:100%;letter-spacing:0.3px">` +
        `Navigate Here ›</button>`;
      const displayName = n.alias || n.long_name || n.short_name || n.node_id;
      const onlineColor = online ? '#00e5a0' : '#ef4444';
      const popupHtml = `<div style="font-family:system-ui;font-size:13px;color:#e2e8f0;min-width:170px">` +
        `<div style="font-weight:700;font-size:14px;margin-bottom:3px;color:${color}">${escHtml(displayName)}</div>` +
        `<div style="font-family:monospace;font-size:11px;color:#5a6478;margin-bottom:6px">${escHtml(n.node_id)}</div>` +
        `<div style="font-size:12px;color:#94a3b8">${escHtml(n.hw_model)} · ${escHtml(n.role || 'CLIENT')}</div>` +
        `<div style="font-size:12px;color:#94a3b8;margin-top:3px">${popupExtra}</div>` +
        `<div style="font-size:12px;margin-top:4px;color:${onlineColor}">${online ? '● Online' : '● Offline'} · ${timeAgo(n.last_heard)}</div>` +
        `${navBtn}</div>`;

      const existing = markersRef.current.get(n.node_id);
      if (existing) {
        existing.marker.setLngLat(displayLngLat);
        existing.popup.setHTML(popupHtml);
        if (existing.color !== color) {
          existing.el.style.background = color;
          existing.el.style.boxShadow  = `0 0 ${isOwn ? 10 : 8}px ${color}88`;
          existing.color = color;
        }
      } else {
        const el = document.createElement('div');
        if (isOwn) {
          el.style.cssText = `width:22px;height:22px;background:${color};border:2px solid #0a0e17;border-radius:4px;box-shadow:0 0 10px ${color}88;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;`;
          el.textContent = '⌂';
        } else {
          el.style.cssText = `width:14px;height:14px;background:${color};border:2px solid #0a0e17;border-radius:50%;box-shadow:0 0 8px ${color}88;cursor:pointer;`;
        }
        const popup  = new maplibregl.Popup({ offset: 12, closeOnClick: true }).setHTML(popupHtml);
        const marker = new maplibregl.Marker({ element: el })
          .setLngLat(displayLngLat).setPopup(popup).addTo(m);
        markersRef.current.set(n.node_id, { marker, popup, el, color });
      }
      lnglats.push([n.longitude, n.latitude]); // use true position for fitBounds
    });

    if (lnglats.length > 0 && !fitDoneRef.current) {
      if (lnglats.length === 1) {
        m.flyTo({ center: lnglats[0], zoom: 13 });
      } else {
        const bounds = lnglats.reduce(
          (b, ll) => b.extend(ll),
          new maplibregl.LngLatBounds(lnglats[0], lnglats[0])
        );
        m.fitBounds(bounds, { padding: 60, maxZoom: 15 });
      }
      fitDoneRef.current = true;
    }
  }, [nodes, device, mapLoaded]);

  // GPS trails as GeoJSON source
  useEffect(() => {
    const m = mapRef.current;
    if (!m || !mapLoaded) return;
    const src = m.getSource('node-trails');
    if (!src) return;
    if (!showTrails) { src.setData({ type: 'FeatureCollection', features: [] }); return; }
    const colors   = ['#3b82f6', '#a78bfa', '#f59e0b', '#22d3ee', '#ec4899', '#84cc16'];
    const features = nodes.map((n, i) => {
      const pts = positions[n.node_id];
      if (!pts || pts.length < 2) return null;
      return {
        type: 'Feature',
        geometry: { type: 'LineString',
          coordinates: [...pts].reverse().map(p => [p.longitude, p.latitude]) },
        properties: { color: colors[i % colors.length] },
      };
    }).filter(Boolean);
    src.setData({ type: 'FeatureCollection', features });
  }, [nodes, positions, showTrails, mapLoaded]);

  // Phone tracker markers
  useEffect(() => {
    const m = mapRef.current;
    if (!m) return;
    if (!showPhones) {
      for (const mk of phoneRef.current.values()) mk.remove();
      phoneRef.current.clear();
      return;
    }
    const now       = Math.floor(Date.now() / 1000);
    const activeIds = new Set(trackerDevices.filter(d => d.latitude && d.longitude).map(d => d.id));
    for (const [id, mk] of phoneRef.current) {
      if (!activeIds.has(id)) { mk.remove(); phoneRef.current.delete(id); }
    }
    trackerDevices.forEach(dev => {
      if (!dev.latitude || !dev.longitude) return;
      const age    = now - (dev.last_seen || 0);
      const online = age < 300;
      const color  = dev.color || '#3b82f6';
      const batStr = dev.battery != null ? `${Math.round(dev.battery * 100)}%` : '—';
      const removeBtn = onRemoveTracker
        ? `<br><a href="#" data-tracker-remove="${escHtml(dev.id)}" style="font-size:11px;color:#ef4444;">Remove</a>`
        : '';
      const popupHtml = `<div style="font-family:system-ui;font-size:13px;color:#1a1a1a;min-width:140px"><b>📱 ${escHtml(dev.name)}</b><br><span style="font-size:12px">Battery: ${escHtml(batStr)}<br>Last: ${online ? Math.round(age) + 's ago' : Math.round(age / 60) + 'm ago (offline)'}</span>${removeBtn}</div>`;
      const existing = phoneRef.current.get(dev.id);
      if (existing) {
        existing.setLngLat([dev.longitude, dev.latitude]);
        existing.getPopup().setHTML(popupHtml);
      } else {
        const el = document.createElement('div');
        el.style.cssText = `width:20px;height:20px;background:${color};border:2px solid #0a0e17;border-radius:4px;box-shadow:0 0 10px ${color}88;display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;opacity:${online ? 1 : 0.4};`;
        el.textContent = '📱';
        const mk = new maplibregl.Marker({ element: el })
          .setLngLat([dev.longitude, dev.latitude])
          .setPopup(new maplibregl.Popup({ offset: 12, closeOnClick: true }).setHTML(popupHtml))
          .addTo(m);
        phoneRef.current.set(dev.id, mk);
      }
    });
    // Delegate remove-button clicks via data attribute — avoids inline onclick XSS risk
    if (onRemoveTracker) {
      const m = mapRef.current;
      if (m && !m._trackerRemoveListener) {
        m._trackerRemoveListener = (e) => {
          const a = e.target.closest('a[data-tracker-remove]');
          if (!a) return;
          e.preventDefault();
          onRemoveTracker(a.dataset.trackerRemove);
        };
        m.getContainer().addEventListener('click', m._trackerRemoveListener);
      }
    }
  }, [trackerDevices, showPhones]);

  // Toggle topo overlay visibility
  useEffect(() => {
    const m = mapRef.current;
    if (!m || !mapLoaded) return;
    try {
      m.setLayoutProperty('atlas-topo', 'visibility', showTopo ? 'visible' : 'none');
    } catch (_) {}
  }, [showTopo, mapLoaded]);

  const Toggle = ({ label, value, onChange, color }) => (
    <label style={{ display:'flex', alignItems:'center', gap:6, cursor:'pointer', fontSize:12, color:'var(--text-secondary)' }}>
      <input type="checkbox" checked={value} onChange={e => onChange(e.target.checked)}
        style={{ accentColor: color || 'var(--accent-green)', width:14, height:14 }}/>
      {label}
    </label>
  );

  async function scanMesh() {
    setScanning(true); setScanMsg(null);
    try {
      const res = await api.post('/api/mesh/scan', {});
      setScanMsg(res.ok ? 'Scan sent — nodes will appear as they respond.' : (res.error || 'Scan failed'));
    } catch(e) { setScanMsg('Scan failed: ' + (e.message || 'unknown error')); }
    setScanning(false);
    setTimeout(() => setScanMsg(null), 6000);
  }

  const activePhonesCount = trackerDevices.filter(d => d.latitude && d.longitude &&
    (Math.floor(Date.now() / 1000) - (d.last_seen || 0)) < 300).length;
  const noGpsNodes = nodes.filter(n => !n.latitude || !n.longitude);

  return (
    <div style={{ display:'flex', flexDirection:'column', flex:1, minHeight:0, overflow:'hidden' }}>
      <div style={{ display:'flex', alignItems:'center', gap:16, padding:'10px 20px',
        background:'var(--bg-card)', borderBottom:'1px solid var(--border)', flexShrink:0, flexWrap:'wrap' }}>
        <span style={{ fontSize:13, fontWeight:600, color:'var(--text-secondary)',
          textTransform:'uppercase', letterSpacing:'0.06em' }}>Node Map</span>
        <span className="mono" style={{ fontSize:11, color:'var(--text-muted)' }}>
          {nodes.filter(n => n.latitude && n.longitude).length} nodes with GPS
        </span>
        {noGpsNodes.length > 0 && (
          <button onClick={() => setShowNoGps(v => !v)}
            style={{ background:'none', border:'none', cursor:'pointer', fontSize:11,
              color:'var(--accent-amber)', padding:0, fontFamily:'inherit' }}>
            {noGpsNodes.length} no GPS {showNoGps ? '▲' : '▼'}
          </button>
        )}
        {activePhonesCount > 0 && (
          <span className="mono" style={{ fontSize:11, color:'var(--accent-blue)' }}>
            {activePhonesCount} phone{activePhonesCount !== 1 ? 's' : ''} live
          </span>
        )}
        <div style={{ marginLeft:'auto', display:'flex', gap:16, alignItems:'center', flexWrap:'wrap' }}>
          <Toggle label="Topo"       value={showTopo}   onChange={setShowTopo}   color="#a78bfa"/>
          <Toggle label="GPS Trails" value={showTrails} onChange={setShowTrails} color="#3b82f6"/>
          <Toggle label="Phones"     value={showPhones} onChange={setShowPhones} color="#3b82f6"/>
          <button onClick={scanMesh} disabled={scanning}
            title="Broadcast a NodeInfo + Position request to all mesh nodes, including multi-hop"
            style={{ padding:'4px 12px', borderRadius:'var(--radius)', cursor:'pointer',
              border:'1px solid var(--accent-green)', background:'var(--accent-green-dim)',
              color:'var(--accent-green)', fontFamily:'inherit', fontSize:12, fontWeight:600,
              opacity: scanning ? 0.6 : 1 }}>
            {scanning ? 'Scanning…' : 'Scan Mesh'}
          </button>
        </div>
      </div>

      {scanMsg && (
        <div style={{ padding:'6px 20px', background:'var(--bg-input)', borderBottom:'1px solid var(--border)',
          fontSize:12, color:'var(--text-muted)', flexShrink:0 }}>

      {showNoGps && noGpsNodes.length > 0 && (
        <div style={{ background:'var(--bg-card)', borderBottom:'1px solid var(--border)',

function AlertsPage({ alerts, refresh, setAlerts }) {
  const [filter, setFilter] = useState('all');

  const filtered = alerts.filter(a => {
    if (filter === 'unacked') return !a.acknowledged;
    if (filter === 'critical') return a.severity === 'critical';
    return true;

  const ack = async (id) => {
    await api.post(`/api/alerts/${id}/ack`);
    if (setAlerts) {

// Canvas drawing helpers (no chart library needed)
// ═══════════════════════════════════════════════
function drawChart(canvas, telemetry) {
  const ctx = canvas.getContext('2d');
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * 2;
  canvas.height = rect.height * 2;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  ctx.scale(2, 2);

  const w = rect.width, h = rect.height;
  const pad = { top: 20, right: 20, bottom: 30, left: 50 };
  const cw = w - pad.left - pad.right;
  const ch = h - pad.top - pad.bottom;

  ctx.clearRect(0, 0, w, h);

  const batData = telemetry.filter(t => t.battery_level != null);
  if (!batData.length) return;

  const minT = batData[0].timestamp;
  const maxT = batData[batData.length-1].timestamp;
  const tRange = maxT - minT || 1;

  // Draw grid
  ctx.strokeStyle = '#1f2a40';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (ch / 4) * i;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(w - pad.right, y); ctx.stroke();
  }

  // Battery line
  ctx.strokeStyle = '#00e5a0';
  ctx.lineWidth = 2;
  ctx.beginPath();
  batData.forEach((d, i) => {
    const x = pad.left + ((d.timestamp - minT) / tRange) * cw;
    const y = pad.top + (1 - d.battery_level / 100) * ch;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Fill under
  const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + ch);
  grad.addColorStop(0, 'rgba(0,229,160,0.2)');
  grad.addColorStop(1, 'rgba(0,229,160,0)');
  ctx.fillStyle = grad;
  ctx.lineTo(pad.left + cw, pad.top + ch);
  ctx.lineTo(pad.left, pad.top + ch);
  ctx.closePath();
  ctx.fill();

  // Y labels
  ctx.fillStyle = '#5a6478';
  ctx.font = '11px monospace';
  ctx.textAlign = 'right';
  for (let i = 0; i <= 4; i++) {
    const val = 100 - i * 25;
    const y = pad.top + (ch / 4) * i;
    ctx.fillText(`${val}%`, pad.left - 8, y + 4);
  }

  // X labels
  ctx.textAlign = 'center';
  const steps = Math.min(6, batData.length);
  for (let i = 0; i < steps; i++) {
    const idx = Math.floor(i * (batData.length - 1) / (steps - 1));
    const d = batData[idx];
    const x = pad.left + ((d.timestamp - minT) / tRange) * cw;
    ctx.fillText(new Date(d.timestamp*1000).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}), x, h - 6);
  }
}

function drawSingleChart(canvas, data, key, label, color, minVal, maxVal) {
  const ctx = canvas.getContext('2d');
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * 2;
  canvas.height = rect.height * 2;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  ctx.scale(2, 2);

  const w = rect.width, h = rect.height;
  const pad = { top: 10, right: 10, bottom: 25, left: 40 };
  const cw = w - pad.left - pad.right;
  const ch = h - pad.top - pad.bottom;

  ctx.clearRect(0, 0, w, h);

  const filtered = data.filter(d => d[key] != null);
  if (!filtered.length) return;

  const minT = filtered[0].timestamp;
  const maxT = filtered[filtered.length-1].timestamp;
  const tRange = maxT - minT || 1;
  const vRange = maxVal - minVal || 1;

  // Grid
  ctx.strokeStyle = '#1f2a40';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (ch / 4) * i;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(w - pad.right, y); ctx.stroke();
  }

  // Line
  const cssColor = color.startsWith('var(') ? getComputedStyle(document.documentElement).getPropertyValue(color.slice(4,-1)).trim() : color;
  ctx.strokeStyle = cssColor;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  filtered.forEach((d, i) => {
    const x = pad.left + ((d.timestamp - minT) / tRange) * cw;
    const y = pad.top + (1 - (d[key] - minVal) / vRange) * ch;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Fill
  const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + ch);
  grad.addColorStop(0, cssColor + '33');
  grad.addColorStop(1, cssColor + '00');
  ctx.fillStyle = grad;
  ctx.lineTo(pad.left + ((filtered[filtered.length-1].timestamp - minT) / tRange) * cw, pad.top + ch);
  ctx.lineTo(pad.left, pad.top + ch);
  ctx.closePath();
  ctx.fill();

  // Labels
  ctx.fillStyle = '#5a6478';
  ctx.font = '10px monospace';
  ctx.textAlign = 'right';
  for (let i = 0; i <= 4; i++) {
    const val = maxVal - (i / 4) * vRange;
    ctx.fillText(val.toFixed(key==='voltage'?1:0), pad.left - 5, pad.top + (ch/4)*i + 4);
  }
}

function drawTopology(canvas, topo) {
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * 2;
  canvas.height = rect.height * 2;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(2, 2);
  const w = rect.width, h = rect.height;
  ctx.clearRect(0, 0, w, h);

  const { nodes, links } = topo;
  if (!nodes.length) return;

  // Layout nodes in a circle
  const cx = w / 2, cy = h / 2;
  const radius = Math.min(w, h) * 0.35;
  const positions = {};

  nodes.forEach((n, i) => {
    const angle = (2 * Math.PI * i) / nodes.length - Math.PI / 2;
    positions[n.node_id] = {
      x: cx + radius * Math.cos(angle),
      y: cy + radius * Math.sin(angle),
      node: n
    };
  });

  // Draw links
  links.forEach(l => {
    const from = positions[l.from_id];
    const to = positions[l.to_id];
    if (!from || !to) return;
    const snr = l.snr || 0;
    const alpha = Math.max(0.15, Math.min(1, (snr + 5) / 20));

    ctx.strokeStyle = `rgba(59,130,246,${alpha})`;
    ctx.lineWidth = Math.max(0.5, snr > 0 ? 1.5 : 0.8);
    ctx.beginPath();
    ctx.moveTo(from.x, from.y);
    ctx.lineTo(to.x, to.y);
    ctx.stroke();

    // SNR label at midpoint
    const mx = (from.x + to.x) / 2;
    const my = (from.y + to.y) / 2;
    if (l.snr != null) {
      ctx.font = '10px monospace';
      ctx.fillStyle = '#5a6478';
      ctx.textAlign = 'center';
      ctx.fillText(`${l.snr.toFixed(1)}dB`, mx, my - 4);
    }
  });

  // Draw nodes
  nodes.forEach(n => {
    const pos = positions[n.node_id];
    if (!pos) return;
    const online = n.last_heard && (Date.now()/1000 - n.last_heard < 900);
    const color = online ? '#00e5a0' : '#ef4444';

    // Glow
    ctx.shadowColor = color;
    ctx.shadowBlur = 12;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Inner
    ctx.fillStyle = '#0a0e17';
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, 5, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, 3, 0, Math.PI * 2);
    ctx.fill();

    // Label
    ctx.font = '12px system-ui,sans-serif';
    ctx.fillStyle = '#e2e8f0';
    ctx.textAlign = 'center';
    ctx.fillText(n.short_name || n.long_name, pos.x, pos.y - 16);

    ctx.font = '10px monospace';
    ctx.fillStyle = '#5a6478';
    ctx.fillText(n.role || '', pos.x, pos.y + 22);
  });
}

  const [settings, setSettings] = useState({});
  const [newDoc, setNewDoc] = useState({ title: '', content: '', tags: '' });
  const [savingSettings, setSavingSettings] = useState(false);
  const [settingsSaved, setSettingsSaved] = useState(false);
  const [saveError, setSaveError] = useState(null);
  const [warmingUp, setWarmingUp] = useState(false);
  const [deletingChatId, setDeletingChatId] = useState(null);
  const [creatingChat, setCreatingChat] = useState(false);
  const chatEndRef = useRef(null);
  const aiReady = !!(status?.running && status?.ai_ready);

  // ── Data fetching ──────────────────────────────
  function loadStatus() {
    return api.get('/api/ai/status').then(s => {
      setStatus(s);
      setWarmingUp(!!s?.warming_up);
      return s;
    });
  }
  function loadChats()  { return api.get('/api/ai/chats').then(setChats); }
  function loadDocs()   { return api.get('/api/ai/documents').then(setDocuments); }
  function loadSettings() { return api.get('/api/ai/settings').then(setSettings); }

  function loadMessages(chatId) {
    if (!chatId || String(chatId).startsWith('pending-')) { setMessages([]); return; }
    api.get(`/api/ai/chats/${chatId}`).then(c => setMessages(c.messages || []));
  }

  // ── Mount ──────────────────────────────────────
  useEffect(() => {
    let cancelled = false;
    Promise.allSettled([loadStatus(), loadChats(), loadDocs(), loadSettings()]).then(results => {
      if (cancelled) return;
      const chatsResult = results[1];
      const chatList = chatsResult && chatsResult.status === 'fulfilled' && Array.isArray(chatsResult.value)
        ? chatsResult.value
        : [];
      if (chatList.length === 0) {
        api.post('/api/ai/chats', {}).then(chat => {
          if (cancelled) return;
          setChats([chat]);
          setActiveChatId(chat.id);
        }).catch(() => {});
      } else {
        setActiveChatId(chatList[0].id);
        loadMessages(chatList[0].id);
      }
    });
    return () => { cancelled = true; };
  }, []);

  useEffect(() => {
    if (aiReady) return;
    const poll = setInterval(() => { loadStatus().catch(() => {}); }, 2000);
    return () => clearInterval(poll);
  }, [aiReady]);

  // Re-load when active chat changes
  useEffect(() => {
    loadMessages(activeChatId);
  }, [activeChatId]);

  // Scroll to bottom on new messages
  useEffect(() => {
    chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages, loading]);

  // ── Actions ────────────────────────────────────
  async function createChat() {
    if (creatingChat) return;
    setCreatingChat(true);
    try {
      const chat = await api.post('/api/ai/chats', {});
      setChats(prev => [chat, ...prev]);
      setActiveChatId(chat.id);
      setMessages([]);
    } finally {
      setCreatingChat(false);
    }
  }

  async function deleteChat(id) {
    if (!id || deletingChatId === id) return;
    setDeletingChatId(id);
    const wasActive = activeChatId === id;
    try {
      await api.del(`/api/ai/chats/${id}`);
      const updated = await api.get('/api/ai/chats');
      setChats(updated);
      if (wasActive) {
        const nextChat = updated[0] || null;
        setActiveChatId(nextChat ? nextChat.id : null);
        setMessages([]);
        if (nextChat) loadMessages(nextChat.id);
      }
    } finally {
      setDeletingChatId(null);
    }
  }

  async function sendMessage() {
    const text = input.trim();
    if (!text || loading || !activeChatId || String(activeChatId).startsWith('pending-') || !aiReady) return;
    setInput('');
    setLoading(true);
    const tempUserId = Date.now();
    const tempAssistantId = Date.now() + 1;
    const tempUser = { id: tempUserId, role: 'user', content: text, created_at: Date.now()/1000 };
    const tempAssistant = { id: tempAssistantId, role: 'assistant', content: '', streaming: true, created_at: Date.now()/1000 };
    setMessages(prev => [...prev, tempUser, tempAssistant]);
    try {
      let response = null;
      for (let attempt = 0; attempt < 3; attempt++) {
        response = await fetch(`/api/ai/chats/${activeChatId}/stream`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text }),
        });
        if (response.ok || response.status !== 503 || attempt === 2) break;
        setMessages(prev => prev.map(m => m.id === tempAssistantId
          ? { ...m, content: 'Ray is still starting. Retrying…', streaming: true }
          : m));
        await loadStatus().catch(() => {});
        await new Promise(resolve => setTimeout(resolve, attempt === 0 ? 2000 : 4000));
      }
      if (!response.ok) {
        const err = await response.json().catch(() => ({ error: response.statusText }));
        setMessages(prev => prev.map(m => m.id === tempAssistantId
          ? { ...m, content: `Error: ${err.error || response.statusText}`, streaming: false }
          : m));
        setLoading(false);
        return;
      }
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let streamingContent = '';
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          try {
            const data = JSON.parse(line.slice(6));
            if (data.replace !== undefined) {
              // Full content replacement after server-side calc-tag processing
              streamingContent = data.replace;
              setMessages(prev => prev.map(m => m.id === tempAssistantId
                ? { ...m, content: streamingContent }
                : m));
            } else if (data.token !== undefined) {
              streamingContent += data.token;
              setMessages(prev => prev.map(m => m.id === tempAssistantId
                ? { ...m, content: streamingContent }
                : m));
            } else if (data.error) {
              setMessages(prev => prev.map(m => m.id === tempAssistantId
                ? { ...m, content: `Error: ${data.error}`, streaming: false }
                : m));
            }
          } catch(e) {}
        }
      }
      setMessages(prev => prev.map(m => m.id === tempAssistantId ? { ...m, streaming: false } : m));
      loadMessages(activeChatId);
      loadChats();
    } catch(e) {
      setMessages(prev => prev.map(m => m.id === tempAssistantId
        ? { ...m, content: `Connection error: ${e.message}`, streaming: false }
        : m));
    }
    setLoading(false);
  }

  async function addDocument() {
    const { title, content, tags } = newDoc;
    if (!title.trim() || !content.trim()) return;
    await api.post('/api/ai/documents', { title: title.trim(), content: content.trim(), tags: tags.trim() });
    setNewDoc({ title: '', content: '', tags: '' });
    loadDocs();
  }

  async function deleteDocument(id) {
    await api.del(`/api/ai/documents/${id}`);
    loadDocs();
  }

  async function saveSettings() {
    setSavingSettings(true);
    setSaveError(null);
    try {
      const result = await api.put('/api/ai/settings', settings);
      // Sync state with what the server actually persisted
      if (result?.settings) setSettings(result.settings);
      setSettingsSaved(true);
      setTimeout(() => setSettingsSaved(false), 2000);
      if (result?.warming_up) {
        setWarmingUp(true);
        loadStatus();
        const targetModel = settings.model;
        const poll = setInterval(() => {
          loadStatus().then(s => {
            const loaded = s?.loaded_models || [];
            if (loaded.some(m => m === targetModel || m.startsWith(targetModel + ':'))) {
              setWarmingUp(false); clearInterval(poll);
            }
          });
        }, 3000);
        setTimeout(() => { setWarmingUp(false); clearInterval(poll); }, 120000);
      }
    } catch (err) {
      setSaveError(err.message || 'Save failed');
    } finally {
      setSavingSettings(false);
    }
  }

  // ── Helpers ────────────────────────────────────
  const { timezone: tzSetting } = useSettings();
  function fmtChatTime(ts) {
    if (!ts) return '';
    const d = new Date(ts * 1000);
    const tz = resolveTz(tzSetting);
    return d.toLocaleDateString([], { month: 'short', day: 'numeric', timeZone: tz }) + ' ' +
           d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', timeZone: tz });
  }

  // ── Render ─────────────────────────────────────
  const tabBtnStyle = (active) => ({
    padding: '6px 14px', borderRadius: 'var(--radius)',
    border: 'none', cursor: 'pointer', fontSize: 13, fontWeight: 500,
    background: active ? 'var(--accent-green-dim)' : 'transparent',
    color: active ? 'var(--accent-green)' : 'var(--text-muted)',
    transition: 'all 200ms',
  });

  const inputStyle = {
    background: 'var(--bg-input)', border: '1px solid var(--border)',
    color: 'var(--text-primary)', borderRadius: 'var(--radius)',
    padding: '6px 10px', fontSize: 13, width: '100%',
  };

  const labelStyle = { fontSize: 12, color: 'var(--text-muted)', marginBottom: 4, display: 'block' };

  return (
    <div className="page ai-layout">

      {/* ── Left sidebar: chat list ── */}
      <div className="ai-sidebar">
        <div className="ai-sidebar-header">
          <div style={{ display:'flex', gap:8, width:'100%' }}>
            <button
              className="btn btn-primary"
              style={{ flex: 1, justifyContent: 'center', display: 'flex', alignItems: 'center', gap: 6, opacity: creatingChat ? 0.6 : 1 }}
              onClick={() => { createChat(); }}
              disabled={creatingChat}
            >
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" style={{ pointerEvents: 'none' }}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              {creatingChat ? 'Creating…' : 'New Chat'}
            </button>
          </div>
        </div>
        <div className="ai-sidebar-body">
          {chats.length === 0 && (
            <div style={{ color: 'var(--text-muted)', fontSize: 12, textAlign: 'center', marginTop: 20 }}>No chats yet</div>
          )}
          {chats.map(chat => (
            <div
              key={chat.id}
              className="ai-chat-item"
              onClick={() => { setActiveChatId(chat.id); setTab('chat'); }}
              style={{
                background: activeChatId === chat.id ? 'var(--bg-input)' : 'transparent',
                borderLeft: activeChatId === chat.id ? '3px solid var(--accent-green)' : '3px solid transparent',
              }}
              onMouseEnter={e => { if (activeChatId !== chat.id) e.currentTarget.style.background = 'var(--bg-card)'; }}
              onMouseLeave={e => { if (activeChatId !== chat.id) e.currentTarget.style.background = 'transparent'; }}
            >
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 13, fontWeight: 500, color: 'var(--text-primary)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                  {chat.title || 'New Chat'}
                </div>
                <div className="ai-chat-ts" style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 2 }}>
                  {fmtChatTime(chat.updated_at)}
                </div>
              </div>
              <button
                type="button"
                onPointerDown={e => e.stopPropagation()}
                onMouseDown={e => e.stopPropagation()}
                onClick={e => {
                  e.stopPropagation();
                  e.preventDefault();
                  deleteChat(chat.id);
                }}
                style={{
                  background: 'transparent',
                  border: '1px solid transparent',
                  cursor: deletingChatId === chat.id ? 'default' : 'pointer',
                  color: 'var(--accent-red)',
                  padding: '7px',
                  borderRadius: 10,
                  flexShrink: 0,
                  display: 'flex',
                  alignItems: 'center',
                  justifyContent: 'center',
                  minWidth: 36,
                  minHeight: 36,
                  opacity: deletingChatId === chat.id ? 0.4 : 0.9,
                }}
                title="Delete chat"
                aria-label="Delete chat"
                disabled={deletingChatId === chat.id}
              >
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{ pointerEvents: 'none' }}><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6m4-6v6"/></svg>
              </button>
            </div>
          ))}
        </div>
        {/* Status pill at sidebar bottom */}
        <div className="ai-sidebar-footer">
          <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
            <span style={{ width: 7, height: 7, borderRadius: '50%', display: 'inline-block', background: status?.running ? 'var(--accent-green)' : 'var(--accent-red)', flexShrink: 0 }}/>
            <span className="mono" style={{ fontSize: 11, color: 'var(--text-muted)' }}>
              {status === null ? 'Checking…' : status.running ? `Ollama · ${status.doc_count || 0} docs` : 'Ollama offline'}
            </span>
          </div>
        </div>
      </div>

      {/* ── Right content area ── */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', padding: '16px' }}>

        {/* Header row */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 14, flexShrink: 0 }}>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 17, fontWeight: 700, color: 'var(--text-primary)' }}>Ray</div>
            <div className="mono" style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 1 }}>
              {warmingUp
                ? `Loading ${settings.model || 'qwen3.5:2b'}…`
                : aiReady
                  ? `${settings.model || 'qwen3.5:2b'} · RAG ${settings.rag_enabled === 'true' ? 'on' : 'off'} · ${status?.doc_count || 0} docs`
                  : status?.running
                    ? `Starting Ray… ${status?.startup_phase || 'warming_up'}`
                    : 'Ollama not reachable'}
            </div>
          </div>
          <div style={{ display: 'flex', gap: 4 }}>
            {['chat','kb','settings'].map(t => (
              <button key={t} style={tabBtnStyle(tab === t)} onClick={() => setTab(t)}>
                {t === 'chat' ? 'Chat' : t === 'kb' ? 'Knowledge Base' : 'Settings'}
              </button>
            ))}
          </div>
        </div>

        {/* ── CHAT TAB ── */}
        {tab === 'chat' && (
          <div className="card" style={{ flex: 1, display: 'flex', flexDirection: 'column', minHeight: 0 }}>
            {!activeChatId ? (
              <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--text-muted)', fontSize: 14 }}>
                Select or create a chat
              </div>
            ) : (
              <>
