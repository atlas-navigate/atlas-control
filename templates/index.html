<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0e17">
<title>Atlas Control</title>
<script src="/static/vendor/react.min.js"></script>
<script src="/static/vendor/react-dom.min.js"></script>
<script src="/static/vendor/babel.min.js"></script>
<script src="/static/vendor/socket.io.min.js"></script>
<link rel="stylesheet" href="/static/vendor/maplibre-gl.css"/>
<script src="/static/vendor/maplibre-gl.js"></script>
<script src="/static/vendor/pmtiles.js"></script>

<style>
:root {
  --font-sans: "Avenir Next", "Segoe UI Variable", "SF Pro Display", "IBM Plex Sans", "Helvetica Neue", sans-serif;
  --font-mono: "SFMono-Regular", "JetBrains Mono", "IBM Plex Mono", "Courier New", monospace;
}

:root {
  --theme-color: #0a0e17;
  --bg-primary: #09111c;
  --bg-secondary: rgba(9, 17, 28, 0.84);
  --bg-card: rgba(17, 27, 43, 0.8);
  --bg-card-hover: rgba(22, 34, 53, 0.92);
  --bg-input: rgba(8, 15, 26, 0.82);
  --bg-elevated: rgba(22, 34, 53, 0.96);
  --border: rgba(126, 156, 191, 0.14);
  --border-bright: rgba(153, 193, 234, 0.34);
  --text-primary: #f3f7fb;
  --text-secondary: #9aafc4;
  --text-muted: #66778b;
  --accent-green: #5ef2c2;
  --accent-green-dim: rgba(94,242,194,0.14);
  --accent-blue: #5aa7ff;
  --accent-blue-dim: rgba(90,167,255,0.15);
  --accent-amber: #ffbe5c;
  --accent-amber-dim: rgba(255,190,92,0.14);
  --accent-red: #ff6f6f;
  --accent-red-dim: rgba(255,111,111,0.14);
  --accent-purple: #b798ff;
  --accent-purple-dim: rgba(183,152,255,0.14);
  --accent-cyan: #57d8ff;
  --radius: 12px;
  --radius-lg: 20px;
  --radius-xl: 28px;
  --shadow: 0 24px 60px rgba(3,8,16,0.42);
  --shadow-soft: 0 10px 28px rgba(3,8,16,0.22);
  --transition: 200ms ease;
}

:root[data-theme="light"] {
  --theme-color: #edf3fb;
  --bg-primary: #edf3fb;
  --bg-secondary: rgba(255, 255, 255, 0.82);
  --bg-card: rgba(255, 255, 255, 0.86);
  --bg-card-hover: rgba(248, 251, 255, 0.96);
  --bg-input: rgba(242, 247, 252, 0.96);
  --bg-elevated: rgba(255, 255, 255, 0.98);
  --border: rgba(69, 94, 126, 0.16);
  --border-bright: rgba(69, 94, 126, 0.3);
  --text-primary: #102033;
  --text-secondary: #52677f;
  --text-muted: #556a81;
  --accent-green: #157347;
  --accent-green-dim: rgba(21,115,71,0.14);
  --shadow: 0 18px 42px rgba(46, 74, 108, 0.14);
  --shadow-soft: 0 8px 22px rgba(46, 74, 108, 0.1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

/* Solid fallback so Android/iOS WebViews never show white through transparent elements */
html { background: #09111c; min-height: 100%; min-height: 100dvh; }

body {
  font-family: var(--font-sans);
  background:
    radial-gradient(circle at top left, rgba(90,167,255,0.16), transparent 28%),
    radial-gradient(circle at top right, rgba(94,242,194,0.10), transparent 24%),
    radial-gradient(circle at bottom center, rgba(183,152,255,0.10), transparent 30%),
    linear-gradient(180deg, #0b1220 0%, #09111c 52%, #060d16 100%);
  color: var(--text-primary);
  overflow: hidden;
  height: 100vh;
  height: 100dvh;
  letter-spacing: -0.01em;
}

:root[data-theme="light"] body {
  background:
    radial-gradient(circle at top left, rgba(90,167,255,0.10), transparent 26%),
    radial-gradient(circle at top right, rgba(94,242,194,0.07), transparent 22%),
    radial-gradient(circle at bottom center, rgba(183,152,255,0.06), transparent 28%),
    linear-gradient(180deg, #f8fbff 0%, #eef4fb 52%, #e7eff8 100%);
}

:root[data-theme="light"] .app::before {
  background-image:
    linear-gradient(rgba(69,94,126,0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(69,94,126,0.035) 1px, transparent 1px);
  opacity: 0.2;
}

:root[data-theme="light"] .sidebar {
  background: linear-gradient(180deg, rgba(243, 248, 253, 0.96), rgba(232, 240, 249, 0.9));
  box-shadow: inset -1px 0 0 rgba(255,255,255,0.6);
}

:root[data-theme="light"] .sidebar-btn {
  background: rgba(255,255,255,0.44);
  color: #6b7d90;
}

:root[data-theme="light"] .sidebar-btn:hover {
  background: rgba(255,255,255,0.8);
  border-color: rgba(69,94,126,0.12);
}

:root[data-theme="light"] .sidebar-btn.active {
  background: linear-gradient(180deg, rgba(94,242,194,0.16), rgba(90,167,255,0.12));
  border-color: rgba(69,94,126,0.16);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.85), 0 10px 20px rgba(83, 107, 133, 0.12);
}

:root[data-theme="light"] .sidebar-btn::after {
  background: linear-gradient(180deg, rgba(248,251,255,0.98), rgba(238,244,251,0.98));
  color: #203247;
  border-color: rgba(69,94,126,0.14);
  box-shadow: 0 10px 24px rgba(83,107,133,0.14);
}

:root[data-theme="light"] .top-bar {
  background: linear-gradient(180deg, rgba(248, 251, 255, 0.94), rgba(238, 244, 251, 0.84));
  border-bottom: 1px solid rgba(69,94,126,0.1);
  box-shadow: inset 0 -1px 0 rgba(255,255,255,0.7);
}

:root[data-theme="light"] .top-bar-clock,
:root[data-theme="light"] .connection-badge {
  background: rgba(255,255,255,0.72);
  border-color: rgba(69,94,126,0.12);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.75);
}

:root[data-theme="light"] .card,
:root[data-theme="light"] .stat-card {
  background:
    linear-gradient(180deg, rgba(255,255,255,0.8), rgba(255,255,255,0.58)),
    var(--bg-card);
  border-color: rgba(69,94,126,0.12);
}

:root[data-theme="light"] .wifi-network-row,
:root[data-theme="light"] .wifi-connect-form,
:root[data-theme="light"] .node-metric,
:root[data-theme="light"] .tab-btn,
:root[data-theme="light"] .rename-modal,
:root[data-theme="light"] .ai-chat-item {
  background: rgba(255,255,255,0.62);
  border-color: rgba(69,94,126,0.12);
}

:root[data-theme="light"] .empty-state,
:root[data-theme="light"] .readonly-field,
:root[data-theme="light"] .topo-container,
:root[data-theme="light"] .channel-help-card,
:root[data-theme="light"] .channel-mode-btn,
:root[data-theme="light"] .channel-num-btn {
  background: rgba(255,255,255,0.66);
  border-color: rgba(69,94,126,0.12);
  color: var(--text-primary);
}

:root[data-theme="light"] .contacts-panel,
:root[data-theme="light"] .chat-panel,
:root[data-theme="light"] .ai-sidebar,
:root[data-theme="light"] .page-tab-bar {
  background: linear-gradient(180deg, rgba(247,250,254,0.94), rgba(236,243,250,0.9));
  border-color: rgba(69,94,126,0.1);
}

:root[data-theme="light"] .contact-item:hover,
:root[data-theme="light"] tr:hover td,
:root[data-theme="light"] .tab-btn:hover,
:root[data-theme="light"] .ai-chat-item:hover {
  background: rgba(90,167,255,0.08);
}

:root[data-theme="light"] .chat-header,
:root[data-theme="light"] .chat-input-area,
:root[data-theme="light"] .contacts-header,
:root[data-theme="light"] .contacts-section-label,
:root[data-theme="light"] .ai-sidebar-header,
:root[data-theme="light"] .ai-sidebar-footer {
  border-color: rgba(69,94,126,0.1);
}

:root[data-theme="light"] .chat-bubble-row.mine .chat-bubble {
  background: linear-gradient(135deg, rgba(90,167,255,0.16), rgba(94,242,194,0.12));
  border-color: rgba(90,167,255,0.16);
  color: #16324d;
}

:root[data-theme="light"] .chat-bubble-row.theirs .chat-bubble {
  background: rgba(255,255,255,0.88);
  border-color: rgba(69,94,126,0.12);
  color: #102033;
}

:root[data-theme="light"] .chat-bubble-meta,
:root[data-theme="light"] .chat-header-sub,
:root[data-theme="light"] .wifi-security,
:root[data-theme="light"] .contact-name,
:root[data-theme="light"] .channel-mode-copy {
  color: #5f7388;
}

:root[data-theme="light"] .contact-item.active .contact-name,
:root[data-theme="light"] .page-tab-btn.active,
:root[data-theme="light"] .card-title,
:root[data-theme="light"] th,
:root[data-theme="light"] .stat-label {
  color: #4a6178;
}

:root[data-theme="light"] .maplibregl-ctrl-attrib {
  background: rgba(248,251,255,0.88) !important;
  color: #5f7388 !important;
  border: 1px solid rgba(69,94,126,0.12);
}

:root[data-theme="light"] .maplibregl-ctrl-attrib a { color: #2f6fad !important; }

:root[data-theme="light"] .maplibregl-popup-content {
  background: rgba(253,254,255,0.96) !important;
  color: #102033 !important;
  border: 1px solid rgba(69,94,126,0.14);
}

:root[data-theme="light"] .maplibregl-popup-close-button {
  color: #52677f !important;
}

code, .mono { font-family: var(--font-mono); }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-bright); }

/* ── Layout ── */
.app { display: flex; height: 100vh; height: 100dvh; position: relative; }
.app::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 48px 48px;
  mask-image: linear-gradient(180deg, rgba(0,0,0,0.55), transparent 78%);
  opacity: 0.45;
}

.sidebar {
  width: 78px;
  background: linear-gradient(180deg, rgba(14, 23, 37, 0.94), rgba(10, 17, 28, 0.78));
  border-right: 1px solid var(--border);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 18px 0 16px;
  flex-shrink: 0;
  z-index: 100;
  box-shadow: inset -1px 0 0 rgba(255,255,255,0.03);
}

.sidebar-logo {
  width: 46px; height: 46px;
  border-radius: 15px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 28px;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.08),
    0 14px 26px rgba(4, 10, 20, 0.34);
  overflow: hidden;
  background:
    radial-gradient(circle at 18% 18%, rgba(94,242,194,0.18), transparent 34%),
    linear-gradient(180deg, rgba(18,29,45,0.96), rgba(10,17,28,0.98));
  border: 1px solid rgba(126, 156, 191, 0.14);
}

.sidebar-logo img {
  width: 110%;
  height: 110%;
  object-fit: cover;
  object-position: center;
  display: block;
  filter:
    saturate(1.02)
    contrast(1.02)
    drop-shadow(0 8px 16px rgba(0,0,0,0.20));
}

.sidebar-btn {
  width: 50px; height: 50px;
  border: 1px solid transparent; background: rgba(255,255,255,0.01);
  color: var(--text-muted);
  border-radius: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 6px;
  transition: all var(--transition);
  position: relative;
}
.sidebar-btn:hover {
  background: rgba(255,255,255,0.05);
  color: var(--text-primary);
  border-color: rgba(255,255,255,0.06);
  transform: translateY(-1px);
}
.sidebar-btn.active {
  background: linear-gradient(180deg, rgba(94,242,194,0.18), rgba(90,167,255,0.14));
  color: var(--text-primary);
  border-color: rgba(94,242,194,0.22);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 10px 18px rgba(0,0,0,0.18);
}
.sidebar-btn .badge {
  position: absolute; top: 4px; right: 4px;
  width: 8px; height: 8px;
  background: var(--accent-red);
  border-radius: 50%;
}

.main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

.top-bar {
  height: 68px;
  background: linear-gradient(180deg, rgba(13,21,34,0.92), rgba(10,17,28,0.72));
  border-bottom: 1px solid rgba(255,255,255,0.05);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  display: flex;
  align-items: center;
  padding: 0 28px;
  gap: 16px;
  flex-shrink: 0;
  box-shadow: inset 0 -1px 0 rgba(255,255,255,0.03);
}

.top-bar h1 {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.035em;
}

.connection-badge {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px;
  padding: 7px 12px;
  border-radius: 999px;
  font-family: var(--font-mono);
  border: 1px solid rgba(255,255,255,0.05);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
}
.connection-badge.online { background: var(--accent-green-dim); color: var(--accent-green); }
.connection-badge.offline { background: var(--accent-red-dim); color: var(--accent-red); }
.connection-badge.dead-reckoning { background: rgba(245,158,11,0.15); color: #f59e0b; }
.connection-badge .dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: currentColor;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:0} }
@keyframes spin { to{transform:rotate(360deg)} }

.top-bar-clock {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text-secondary);
  letter-spacing: 0.03em;
  white-space: nowrap;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.05);
  padding: 8px 12px;
  border-radius: 999px;
}
.top-bar-clock .clock-time { color: var(--text-primary); font-weight: 600; }
.top-bar-clock .clock-date { color: var(--text-muted); font-size: 11px; margin-left: 6px; }

/* ── WiFi page (revamp) ── */
.wifi-mode-tabs {
  display: flex; gap: 4px; padding: 4px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 14px;
}
.wifi-tab-btn {
  flex: 1; display: flex; align-items: center; justify-content: center; gap: 7px;
  padding: 10px 12px; border-radius: 10px;
  border: 1px solid transparent; background: transparent;
  color: var(--text-muted); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all var(--transition);
}
.wifi-tab-btn:hover { color: var(--text-secondary); background: rgba(255,255,255,0.03); }
.wifi-tab-btn.active {
  background: linear-gradient(135deg, rgba(90,167,255,0.16), rgba(94,242,194,0.10));
  color: var(--text-primary);
  border-color: rgba(90,167,255,0.22);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
}
:root[data-theme="light"] .wifi-tab-btn.active {
  background: rgba(90,167,255,0.1); border-color: rgba(90,167,255,0.3); color: #102033;
}
.wifi-network-list { display: flex; flex-direction: column; gap: 4px; }
.wifi-network-row {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 14px; border-radius: 13px;
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
}
.wifi-network-row:hover { border-color: rgba(90,167,255,0.3); background: rgba(255,255,255,0.04); }
.wifi-network-row.active {
  border-color: rgba(94,242,194,0.3);
  background: rgba(94,242,194,0.06);
}
.wifi-network-row.selected-row {
  border-color: rgba(90,167,255,0.38);
  background: rgba(90,167,255,0.07);
  border-bottom-left-radius: 0; border-bottom-right-radius: 0;
}
.wifi-inline-form {
  padding: 12px 14px 14px;
  background: rgba(90,167,255,0.05);
  border: 1px solid rgba(90,167,255,0.2); border-top: none;
  border-radius: 0 0 13px 13px;
  margin-top: -1px;
}
.wifi-signal-bars { display: flex; align-items: flex-end; gap: 2px; height: 16px; width: 18px; flex-shrink: 0; }
.wifi-signal-bars span { display: inline-block; width: 3px; border-radius: 1px; background: var(--text-muted); }
.wifi-signal-bars span.lit { background: var(--accent-green); }
.wifi-ssid { flex: 1; font-size: 13px; font-weight: 500; }
.wifi-security { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }
.wifi-next-step {
  padding: 12px 14px; border-radius: 13px;
  background: rgba(90,167,255,0.07); border: 1px solid rgba(90,167,255,0.2);
  font-size: 12px; color: var(--text-muted); line-height: 1.55;
}
.wifi-next-step strong { color: var(--text-primary); }
.wifi-next-url { font-family: var(--font-mono); color: var(--accent-green); word-break: break-all; }
.hotspot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 600px) { .hotspot-grid { grid-template-columns: 1fr; } }

.page { flex: 1; overflow-y: auto; padding: 24px; }

/* ── Cards ── */
.card {
  background:
    linear-gradient(180deg, rgba(255,255,255,0.03), transparent 22%),
    var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  box-shadow: var(--shadow-soft);
  transition: border-color var(--transition), transform var(--transition), box-shadow var(--transition);
}
.card:hover {
  border-color: var(--border-bright);
  transform: translateY(-1px);
  box-shadow: var(--shadow);
}
.card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.card-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--text-secondary);
}

/* ── Dashboard grid ── */
.dash-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
  margin-bottom: 20px;
}

.stat-card {
  background:
    radial-gradient(circle at top right, rgba(90,167,255,0.12), transparent 28%),
    linear-gradient(180deg, rgba(255,255,255,0.03), transparent 26%),
    var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow-soft);
}
.stat-label {
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 8px;
}
.stat-value {
  font-size: 34px;
  font-weight: 700;
  font-family: var(--font-mono);
  letter-spacing: -0.03em;
}
.stat-sub { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

/* ── Tables ── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th {
  text-align: left; padding: 10px 12px;
  color: var(--text-muted);
  font-weight: 700;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
td {
  padding: 10px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  color: var(--text-secondary);
}
tr:hover td { background: rgba(255,255,255,0.03); }

/* ── Tags / badges ── */
.tag {
  display: inline-flex; align-items: center;
  padding: 2px 8px; border-radius: 4px;
  font-size: 11px; font-weight: 500;
  font-family: var(--font-mono);
}
.tag-green { background: var(--accent-green-dim); color: var(--accent-green); }
.tag-blue { background: var(--accent-blue-dim); color: var(--accent-blue); }
.tag-amber { background: var(--accent-amber-dim); color: var(--accent-amber); }
.tag-red { background: var(--accent-red-dim); color: var(--accent-red); }
.tag-purple { background: var(--accent-purple-dim); color: var(--accent-purple); }

/* ── Messages (chat layout) ── */
.messages-page-wrap {
  display: flex; flex-direction: column;
  overflow: hidden; padding: 20px; box-sizing: border-box;
}
.messages-layout {
  display: flex; flex: 1; min-height: 0;
  gap: 0; overflow: hidden;
}
.contacts-panel {
  width: 240px; flex-shrink: 0;
  background: linear-gradient(180deg, rgba(19,30,47,0.88), rgba(13,22,34,0.94));
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  display: flex; flex-direction: column;
  overflow: hidden;
  margin-right: 14px;
  box-shadow: var(--shadow-soft);
}
.contacts-header {
  padding: 10px 12px 8px;
  font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.07em;
  color: var(--text-muted);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.contacts-section-label {
  padding: 8px 14px 4px;
  font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.07em;
  color: var(--text-muted);
  display: flex; align-items: center; justify-content: space-between;
}
.contacts-add-btn {
  background: none; border: none; cursor: pointer;
  color: var(--text-muted); padding: 2px 4px; border-radius: 4px;
  display: flex; align-items: center;
  transition: color var(--transition);
  font-size: 16px; line-height: 1;
}
.contacts-add-btn:hover { color: var(--accent-green); }
.contacts-list { flex: 1; overflow-y: auto; }
.contact-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  transition: background var(--transition), border-color var(--transition);
  position: relative;
}
.contact-item:hover { background: rgba(255,255,255,0.035); }
.contact-item.active {
  background: linear-gradient(90deg, rgba(94,242,194,0.14), rgba(90,167,255,0.08));
  box-shadow: inset 3px 0 0 var(--accent-green);
}
.contact-item.active .contact-name { color: var(--accent-green); }
.contact-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.contact-name { font-size: 13px; font-weight: 500; color: var(--text-primary); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.contact-unread {
  background: var(--accent-green); color: var(--bg-primary);
  font-size: 10px; font-weight: 700; font-family: var(--font-mono);
  min-width: 18px; height: 18px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  padding: 0 5px;
}
.contact-rename-btn {
  opacity: 0; background: none; border: none; cursor: pointer;
  color: var(--text-muted); padding: 2px; border-radius: 3px;
  display: flex; align-items: center;
  transition: opacity var(--transition);
  flex-shrink: 0;
}
.contact-item:hover .contact-rename-btn { opacity: 1; }
.contact-rename-btn:hover { color: var(--accent-cyan); }
.channel-icon {
  width: 22px; height: 22px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; font-family: var(--font-mono);
  flex-shrink: 0;
}
.channel-num-selector {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
  margin-bottom: 14px;
}
.channel-num-btn {
  padding: 8px 4px; border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--bg-input); color: var(--text-primary);
  font-size: 12px; font-weight: 600; font-family: var(--font-mono);
  cursor: pointer; text-align: center;
  transition: all var(--transition);
}
.channel-num-btn:hover { border-color: var(--accent-green); color: var(--accent-green); }
.channel-num-btn.selected { background: var(--accent-green-dim); border-color: var(--accent-green); color: var(--accent-green); }
.channel-num-btn:disabled { opacity: 0.35; cursor: default; }
.channel-mode-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 14px;
}
.channel-mode-btn {
  padding: 10px 12px;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: var(--bg-input);
  color: var(--text-secondary);
  cursor: pointer;
  text-align: left;
  transition: all var(--transition);
}
.channel-mode-btn:hover {
  border-color: var(--border-bright);
  color: var(--text-primary);
}
.channel-mode-btn.active {
  background: linear-gradient(135deg, rgba(94,242,194,0.12), rgba(90,167,255,0.10));
  border-color: rgba(94,242,194,0.28);
  color: var(--text-primary);
}
.channel-mode-title { font-size: 13px; font-weight: 700; }
.channel-mode-copy { font-size: 11px; color: var(--text-muted); margin-top: 3px; line-height: 1.4; }
.channel-help-card {
  margin: 10px 0 12px;
  padding: 12px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.06);
  background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
}
.channel-helper-steps {
  display: grid;
  gap: 6px;
  margin-top: 10px;
  font-size: 12px;
  color: var(--text-muted);
}

.chat-panel {
  flex: 1; min-width: 0;
  background:
    radial-gradient(circle at top right, rgba(90,167,255,0.10), transparent 24%),
    linear-gradient(180deg, rgba(20,31,49,0.90), rgba(14,22,35,0.96));
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  display: flex; flex-direction: column;
  overflow: hidden;
  box-shadow: var(--shadow);
}
.chat-header {
  padding: 16px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
.chat-header-name { font-size: 16px; font-weight: 700; letter-spacing: -0.02em; }
.chat-header-sub { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }
.chat-messages {
  flex: 1; overflow-y: auto;
  padding: 20px;
  display: flex; flex-direction: column; gap: 10px;
}
.chat-bubble-row {
  display: flex;
  width: 100%;
  align-items: flex-start;
}
.chat-bubble-row.mine { justify-content: flex-end; }
.chat-bubble-row.theirs { justify-content: flex-start; }
.chat-bubble-stack {
  display: flex;
  flex-direction: column;
  min-width: 0;
  max-width: 65%;
}
.chat-bubble-row.mine .chat-bubble-stack { align-items: flex-end; }
.chat-bubble-row.theirs .chat-bubble-stack { align-items: flex-start; }
.chat-bubble {
  width: fit-content;
  max-width: 100%;
  padding: 12px 15px;
  border-radius: 18px;
  font-size: 14px; line-height: 1.5;
  text-align: left;
  white-space: pre-wrap;
  overflow-wrap: anywhere;
  word-break: break-word;
}
.chat-bubble-row.mine .chat-bubble {
  background: linear-gradient(135deg, rgba(90,167,255,0.18), rgba(94,242,194,0.14));
  border: 1px solid rgba(90,167,255,0.18);
  color: var(--text-primary);
  border-bottom-right-radius: 6px;
}
.chat-bubble-row.theirs .chat-bubble {
  background: rgba(8,15,26,0.76);
  border: 1px solid rgba(255,255,255,0.06);
  border-bottom-left-radius: 6px;
  color: var(--text-primary);
}
.chat-bubble-meta {
  font-size: 10px; color: var(--text-muted);
  font-family: var(--font-mono);
  margin-top: 3px; display: flex; gap: 6px;
}
.chat-bubble-row.mine .chat-bubble-meta { justify-content: flex-end; }
.chat-input-area {
  padding: 14px 18px 18px;
  border-top: 1px solid rgba(255,255,255,0.05);
  display: flex; gap: 8px; align-items: center;
  flex-shrink: 0;
}
.chat-input-area select {
  padding: 8px 10px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-size: 12px; outline: none;
}
.chat-input-area input {
  flex: 1; padding: 10px 14px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 14px;
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 14px; outline: none;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
}
.chat-input-area input:focus { border-color: var(--accent-green); }

/* legacy msg-input-row kept for dashboard */
.msg-list { display: flex; flex-direction: column; gap: 8px; max-height: 600px; overflow-y: auto; }
.msg-item {
  padding: 14px 16px;
  border-radius: 18px;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.02), transparent 28%),
    rgba(11, 19, 31, 0.78);
  border: 1px solid rgba(255,255,255,0.06);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
}
.msg-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 6px; font-size: 12px;
}
.msg-from { color: var(--accent-cyan); font-weight: 600; font-family: var(--font-mono); }
.msg-time { color: var(--text-muted); margin-left: auto; font-family: var(--font-mono); font-size: 11px; }
.msg-text { color: var(--text-primary); font-size: 14px; line-height: 1.5; }
.msg-meta { display: flex; gap: 12px; margin-top: 6px; font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }

.msg-input-row {
  display: flex; gap: 8px; margin-top: 16px;
}
.msg-input-row input {
  flex: 1; padding: 10px 14px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 14px;
  outline: none;
}
.msg-input-row input:focus { border-color: var(--accent-green); }
.msg-input-row select {
  padding: 10px 12px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-size: 13px;
  outline: none;
}

/* rename modal */
.rename-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(0,0,0,0.6);
  display: flex; align-items: center; justify-content: center;
}
.rename-modal {
  background: linear-gradient(180deg, rgba(23,34,52,0.96), rgba(14,22,35,0.98));
  border: 1px solid var(--border-bright);
  border-radius: var(--radius-lg);
  padding: 24px;
  width: 320px;
  box-shadow: var(--shadow);
}
.rename-modal h3 { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.rename-modal p { font-size: 12px; color: var(--text-muted); margin-bottom: 16px; }
.rename-modal input {
  width: 100%; padding: 10px 12px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-size: 14px; outline: none;
  margin-bottom: 12px;
}
.rename-modal input:focus { border-color: var(--accent-green); }
.rename-modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

/* ── Shared input style (used via className="input") ── */
.input {
  background: var(--bg-input);
  border: 1px solid var(--border);
  color: var(--text-primary);
  border-radius: 14px;
  padding: 10px 14px;
  font-size: 14px;
  font-family: var(--font-sans);
  outline: none;
  transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
}
.input:focus {
  border-color: var(--border-bright);
  box-shadow: 0 0 0 4px rgba(90,167,255,0.10);
}
.input::placeholder { color: var(--text-muted); }

.btn {
  padding: 10px 18px;
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 14px;
  background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.015));
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
}
.btn:hover {
  background: rgba(255,255,255,0.06);
  border-color: var(--border-bright);
  transform: translateY(-1px);
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent-green), #89ffd8 55%, var(--accent-blue));
  color: #06111d;
  border-color: transparent;
  font-weight: 700;
  box-shadow: 0 12px 24px rgba(94,242,194,0.22);
}
.btn-primary:hover { filter: brightness(1.03); }
.btn-sm { padding: 7px 12px; font-size: 11px; }

/* ── Power toggle switch ── */
.power-toggle { display:inline-flex; align-items:center; cursor:pointer; gap:10px; user-select:none; }
.power-toggle input { display:none; }
.power-toggle-track {
  position:relative; width:44px; height:24px; border-radius:12px;
  background:var(--bg-input); border:1px solid var(--border);
  transition:background 200ms, border-color 200ms;
}
.power-toggle-track::after {
  content:''; position:absolute; top:3px; left:3px;
  width:16px; height:16px; border-radius:50%;
  background:var(--text-muted); transition:transform 200ms, background 200ms;
}
.power-toggle input:checked + .power-toggle-track { background:var(--accent-green); border-color:var(--accent-green); }
.power-toggle input:checked + .power-toggle-track::after { transform:translateX(20px); background:#fff; }

/* ── Alerts ── */
.alert-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 15px 16px;
  border-radius: 18px;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.025), transparent 30%),
    rgba(11, 19, 31, 0.8);
  border: 1px solid rgba(255,255,255,0.06);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
}
.alert-icon {
  width: 32px; height: 32px;
  border-radius: var(--radius);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 16px;
}
.alert-critical .alert-icon { background: var(--accent-red-dim); color: var(--accent-red); }
.alert-warning .alert-icon { background: var(--accent-amber-dim); color: var(--accent-amber); }
.alert-info .alert-icon { background: var(--accent-blue-dim); color: var(--accent-blue); }
.alert-body { flex: 1; min-width: 0; }
.alert-title { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
.alert-msg { font-size: 12px; color: var(--text-secondary); }
.alert-time { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }

/* ── MapLibre popup dark theme ── */
.maplibregl-popup-content {
  background: linear-gradient(180deg, rgba(18,28,44,0.96), rgba(11,19,31,0.98)) !important;
  border: 1px solid rgba(153,193,234,0.16) !important;
  border-radius: 16px !important;
  padding: 14px 16px !important;
  box-shadow: 0 18px 40px rgba(0,0,0,0.42) !important;
  color: #eef5fb !important;
  backdrop-filter: blur(16px) !important;
}
.maplibregl-popup-tip {
  border-top-color: rgba(153,193,234,0.16) !important;
  border-bottom-color: rgba(153,193,234,0.16) !important;
}
.maplibregl-popup-close-button {
  color: #8ea5ba !important;
  font-size: 18px !important;
  right: 8px !important;
  top: 4px !important;
}
.maplibregl-popup-close-button:hover { color: #eef5fb !important; }
.maplibregl-ctrl-attrib {
  background: rgba(10,14,23,0.72) !important;
  color: #7b92a7 !important;
  font-size: 10px !important;
  border-radius: 10px 0 0 0 !important;
}
.maplibregl-ctrl-attrib a { color: #7ec7ff !important; }

/* ── Topology canvas ── */
.topo-container {
  width: 100%; height: 500px;
  background:
    radial-gradient(circle at top right, rgba(90,167,255,0.08), transparent 24%),
    rgba(8,15,26,0.84);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--radius-lg);
  position: relative;
  overflow: hidden;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
}

/* ── Map ── */
.map-container {
  width: 100%; height: 550px; min-height: 280px;
  border-radius: var(--radius-lg);
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.06);
  box-shadow: var(--shadow-soft);
}
.leaflet-container { background: #e8e0d5 !important; }

/* ── Charts (canvas-based) ── */
.chart-container {
  width: 100%; height: 250px;
  position: relative;
}

/* ── Two column layout ── */
.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
@media (max-width: 1200px) { .two-col { grid-template-columns: 1fr; } }
.settings-grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.settings-actions {
  display: flex;
  align-items: center;
  gap: 12px;
}
.device-identity-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 10px;
}
.readonly-field {
  background: var(--bg-input);
  border: 1px solid var(--border);
  color: var(--text-primary);
  border-radius: var(--radius);
  padding: 9px 10px;
  font-size: 13px;
  min-height: 38px;
  display: flex;
  align-items: center;
}

/* ── Node detail panel ── */
.node-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 10px;
}
.node-metric {
  padding: 12px;
  background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.06);
}
.node-metric-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
.node-metric-value { font-size: 20px; font-weight: 600; font-family: var(--font-mono); }

.battery-bar {
  width: 100%; height: 6px;
  background: var(--bg-input);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 4px;
}
.battery-fill {
  height: 100%; border-radius: 3px;
  transition: width 0.5s ease;
}

/* ── Tab bar inside a card ── */
.tab-bar {
  display: flex; gap: 4px; margin-bottom: 16px;
}
.tab-btn {
  padding: 9px 15px;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 999px;
  color: var(--text-secondary);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  font-family: var(--font-sans);
  transition: all var(--transition);
  backdrop-filter: blur(14px);
}
.tab-btn:hover { color: var(--text-primary); background: rgba(255,255,255,0.045); }
.tab-btn.active {
  background: linear-gradient(135deg, rgba(94,242,194,0.16), rgba(90,167,255,0.12));
  color: var(--text-primary);
  border-color: rgba(94,242,194,0.22);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
}

.empty-state {
  padding: 44px 28px;
  text-align: center;
  color: var(--text-muted);
  font-size: 14px;
  background: linear-gradient(180deg, rgba(255,255,255,0.018), rgba(255,255,255,0.008));
  border: 1px dashed rgba(153,193,234,0.12);
  border-radius: 20px;
}

/* sidebar tooltip */
.sidebar-btn::after {
  content: attr(data-tip);
  position: absolute;
  left: 64px;
  background: linear-gradient(180deg, rgba(20,31,49,0.96), rgba(12,20,32,0.98));
  color: var(--text-primary);
  padding: 8px 12px;
  border-radius: 12px;
  font-size: 11px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: opacity 150ms;
  border: 1px solid rgba(255,255,255,0.06);
  box-shadow: var(--shadow-soft);
  z-index: 200;
}
.sidebar-btn:hover::after { opacity: 1; }

/* ── Sidebar drag-and-drop ── */
.sidebar-btn.dragging { opacity: 0.35; }
.sidebar-btn.drag-over { background: var(--accent-green-dim); outline: 1px dashed var(--accent-green); }
.sidebar-divider { width: 34px; height: 1px; background: rgba(255,255,255,0.07); margin: 8px 0; flex-shrink: 0; }

/* ── Global touch optimizations ── */
button, .btn, .tab-btn, .sidebar-btn, .contact-item, label.power-toggle {
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

/* ── Scrollable tab bar (prevents overflow on narrow screens) ── */
.tab-bar { overflow-x: auto; scrollbar-width: none; flex-wrap: nowrap; }
.tab-bar::-webkit-scrollbar { display: none; }

/* ── Page-level tab bar (group section navigation) ── */
.page-tab-bar {
  display: flex; gap: 0;
  padding: 0 16px;
  background: linear-gradient(180deg, rgba(14,23,37,0.72), rgba(10,17,28,0.56));
  border-bottom: 1px solid rgba(255,255,255,0.05);
  flex-shrink: 0;
  overflow-x: auto;
  scrollbar-width: none;
  backdrop-filter: blur(16px);
}
.page-tab-bar::-webkit-scrollbar { display: none; }
.page-tab-btn {
  padding: 14px 18px 12px;
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--text-muted);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
  margin-bottom: -1px;
  letter-spacing: 0.02em;
}
.page-tab-btn:hover { color: var(--text-primary); }
.page-tab-btn.active {
  color: var(--text-primary);
  border-bottom-color: var(--accent-green);
  text-shadow: 0 0 18px rgba(94,242,194,0.22);
}

/* ── AI page layout (desktop: sidebar + content) ── */
.ai-layout { display: flex; flex-direction: row; height: 100%; gap: 0; padding: 0; overflow: hidden; }
.ai-sidebar {
  width: 220px; flex-shrink: 0;
  background: linear-gradient(180deg, rgba(16,26,41,0.86), rgba(11,19,31,0.94));
  border-right: 1px solid rgba(255,255,255,0.06);
  display: flex; flex-direction: column;
  height: 100%; overflow: hidden;
}

      while (i < lines.length && !/^\s*```\s*$/.test(lines[i])) { code.push(lines[i]); i++; }
      if (i < lines.length) i++;   // consume closing fence (if present)
      blocks.push(
        <pre key={k++} style={{ margin: '8px 0', padding: '10px 12px', background: 'rgba(0,0,0,0.28)', border: '1px solid var(--border)', borderRadius: 8, overflowX: 'auto', fontFamily: 'var(--font-mono)', fontSize: 12.5, lineHeight: 1.5, color: 'var(--text-primary)', whiteSpace: 'pre' }}>
          <code>{code.join('\n')}</code>
        </pre>
      );
      continue;
    }

    // ── blank line ──
    if (/^\s*$/.test(line)) { i++; continue; }

    // ── heading ──
    const h = line.match(/^\s*(#{1,6})\s+(.*)$/);
    if (h) {
      const lvl = h[1].length;
      blocks.push(
        <div key={k++} style={{ fontSize: MD_HEAD[lvl], fontWeight: 700, lineHeight: 1.3, margin: (blocks.length ? 12 : 2) + 'px 0 5px', color: 'var(--text-primary)' }}>
          {mdInline(h[2].trim(), 'h' + k)}
        </div>
      );
      i++; continue;
    }

    // ── horizontal rule ──
    if (/^\s*([-*_])\1{2,}\s*$/.test(line)) {
      blocks.push(<hr key={k++} style={{ border: 0, borderTop: '1px solid var(--border)', margin: '12px 0' }} />);
      i++; continue;
    }

    // ── table ──
    if (line.indexOf('|') !== -1 && i + 1 < lines.length && mdIsTableSep(lines[i + 1])) {
      const header = mdSplitRow(line);
      const aligns = mdSplitRow(lines[i + 1]).map(c => {
        const l = c.startsWith(':'), r = c.endsWith(':');
        return (l && r) ? 'center' : r ? 'right' : 'left';
      });
      i += 2;
      const rows = [];
      while (i < lines.length && lines[i].indexOf('|') !== -1 && !/^\s*$/.test(lines[i]) && !/^\s*```/.test(lines[i])) {
        rows.push(mdSplitRow(lines[i])); i++;
      }
      blocks.push(
        <div key={k++} style={{ overflowX: 'auto', margin: '8px 0' }}>
          <table style={{ borderCollapse: 'collapse', width: '100%', fontSize: 13 }}>
            <thead>
              <tr>{header.map((c, ci) => (
                <th key={ci} style={{ border: '1px solid var(--border)', padding: '6px 10px', textAlign: aligns[ci] || 'left', background: 'var(--accent-green-dim)', fontWeight: 700, whiteSpace: 'nowrap' }}>{mdInline(c, 'th' + k + '_' + ci)}</th>
              ))}</tr>
            </thead>
            <tbody>{rows.map((r, ri) => (
              <tr key={ri}>{header.map((_, ci) => (
                <td key={ci} style={{ border: '1px solid var(--border)', padding: '6px 10px', textAlign: aligns[ci] || 'left', verticalAlign: 'top' }}>{mdInline(r[ci] || '', 't' + k + '_' + ri + '_' + ci)}</td>
              ))}</tr>
            ))}</tbody>
          </table>
        </div>
      );
      continue;
    }

    // ── blockquote ──
    if (/^\s*>\s?/.test(line)) {
      const quote = [];
      while (i < lines.length && /^\s*>\s?/.test(lines[i])) { quote.push(lines[i].replace(/^\s*>\s?/, '')); i++; }
      blocks.push(
        <blockquote key={k++} style={{ margin: '8px 0', padding: '4px 12px', borderLeft: '3px solid var(--accent-green)', color: 'var(--text-muted)', fontStyle: 'italic' }}>
          {quote.map((q, qi) => <div key={qi}>{mdInline(q, 'q' + k + '_' + qi)}</div>)}
        </blockquote>
      );
      continue;
    }

    // ── list (ordered/unordered, indent-based nesting) ──
    if (/^\s*([-*+]|\d+[.)])\s+/.test(line)) {
      const ordered = /^\s*\d+[.)]\s+/.test(line);
      const items = [];
      // Gather consecutive items of the same kind; a marker switch (− ↔ 1.) starts a new list.
      while (i < lines.length && /^\s*([-*+]|\d+[.)])\s+/.test(lines[i])
          && /^\s*\d+[.)]\s+/.test(lines[i]) === ordered) {
        const m = lines[i].match(/^(\s*)(?:[-*+]|\d+[.)])\s+(.*)$/);
        const indent = Math.floor(m[1].replace(/\t/g, '  ').length / 2);
        items.push({ indent, text: m[2] });
        i++;
      }
      const Tag = ordered ? 'ol' : 'ul';
      blocks.push(
        <Tag key={k++} style={{ margin: '6px 0', paddingLeft: 22, display: 'flex', flexDirection: 'column', gap: 3 }}>
          {items.map((it, ii) => (
            <li key={ii} style={{ marginLeft: it.indent * 18, lineHeight: 1.55 }}>{mdInline(it.text, 'li' + k + '_' + ii)}</li>
          ))}
        </Tag>
      );
      continue;
    }

    // ── paragraph (soft line breaks preserved) ──
    const para = [];
    while (i < lines.length && !/^\s*$/.test(lines[i]) && !mdIsBlockStart(lines[i])
        && !(lines[i].indexOf('|') !== -1 && i + 1 < lines.length && mdIsTableSep(lines[i + 1]))) {
      para.push(lines[i]); i++;
    }
    blocks.push(
      <div key={k++} style={{ margin: (blocks.length ? '6px' : '0') + ' 0 0', lineHeight: 1.65 }}>
        {para.map((p, pi) => (
          <React.Fragment key={pi}>{pi > 0 && <br />}{mdInline(p, 'p' + k + '_' + pi)}</React.Fragment>
        ))}
      </div>
    );
  }
  return <>{blocks}</>;
}

function fmtTime(ts, tz) {
  if (!ts) return "—";
  return new Date(ts * 1000).toLocaleTimeString([], {
    hour:'2-digit', minute:'2-digit', second:'2-digit',
    timeZone: resolveTz(tz),
  });
}

function fmtTimestamp(ts, dateFormat, tz) {
  if (!ts) return '—';
  return dateFormat === 'absolute' ? fmtTime(ts, tz) : timeAgo(ts);
}

function snrColor(snr) {

  if (snr >= 5) return "var(--accent-blue)";
  if (snr >= 0) return "var(--accent-amber)";

}

function batColor(level) {

  if (level > 60) return "var(--accent-green)";
  if (level > 30) return "var(--accent-amber)";

}

function signalQuality(snr, rssi) {
  if (snr == null && rssi == null) return { label: "Unknown", cls: "" };

  return { label: "Poor", cls: "tag-red" };
}

// Node health score: 0–100 composite of battery, signal, recency, channel load, uptime
function nodeHealthScore(n) {
  const now = Math.floor(Date.now() / 1000);
  let score = 0;

  // Battery (0–30 pts)
  if (n.battery_level != null) {
    score += Math.round(n.battery_level * 0.30);
  } else {
    score += 15; // unknown — assume mid
  }

  // SNR (0–25 pts)
  const snr = n.snr;
  if (snr != null) {
    if (snr >= 10)      score += 25;
    else if (snr >= 5)  score += 18;
    else if (snr >= 0)  score += 10;
    else                score += 2;
  } else {
    score += 12; // unknown — assume mid
  }

  // Last heard recency (0–25 pts)
  if (n.last_heard) {
    const age = now - n.last_heard;
    if (age < 300)        score += 25; // <5 min
    else if (age < 900)   score += 20; // <15 min
    else if (age < 1800)  score += 12; // <30 min
    else if (age < 3600)  score += 5;  // <1 hr
  }

  // Channel utilisation (0–10 pts) — lower is healthier
  if (n.channel_util != null) {
    if (n.channel_util < 10)      score += 10;
    else if (n.channel_util < 20) score += 7;
    else if (n.channel_util < 40) score += 4;
  } else {
    score += 5;
  }

  // Uptime stability (0–10 pts)
  if (n.uptime != null) {
    if (n.uptime > 86400)      score += 10; // >1 day
    else if (n.uptime > 43200) score += 7;  // >12 hr
    else if (n.uptime > 3600)  score += 4;  // >1 hr
    else                       score += 1;
  } else {
    score += 5;
  }

  return Math.min(100, Math.max(0, score));
}

function healthColor(score) {
  if (score >= 80) return 'var(--accent-green)';
  if (score >= 60) return 'var(--accent-blue)';
  if (score >= 40) return 'var(--accent-amber)';
  return 'var(--accent-red)';
}

function HealthBadge({ node, size = 'normal' }) {
  const score = nodeHealthScore(node);
  const color = healthColor(score);
  const r = size === 'large' ? 22 : 14;
  const stroke = size === 'large' ? 4 : 3;
  const circ = 2 * Math.PI * r;
  const dash = (score / 100) * circ;
  const fontSize = size === 'large' ? 14 : 10;
  return (
    <span title={`Health: ${score}/100`} style={{display:'inline-flex',alignItems:'center',gap:4,cursor:'default'}}>
      <svg width={r*2+stroke*2} height={r*2+stroke*2} viewBox={`0 0 ${r*2+stroke*2} ${r*2+stroke*2}`} style={{transform:'rotate(-90deg)'}}>
        <circle cx={r+stroke} cy={r+stroke} r={r} fill="none" stroke="var(--bg-input)" strokeWidth={stroke}/>
        <circle cx={r+stroke} cy={r+stroke} r={r} fill="none" stroke={color} strokeWidth={stroke}
          strokeDasharray={`${dash} ${circ}`} strokeLinecap="round" style={{transition:'stroke-dasharray 0.5s ease'}}/>
      </svg>
      <span style={{fontSize,fontFamily:'var(--font-mono)',color,fontWeight:600}}>{score}</span>
    </span>
  );
}

// API helpers
// ═══════════════════════════════════════════════
const DEFAULT_API_TIMEOUT_MS = 8000;

function apiTimeoutFor(url, method = 'GET', explicitMs) {
  if (Number.isFinite(explicitMs) && explicitMs > 0) return explicitMs;
  const path = String(url || '');
  if (path === '/api/wifi/connect') return 45000;
  if (path === '/api/hotspot/start') return 30000;
  if (path.startsWith('/api/device/config/')) return 15000;
  if (path === '/api/device/owner') return 15000;
  if (path === '/api/factory-reset') return 20000;
  if (path === '/api/factory-defaults/capture') return 20000;
  return DEFAULT_API_TIMEOUT_MS;
}

async function apiRequest(url, { method = 'GET', data, timeoutMs, headers = {} } = {}) {
  const controller = new AbortController();
  const requestTimeoutMs = apiTimeoutFor(url, method, timeoutMs);
  const timer = setTimeout(() => controller.abort(), requestTimeoutMs);
  try {
    const init = {
      method,
      headers: { ...headers },
      signal: controller.signal,
    };
    if (data !== undefined) {
      init.headers['Content-Type'] = 'application/json';
      init.body = JSON.stringify(data);
    }
    const r = await fetch(url, init);
    let body = null;
    try { body = await r.json(); } catch {}
    if (!r.ok) throw new Error(body?.error || `Request failed: ${r.status}`);
    return body;
  } catch (err) {
    if (err && err.name === 'AbortError') {
      throw new Error(`Request timed out after ${Math.round(requestTimeoutMs / 1000)}s`);
    }
    throw err;
  } finally {
    clearTimeout(timer);
  }
}

const api = {
  get: (url, opts) => apiRequest(url, { ...opts, method: 'GET' }),
  post: (url, data, opts) => apiRequest(url, { ...opts, method: 'POST', data }),
  put: (url, data, opts) => apiRequest(url, { ...opts, method: 'PUT', data }),
  patch: (url, data, opts) => apiRequest(url, { ...opts, method: 'PATCH', data }),
  del: (url, opts) => apiRequest(url, { ...opts, method: 'DELETE' }),
};

const SettingsContext = createContext({
  units: 'metric', date_format: 'relative', timezone: 'auto', show_offline_nodes: 'true',
  node_online_window_h: '2', dashboard_refresh_s: '5', map_default_zoom: '13',
  battery_alert_pct: '20', node_offline_min: '30', serial_port: '/dev/ttyACM0',
});
function useSettings() { return useContext(SettingsContext); }

function validateSettings(s) {
  const errors = {};
  const webPort = parseInt(s.web_port);
  if (isNaN(webPort) || webPort < 1024 || webPort > 65535)
    errors.web_port = 'Must be 1024–65535';
  const refresh = parseInt(s.dashboard_refresh_s);
  if (isNaN(refresh) || refresh < 1 || refresh > 60)
    errors.dashboard_refresh_s = 'Must be 1–60 seconds';
  const battery = parseInt(s.battery_alert_pct);
  if (isNaN(battery) || battery < 5 || battery > 50)
    errors.battery_alert_pct = 'Must be 5–50%';
  const offlineMin = parseInt(s.node_offline_min);
  if (isNaN(offlineMin) || offlineMin < 5 || offlineMin > 1440)
    errors.node_offline_min = 'Must be 5–1440 minutes';
  const zoom = parseInt(s.map_default_zoom);
  if (isNaN(zoom) || zoom < 1 || zoom > 19)
    errors.map_default_zoom = 'Must be 1–19';
  const onlineWin = parseInt(s.node_online_window_h);
  if (isNaN(onlineWin) || onlineWin < 1 || onlineWin > 24)
    errors.node_online_window_h = 'Must be 1–24 hours';
  return errors;
}

// Helper: is a node currently online?
// Own node is "online" when the device is connected (it has no last_heard).
// Other nodes are online if heard within the node_online_window_h setting.
function nodeOnline(n, myNodeId, deviceConnected, onlineWindowH) {
  if (myNodeId && n.node_id === myNodeId) return !!deviceConnected;
  const windowSec = (parseFloat(onlineWindowH) || 2) * 3600;
  return !!(n.last_heard && (Date.now()/1000 - n.last_heard) < windowSec);
}

function useDashWidgets() {
  const migrateWidgets = (stored) => {
    if (!Array.isArray(stored)) return null;
    const seen = new Set();
    const migrated = [];
    const add = (widget) => {
      if (!widget || !widget.id || seen.has(widget.id)) return;
      seen.add(widget.id);
      migrated.push(widget);
    };

    for (const widget of stored) {
      if (!widget || !widget.id) continue;
      if (widget.id === 'stat_overview') {
        const enabled = widget.enabled !== false;
        for (const def of DEFAULT_DASH_WIDGETS.filter(w => w.id.startsWith('stat_'))) {
          add({ ...def, enabled });
        }
        continue;
      }
      if (DEFAULT_DASH_WIDGETS.some(w => w.id === widget.id)) add(widget);
    }

    for (const def of DEFAULT_DASH_WIDGETS) {
      if (!seen.has(def.id)) migrated.push(def);
    }
    return migrated;
  };

  const [widgets, setWidgets] = React.useState(() => {
    try {
      const stored = JSON.parse(localStorage.getItem('dashWidgets') || 'null');
      const migrated = migrateWidgets(stored);
      return migrated || DEFAULT_DASH_WIDGETS;
    } catch { return DEFAULT_DASH_WIDGETS; }
  });

  const save = (w) => { setWidgets(w); localStorage.setItem('dashWidgets', JSON.stringify(w)); };
  const toggle   = (id) => save(widgets.map(w => w.id === id ? {...w, enabled: !w.enabled} : w));
  const moveUp   = (id) => { const i = widgets.findIndex(w => w.id === id); if (i <= 0) return; const next = [...widgets]; [next[i-1], next[i]] = [next[i], next[i-1]]; save(next); };
  const moveDown = (id) => { const i = widgets.findIndex(w => w.id === id); if (i >= widgets.length - 1) return; const next = [...widgets]; [next[i], next[i+1]] = [next[i+1], next[i]]; save(next); };
  const reset    = () => save(DEFAULT_DASH_WIDGETS);

  return { widgets, toggle, moveUp, moveDown, reset };
}

    ? (gpsConnected ? (gpsDeadReckoning ? 'var(--accent-amber)' : 'var(--accent-green)') : 'var(--accent-amber)')
    : 'var(--accent-red)';
  const atlasStatusValue = !atlasConnected
    ? `${atlasLabel} Offline`
    : !gpsConnected
      ? `${atlasLabel} · GPS Offline`
      : gpsDeadReckoning
        ? `${atlasLabel} · GPS DR`
        : gpsFix
          ? `${atlasLabel} · GPS Fix`
          : `${atlasLabel} · GPS No Fix`;
  const atlasStatusSub = [
    device && device.port ? device.port : null,
    device && device.my_node_id ? device.my_node_id : null,
    gpsSub,
  ].filter(Boolean).join(' · ');

  // Signal buckets
  const sigBuckets = { Excellent: 0, Good: 0, Fair: 0, Poor: 0, Unknown: 0 };
  nodes.forEach(n => { const q = signalQuality(n.snr, n.rssi); sigBuckets[q.label] = (sigBuckets[q.label] || 0) + 1; });

  // Role breakdown
  const roles = {};
  nodes.forEach(n => { const r = n.role || 'UNKNOWN'; roles[r] = (roles[r] || 0) + 1; });
  const roleEntries = Object.entries(roles).sort((a,b) => b[1] - a[1]);
  const roleColor = r => r==='ROUTER'?'var(--accent-blue)':r==='CLIENT'?'var(--accent-green)':r==='SENSOR'?'var(--accent-amber)':r==='REPEATER'?'#a78bfa':'var(--text-muted)';

  const renderStatWidget = (id) => {
    switch (id) {
      case 'stat_total_nodes': return (
        <div key={id} className="stat-card">
          <div className="stat-label">Total Nodes</div>
          <div className="stat-value" style={{color:'var(--accent-blue)'}}>{stats.total_nodes || 0}</div>
          <div className="stat-sub">{onlineNodes.length} online · {pctOnline}%</div>
        </div>
      );

      case 'stat_total_messages': return (
        <div key={id} className="stat-card">
          <div className="stat-label">Messages</div>
          <div className="stat-value" style={{color:'var(--accent-green)'}}>{stats.total_messages || 0}</div>
          <div className="stat-sub">across all channels</div>
        </div>
      );

      case 'stat_atlas_status': return (
        <div key={id} className="stat-card">
          <div className="stat-label">{atlasLabel} + GPS</div>
          <div className="stat-value" style={{color: atlasStatusColor, fontSize: 18, lineHeight: 1.2}}>
            {atlasStatusValue}
          </div>
          <div className="stat-sub" style={{fontSize: 10.5, lineHeight: 1.35}}>
            {atlasStatusSub || 'Heltec V4 and GPS status unavailable'}
          </div>
        </div>
      );

      case 'stat_atlas_battery': return (
        <div key={id} className="stat-card">
          <div className="stat-label">Atlas Battery</div>
          <div className="stat-value" style={{color: atlasBatteryColor}}>
            {atlasBatteryPct != null ? `${atlasBatteryPct}%` : '—'}
          </div>
          <div className="stat-sub">{atlasBatterySub}</div>
        </div>
      );

      case 'stat_active_alerts': return (
        <div key={id} className="stat-card">
          <div className="stat-label">Active Alerts</div>
          <div className="stat-value" style={{color: stats.unacked_alerts > 0 ? 'var(--accent-red)' : 'var(--accent-green)'}}>{stats.unacked_alerts || 0}</div>
          <div className="stat-sub">unacknowledged</div>
        </div>
      );

      case 'stat_channel_util': return (
        <div key={id} className="stat-card">
          <div className="stat-label">Avg Channel Util</div>
          <div className="stat-value" style={{color:'var(--accent-amber)'}}>{avgChannelUtil}%</div>
          <div className="stat-sub">{avgAirUtil}% air TX util</div>
        </div>
      );

      case 'stat_avg_snr': return (
        <div key={id} className="stat-card">
          <div className="stat-label">Avg SNR</div>
          <div className="stat-value" style={{color: avgSnr == null ? 'var(--text-muted)' : avgSnr > 5 ? 'var(--accent-green)' : avgSnr > 0 ? 'var(--accent-amber)' : 'var(--accent-red)'}}>
            {avgSnr != null ? avgSnr.toFixed(1) : '—'}
          </div>
          <div className="stat-sub">dB · {nodesWithSnr.length} reporting</div>
        </div>
      );

      case 'stat_mesh_avg_battery': return (
        <div key={id} className="stat-card">
          <div className="stat-label">Mesh Avg Battery</div>
          <div className="stat-value" style={{color: avgBat != null ? batColor(avgBat) : 'var(--text-muted)'}}>
            {avgBat != null ? avgBat + '%' : '—'}
          </div>
          <div className="stat-sub">{nodesWithBat.length} reporting</div>
        </div>
      );

      default: return null;
    }
  };

  const renderWidget = (id) => {
    switch (id) {

      case 'network_health': return (
        <div key={id} className="card">
          <div className="card-header"><div className="card-title">Network Health</div></div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))',gap:12}}>
            {[
              { label:'Nodes Online',   val:`${onlineNodes.length} / ${nodes.length}`, sub:`${pctOnline}% of fleet`,   color: pctOnline>=80?'var(--accent-green)':pctOnline>=50?'var(--accent-amber)':'var(--accent-red)' },
              { label:'Avg SNR',        val: avgSnr  != null ? avgSnr.toFixed(1)+' dB'  : '—', sub:'signal-to-noise', color: avgSnr==null?'var(--text-muted)':avgSnr>5?'var(--accent-green)':avgSnr>0?'var(--accent-amber)':'var(--accent-red)' },
              { label:'Avg RSSI',       val: avgRssi != null ? avgRssi+' dBm' : '—',           sub:'signal strength',  color: avgRssi==null?'var(--text-muted)':avgRssi>-80?'var(--accent-green)':avgRssi>-100?'var(--accent-amber)':'var(--accent-red)' },
              { label:'Channel Load',   val: avgChannelUtil+'%',                                sub: avgAirUtil+'% air TX', color: parseFloat(avgChannelUtil)<30?'var(--accent-green)':parseFloat(avgChannelUtil)<60?'var(--accent-amber)':'var(--accent-red)' },
            ].map(({label,val,sub,color}) => (
              <div key={label} style={{background:'var(--bg-tertiary)',borderRadius:8,padding:'12px 14px'}}>
                <div style={{fontSize:11,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:4}}>{label}</div>
                <div style={{fontSize:22,fontFamily:'var(--font-mono)',fontWeight:700,color}}>{val}</div>
                <div style={{fontSize:11,color:'var(--text-muted)',marginTop:3}}>{sub}</div>
              </div>
            ))}
          </div>
        </div>
      );

      case 'phone_trackers': {
        const now = Math.floor(Date.now() / 1000);
        const active = trackerDevices.filter(d => d.latitude && d.longitude && (now - (d.last_seen||0)) < 300);
        const stale  = trackerDevices.filter(d => (now - (d.last_seen||0)) >= 300);
        const trackerUrl = window.location.origin + '/tracker';
        return (
          <div key={id} className="card">
            <div className="card-header">
              <div className="card-title">📱 Phone Trackers</div>
              <button className="btn btn-sm" onClick={() => setPage('map')}>View on Map</button>
            </div>
            {trackerDevices.length === 0 ? (
              <div>
                <div style={{color:'var(--text-muted)',fontSize:13,marginBottom:12}}>No phones connected yet.</div>
                <div style={{fontSize:12,color:'var(--text-secondary)',marginBottom:6}}>Share this link with teammates:</div>
                <div style={{background:'var(--bg-tertiary)',borderRadius:6,padding:'8px 12px',fontFamily:'var(--font-mono)',fontSize:12,color:'var(--accent-blue)',wordBreak:'break-all'}}>{trackerUrl}</div>
              </div>
            ) : (
              <div style={{display:'flex',flexDirection:'column',gap:0}}>
                {active.map(d => (
                  <div key={d.id} style={{display:'flex',alignItems:'center',gap:12,padding:'9px 0',borderBottom:'1px solid var(--border)'}}>
                    <div style={{width:10,height:10,borderRadius:'50%',background:d.color||'var(--accent-blue)',flexShrink:0,boxShadow:`0 0 6px ${d.color||'#3b82f6'}`}}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:600,fontSize:13,color:'var(--text-primary)'}}>{d.name}</div>
                      <div style={{fontSize:11,color:'var(--text-muted)'}}>{d.latitude?.toFixed(5)}, {d.longitude?.toFixed(5)}</div>
                    </div>
                    <div style={{textAlign:'right',flexShrink:0}}>
                      {d.battery != null && <div style={{fontSize:12,color:batColor(Math.round(d.battery*100)),fontFamily:'var(--font-mono)'}}>{Math.round(d.battery*100)}%</div>}
                      <div style={{fontSize:11,color:'var(--accent-green)'}}>live</div>
                    </div>
                  </div>
                ))}
                {stale.map(d => (
                  <div key={d.id} style={{display:'flex',alignItems:'center',gap:12,padding:'9px 0',borderBottom:'1px solid var(--border)',opacity:0.5}}>
                    <div style={{width:10,height:10,borderRadius:'50%',background:'var(--text-muted)',flexShrink:0}}/>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:600,fontSize:13,color:'var(--text-muted)'}}>{d.name}</div>
                    </div>
                    <div style={{fontSize:11,color:'var(--text-muted)'}}>offline</div>
                  </div>
                ))}
                <div style={{paddingTop:10,fontSize:11,color:'var(--text-muted)'}}>
                  Tracker URL: <span style={{color:'var(--accent-blue)',fontFamily:'var(--font-mono)'}}>{trackerUrl}</span>
                </div>
              </div>
            )}
          </div>
        );
      }

      case 'battery_fleet': return (
        <div key={id} className="card">
          <div className="card-header"><div className="card-title">Battery Fleet Status</div></div>
          <div style={{display:'flex',flexDirection:'column',gap:9}}>
            {[
              { label:'Critical  (<20%)', count:batCritical, color:'var(--accent-red)' },
              { label:'Low  (20–49%)',    count:batLow,      color:'var(--accent-amber)' },
              { label:'Good  (≥50%)',     count:batGood,     color:'var(--accent-green)' },
              { label:'Unknown',          count:batUnknown,  color:'var(--text-muted)' },
            ].map(({label,count,color}) => (
              <div key={label} style={{display:'flex',alignItems:'center',gap:10}}>
                <div style={{width:130,fontSize:12,color:'var(--text-secondary)',flexShrink:0}}>{label}</div>
                <div style={{flex:1,background:'var(--bg-tertiary)',borderRadius:4,height:14,overflow:'hidden'}}>
                  <div style={{height:'100%',width:nodes.length?`${(count/nodes.length)*100}%`:'0%',background:color,borderRadius:4,transition:'width .3s'}} />
                </div>
                <div style={{width:28,fontSize:12,fontFamily:'var(--font-mono)',color,textAlign:'right'}}>{count}</div>
              </div>
            ))}
            {lowestBat.length > 0 && (
              <div style={{marginTop:4,paddingTop:8,borderTop:'1px solid var(--border)',fontSize:11,color:'var(--text-muted)'}}>
                Lowest: {lowestBat.map(n => `${n.alias||n.long_name} ${n.battery_level}%`).join(' · ')}
              </div>
            )}
          </div>
        </div>
      );

      case 'signal_health': return (
        <div key={id} className="card">
          <div className="card-header"><div className="card-title">Signal Distribution</div></div>
          <div style={{display:'flex',flexDirection:'column',gap:9}}>
            {[
              { label:'Excellent', color:'var(--accent-green)' },
              { label:'Good',      color:'var(--accent-blue)' },
              { label:'Fair',      color:'var(--accent-amber)' },
              { label:'Poor',      color:'var(--accent-red)' },
              { label:'Unknown',   color:'var(--text-muted)' },
            ].map(({label,color}) => {
              const count = sigBuckets[label] || 0;
              return (
                <div key={label} style={{display:'flex',alignItems:'center',gap:10}}>
                  <div style={{width:80,fontSize:12,color:'var(--text-secondary)',flexShrink:0}}>{label}</div>
                  <div style={{flex:1,background:'var(--bg-tertiary)',borderRadius:4,height:14,overflow:'hidden'}}>
                    <div style={{height:'100%',width:nodes.length?`${(count/nodes.length)*100}%`:'0%',background:color,borderRadius:4,transition:'width .3s'}} />
                  </div>
                  <div style={{width:28,fontSize:12,fontFamily:'var(--font-mono)',color,textAlign:'right'}}>{count}</div>
                </div>
              );
            })}
          </div>
        </div>
      );

      case 'node_roles': return (
        <div key={id} className="card">
          <div className="card-header"><div className="card-title">Node Roles</div></div>
          {roleEntries.length === 0
            ? <div style={{color:'var(--text-muted)',fontSize:13}}>No nodes</div>
            : <div style={{display:'flex',flexDirection:'column',gap:9}}>
                {roleEntries.map(([role,count]) => (
                  <div key={role} style={{display:'flex',alignItems:'center',gap:10}}>
                    <div style={{width:90,fontSize:12,color:'var(--text-secondary)',flexShrink:0}}>{role}</div>
                    <div style={{flex:1,background:'var(--bg-tertiary)',borderRadius:4,height:14,overflow:'hidden'}}>
                      <div style={{height:'100%',width:nodes.length?`${(count/nodes.length)*100}%`:'0%',background:roleColor(role),borderRadius:4,transition:'width .3s'}} />
                    </div>
                    <div style={{width:28,fontSize:12,fontFamily:'var(--font-mono)',color:roleColor(role),textAlign:'right'}}>{count}</div>
                  </div>
                ))}
              </div>
          }
        </div>
      );

      case 'online_nodes': return (
        <div key={id} className="card">
          <div className="card-header">
            <div className="card-title">Online Nodes</div>
            <button className="btn btn-sm" onClick={() => setPage('mesh')}>View All</button>
          </div>
          <div className="table-wrap">
            <table>
              <thead><tr><th>Name</th><th>Signal</th><th>Battery</th><th>Last Heard</th></tr></thead>
              <tbody>
                {onlineNodes.slice(0,8).map(n => {
                  const sq = signalQuality(n.snr, n.rssi);
                  return (
                    <tr key={n.node_id}>
                      <td>
                        <span style={{color:'var(--text-primary)',fontWeight:500}}>{n.alias||n.long_name}</span><br/>
                        <span className="mono" style={{fontSize:11,color:'var(--text-muted)'}}>{n.node_id}</span>
                      </td>
                      <td><span className={`tag ${sq.cls}`}>{sq.label}</span></td>
                      <td>{n.battery_level != null ? <span style={{color:batColor(n.battery_level),fontFamily:'var(--font-mono)'}}>{n.battery_level}%</span> : '—'}</td>
                      <td className="mono" style={{fontSize:12}}>{fmtTimestamp(n.last_heard, date_format, timezone)}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      );

      case 'recent_messages': return (
        <div key={id} className="card">
          <div className="card-header">
            <div className="card-title">Recent Messages</div>
            <button className="btn btn-sm" onClick={() => setPage('comms')}>View All</button>
          </div>
          <div className="msg-list" style={{maxHeight:340}}>
            {recentMsgs.map((m,i) => (
              <div className="msg-item" key={i}>
                <div className="msg-header">
                  <span className="msg-from">{m.from_id}</span>
                  <span style={{color:'var(--text-muted)',fontSize:11}}>→ {m.to_id === '^all' ? 'Broadcast' : m.to_id}</span>
                  <span className="msg-time">{fmtTime(m.rx_time)}</span>
                </div>
                <div className="msg-text">{m.text}</div>
              </div>
            ))}
          </div>
        </div>
      );

      case 'active_alerts': return recentAlerts.length > 0 ? (
        <div key={id} className="card">
          <div className="card-header">
            <div className="card-title">Active Alerts</div>
            <button className="btn btn-sm" onClick={() => setPage('comms')}>View All</button>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {recentAlerts.map(a => (
              <AlertItem key={a.id} alert={a} onAck={() => api.post(`/api/alerts/${a.id}/ack`)} />
            ))}
          </div>
        </div>
      ) : null;

      default: return null;
    }
  };

  return (
    <div className="page">
      {/* Dashboard header */}
      <div style={{display:'flex',justifyContent:'flex-end',marginBottom:8}}>
        <button className="btn btn-sm" onClick={() => setCustomizing(c => !c)}
          style={{background: customizing ? 'var(--accent-color)' : '', color: customizing ? '#ffffff' : ''}}>
          {customizing ? '✕ Done' : '⊞ Customize'}
        </button>
      </div>

      {/* Customize panel */}
      <div style={{
        overflow:'hidden',
        maxHeight: customizing ? '600px' : '0px',
        opacity: customizing ? 1 : 0,
        marginBottom: customizing ? 16 : 0,
        transition: 'max-height 300ms ease, opacity 200ms ease, margin-bottom 300ms ease',
        pointerEvents: customizing ? 'auto' : 'none',
      }}>
        <div className="card" style={{padding:16}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <div style={{fontSize:13,fontWeight:600,color:'var(--text-primary)'}}>Dashboard Widgets</div>
            <button className="btn btn-sm" onClick={reset} style={{fontSize:11}}>Reset to Default</button>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:6,maxHeight:'420px',overflowY:'auto',paddingRight:4}}>
            {(() => {
              const statItems = widgets.filter(w => w.id.startsWith('stat_'));
              const otherItems = widgets.filter(w => !w.id.startsWith('stat_'));
              return (
                <>
                  <details open style={{background:'var(--bg-tertiary)',borderRadius:8,padding:'8px 10px'}}>
                    <summary style={{cursor:'pointer',listStyle:'none',display:'flex',alignItems:'center',justifyContent:'space-between',gap:12}}>
                      <span style={{fontSize:13,fontWeight:600,color:'var(--text-primary)'}}>Stats Overview</span>
                      <span style={{fontSize:11,color:'var(--text-muted)'}}>{statItems.filter(w => w.enabled).length} shown</span>
                    </summary>
                    <div style={{display:'flex',flexDirection:'column',gap:6,marginTop:10}}>
                      {statItems.map((w,idx) => (
                        <div key={w.id} style={{display:'flex',alignItems:'center',gap:10,padding:'7px 10px',background:'rgba(255,255,255,0.03)',borderRadius:6}}>
                          <input type="checkbox" checked={w.enabled} onChange={() => toggle(w.id)}
                            style={{accentColor:'var(--accent-color)',width:15,height:15,cursor:'pointer'}} />
                          <span style={{flex:1,fontSize:13,color: w.enabled ? 'var(--text-primary)' : 'var(--text-muted)'}}>{w.label}</span>
                          <button onClick={() => moveUp(w.id)}   disabled={widgets.findIndex(x => x.id === w.id)===0}                style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',padding:'0 4px',fontSize:14,opacity:widgets.findIndex(x => x.id === w.id)===0?0.25:1}}>↑</button>
                          <button onClick={() => moveDown(w.id)} disabled={widgets.findIndex(x => x.id === w.id)===widgets.length-1} style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',padding:'0 4px',fontSize:14,opacity:widgets.findIndex(x => x.id === w.id)===widgets.length-1?0.25:1}}>↓</button>
                        </div>
                      ))}
                    </div>
                  </details>
                  {otherItems.map((w,idx) => (
                    <div key={w.id} style={{display:'flex',alignItems:'center',gap:10,padding:'7px 10px',background:'var(--bg-tertiary)',borderRadius:6}}>
                      <input type="checkbox" checked={w.enabled} onChange={() => toggle(w.id)}
                        style={{accentColor:'var(--accent-color)',width:15,height:15,cursor:'pointer'}} />
                      <span style={{flex:1,fontSize:13,color: w.enabled ? 'var(--text-primary)' : 'var(--text-muted)'}}>{w.label}</span>
                      <button onClick={() => moveUp(w.id)}   disabled={widgets.findIndex(x => x.id === w.id)===0}                style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',padding:'0 4px',fontSize:14,opacity:widgets.findIndex(x => x.id === w.id)===0?0.25:1}}>↑</button>
                      <button onClick={() => moveDown(w.id)} disabled={widgets.findIndex(x => x.id === w.id)===widgets.length-1} style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',padding:'0 4px',fontSize:14,opacity:widgets.findIndex(x => x.id === w.id)===widgets.length-1?0.25:1}}>↓</button>
                    </div>
                  ))}
                </>
              );
            })()}
          </div>
        </div>
      </div>

      {/* Widgets in user-configured order */}
      <div style={{display:'flex',flexDirection:'column',gap:16}}>
        {statWidgets.length > 0 && (
          <div className="dash-grid">
            {statWidgets.map(w => renderStatWidget(w.id))}
          </div>
        )}
        {enabledWidgets.length > 0 ? (
          contentWidgets.map(w => renderWidget(w.id))
        ) : (
          <div className="card" style={{padding:20}}>
            <div className="card-header">
              <div className="card-title">Dashboard Hidden</div>
            </div>
            <div style={{color:'var(--text-muted)',fontSize:13,marginBottom:14}}>
              All dashboard widgets are currently disabled on this device, so the dashboard has nothing to render.
            </div>
            <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
              <button
                className="btn btn-sm btn-primary"
                onClick={() => {
                  reset();
                  setCustomizing(false);
                }}
              >
                Reset Dashboard
              </button>
              <button className="btn btn-sm" onClick={() => setCustomizing(true)}>
                Customize Widgets
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// Rename Modal
// ═══════════════════════════════════════════════
function RenameModal({ node, currentAlias, onSave, onClose }) {
  const [value, setValue] = useState(currentAlias || '');
  const [error, setError] = useState('');
  const nodeUrl = `/api/nodes/${encodeURIComponent(node.node_id)}/alias`;
  const save = async () => {
    if (!value.trim()) { setError('Please enter a name.'); return; }
    try {
      const result = await api.put(nodeUrl, { alias: value.trim() });
      if (result && result.error) { setError(result.error); return; }
      onSave(node.node_id, value.trim());
      onClose();
    } catch(e) {
      setError('Failed to save. Please try again.');
    }
  };
  const clear = async () => {
    try {
      await api.put(nodeUrl, { alias: '' });
      onSave(node.node_id, null);
      onClose();
    } catch(e) {
      setError('Failed to clear. Please try again.');
    }
  };
  return (
    <div className="rename-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="rename-modal">
        <h3>Rename Node</h3>
        <p>Set a custom display name for <span style={{color:'var(--accent-cyan)',fontFamily:'var(--font-mono)'}}>{node.long_name || node.node_id}</span></p>
        <input
          value={value}
          onChange={e => { setValue(e.target.value); setError(''); }}
          placeholder={node.long_name || node.short_name || node.node_id}
          onKeyDown={e => { if (e.key === 'Enter') save(); if (e.key === 'Escape') onClose(); }}
          autoFocus
        />
        {error && <div style={{color:'var(--accent-red)',fontSize:12,margin:'6px 0'}}>{error}</div>}
        <div className="rename-modal-actions">
          <button className="btn btn-sm" onClick={onClose}>Cancel</button>
          {currentAlias && (
            <button className="btn btn-sm" style={{color:'var(--accent-red)',borderColor:'var(--accent-red)'}} onClick={clear}>
              Clear
            </button>
          )}
          <button className="btn btn-sm btn-primary" onClick={save}>Save</button>
        </div>
      </div>
    </div>
  );
}
