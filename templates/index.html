                <div style={{ flex: 1, overflowY: 'auto', padding: 16, display: 'flex', flexDirection: 'column', gap: 14 }}>
                  {messages.length === 0 && !loading && (
                    <div style={{ textAlign: 'center', color: 'var(--text-muted)', fontSize: 13, marginTop: 32 }}>
                      {aiReady ? 'Start the conversation below.' : 'Ray is starting up. Chat will unlock automatically when ready.'}
                    </div>
                  )}
                  {messages.map((m, i) => {
                    // Split confidence footer out of assistant message content
                    let msgBody = m.content || '';
                    let confLabel = null;
                    if (m.role === 'assistant') {
                      const confMatch = msgBody.match(/\n\n---\nConfidence:\s*(.+)$/s);
                      if (confMatch) {
                        confLabel = confMatch[1].trim();
                        msgBody = msgBody.slice(0, confMatch.index).trimEnd();
                      }
                    }
                    const confTier = confLabel ? confLabel.split('|')[0].trim() : null;
                    const confColor = confTier === 'HIGH' ? 'var(--accent-green)' : confTier === 'MEDIUM' ? '#f59e0b' : '#ef4444';
                    return (
                    <div key={m.id || i} style={{ display: 'flex', flexDirection: 'column', alignItems: m.role === 'user' ? 'flex-end' : 'flex-start', gap: 3 }}>
                      {m.role === 'assistant' ? (
                        <>
                          <div className="card" style={{
                            maxWidth: '78%', padding: '10px 14px',
                            background: 'var(--bg-input)', border: '1px solid var(--border)',
                            borderRadius: '4px 12px 12px 12px',
                            fontSize: 14, lineHeight: 1.65, wordBreak: 'break-word',
                            color: 'var(--text-primary)',
                          }}>
                            <MarkdownMessage text={msgBody} />{m.streaming && <span style={{ display: 'inline-block', width: 2, height: '1em', background: 'var(--accent-green)', marginLeft: 2, verticalAlign: 'text-bottom', animation: 'blink 1s step-end infinite' }} />}
                          </div>
                          {confLabel && (
                            <div style={{ display: 'flex', alignItems: 'center', gap: 5, paddingLeft: 4 }}>
                              <span style={{ width: 6, height: 6, borderRadius: '50%', background: confColor, flexShrink: 0 }} />
                              <span style={{ fontSize: 10, color: 'var(--text-muted)', fontFamily: 'monospace' }}>{confLabel}</span>
                            </div>
                          )}
                          {(m.tokens || m.duration_ms) && (
                            <div className="mono" style={{ fontSize: 10, color: 'var(--text-muted)', paddingLeft: 4 }}>
                              {m.tokens && m.duration_ms ? `${(m.tokens / (m.duration_ms / 1000)).toFixed(1)} tok/s · ` : ''}
                              {m.duration_ms ? `${(m.duration_ms/1000).toFixed(1)}s` : ''}
                            </div>
                          )}
                        </>
                      ) : (
                        <div style={{
                          maxWidth: '78%', padding: '8px 12px',
                          fontSize: 14, lineHeight: 1.65, whiteSpace: 'pre-wrap', wordBreak: 'break-word',
                          color: 'var(--text-primary)',
                        }}>
                          {m.content}
                        </div>
                      )}
                    </div>
                  );
                  })}
                  {loading && !messages.some(m => m.streaming) && (
                    <div style={{ display: 'flex', alignItems: 'flex-start' }}>
                      <div style={{
                        padding: '10px 16px', borderRadius: '4px 12px 12px 12px',
                        background: 'var(--bg-input)', border: '1px solid var(--border)',
                        color: 'var(--text-muted)', fontSize: 14, fontStyle: 'italic',
                      }}>
                        Thinking…
                      </div>
                    </div>
                  )}
                  <div ref={chatEndRef}/>
                </div>
                <div style={{ borderTop: '1px solid var(--border)', padding: '10px 14px', display: 'flex', gap: 8, alignItems: 'center', flexShrink: 0 }}>
                  <input
                    value={input}
                    onChange={e => setInput(e.target.value)}
                    onKeyDown={e => e.key === 'Enter' && !e.shiftKey && sendMessage()}
                    placeholder={
                      !status?.running
                        ? 'Ollama not connected'
                        : !aiReady
                          ? 'Ray is starting up…'
                          : 'Send a message…'
                    }
                    disabled={!aiReady || loading}
                    style={{
                      flex: 1,
                      background: 'var(--bg-input)',
                      border: '1px solid var(--border)',
                      borderRadius: 'var(--radius)',
                      color: 'var(--text-primary)',
                      padding: '10px 14px',
                      fontSize: 14,
                      fontFamily: 'var(--font-sans)',
                      outline: 'none',
                    }}
                    onFocus={e => e.target.style.borderColor = 'var(--accent-green)'}
                    onBlur={e => e.target.style.borderColor = 'var(--border)'}
                  />
                  <button
                    className="btn btn-primary"
                    onClick={sendMessage}
                    disabled={!aiReady || loading || !input.trim()}
                  >
                    {Icons.send}
                  </button>
                </div>
              </>
            )}
          </div>
        )}

        {/* ── KNOWLEDGE BASE TAB ── */}
        {tab === 'kb' && (
          <div style={{ flex: 1, overflowY: 'auto', display: 'flex', flexDirection: 'column', gap: 12 }}>
            <div className="card" style={{ padding: 0, overflow: 'hidden' }}>
              <div style={{ padding: '10px 16px', borderBottom: '1px solid var(--border)', fontSize: 13, fontWeight: 600, color: 'var(--text-primary)' }}>
                Knowledge Base — {documents.length} document{documents.length !== 1 ? 's' : ''}
              </div>
              {documents.length === 0 ? (
                <div style={{ padding: 20, color: 'var(--text-muted)', fontSize: 13, textAlign: 'center' }}>No documents yet</div>
              ) : (
                <div style={{ maxHeight: 420, overflowY: 'auto' }}>
                  {documents.map(doc => (
                    <div key={doc.id} style={{ padding: '10px 16px', borderBottom: '1px solid var(--border)', display: 'flex', gap: 12, alignItems: 'flex-start' }}>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontWeight: 600, fontSize: 13, color: 'var(--text-primary)', marginBottom: 4 }}>{doc.title}</div>
                        {doc.tags && (
                          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4, marginBottom: 5 }}>
                            {doc.tags.split(',').map(t => t.trim()).filter(Boolean).map(t => (
                              <span key={t} className="tag tag-blue" style={{ fontSize: 10 }}>{t}</span>
                            ))}
                          </div>
                        )}
                        <div style={{ fontSize: 12, color: 'var(--text-muted)', lineHeight: 1.5 }}>
                          {doc.content.slice(0, 100)}{doc.content.length > 100 ? '…' : ''}
                        </div>
                      </div>
                      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 6, flexShrink: 0 }}>
                        <span className={`tag ${doc.is_seed ? 'tag-green' : 'tag-blue'}`} style={{ fontSize: 10 }}>
                          {doc.is_seed ? 'Seed' : 'Custom'}
                        </span>
                        <button
                          className="btn btn-sm"
                          style={{ color: 'var(--accent-red)', border: '1px solid var(--accent-red)', background: 'transparent', padding: '2px 8px' }}
                          onClick={() => deleteDocument(doc.id)}
                        >
                          Delete
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* Add document form */}
            <div className="card" style={{ padding: 16 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--text-primary)', marginBottom: 12 }}>Add Knowledge</div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                <div>
                  <label style={labelStyle}>Title</label>
                  <input style={inputStyle} value={newDoc.title} onChange={e => setNewDoc(p => ({...p, title: e.target.value}))} placeholder="Document title" />
                </div>
                <div>
                  <label style={labelStyle}>Tags (comma-separated)</label>
                  <input style={inputStyle} value={newDoc.tags} onChange={e => setNewDoc(p => ({...p, tags: e.target.value}))} placeholder="e.g. survival, water, medical" />
                </div>
                <div>
                  <label style={labelStyle}>Content</label>
                  <textarea
                    style={{ ...inputStyle, resize: 'vertical', minHeight: 100, fontFamily: 'inherit' }}
                    value={newDoc.content}
                    onChange={e => setNewDoc(p => ({...p, content: e.target.value}))}
                    placeholder="Document content…"
                    rows={5}
                  />
                </div>
                <button
                  className="btn btn-primary"
                  style={{ alignSelf: 'flex-start' }}
                  onClick={addDocument}
                  disabled={!newDoc.title.trim() || !newDoc.content.trim()}
                >
                  Add Document
                </button>
              </div>
            </div>
          </div>
        )}

        {/* ── SETTINGS TAB ── */}
        {tab === 'settings' && (
          <div style={{ flex: 1, overflowY: 'auto' }}>
            <div className="card" style={{ padding: 20, display: 'flex', flexDirection: 'column', gap: 20 }}>

              {/* Current runtime summary */}
              <div>
                <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--text-muted)', letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 12 }}>Current Runtime</div>
                <div style={{
                  display: 'grid',
                  gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))',
                  gap: 10,
                }}>
                  <div style={{ background: 'var(--bg-input)', border: '1px solid var(--border)', borderRadius: 'var(--radius)', padding: 12 }}>
                    <div style={{ fontSize: 11, color: 'var(--text-muted)', marginBottom: 4 }}>Active Chat Model</div>
                    <div className="mono" style={{ fontSize: 13, color: 'var(--text-primary)' }}>{settings.model || '—'}</div>
                  </div>
                  <div style={{ background: 'var(--bg-input)', border: '1px solid var(--border)', borderRadius: 'var(--radius)', padding: 12 }}>
                    <div style={{ fontSize: 11, color: 'var(--text-muted)', marginBottom: 4 }}>Loaded In Ollama</div>
                    <div className="mono" style={{ fontSize: 13, color: 'var(--text-primary)' }}>
                      {status?.loaded_models?.length ? status.loaded_models.join(', ') : 'None loaded'}
                    </div>
                  </div>
                  <div style={{ background: 'var(--bg-input)', border: '1px solid var(--border)', borderRadius: 'var(--radius)', padding: 12 }}>
                    <div style={{ fontSize: 11, color: 'var(--text-muted)', marginBottom: 4 }}>Embedding Model</div>
                    <div className="mono" style={{ fontSize: 13, color: 'var(--text-primary)' }}>{settings.embed_model || '—'}</div>
                  </div>
                  <div style={{ background: 'var(--bg-input)', border: '1px solid var(--border)', borderRadius: 'var(--radius)', padding: 12 }}>
                    <div style={{ fontSize: 11, color: 'var(--text-muted)', marginBottom: 4 }}>RAG / Docs</div>
                    <div className="mono" style={{ fontSize: 13, color: 'var(--text-primary)' }}>
                      {settings.rag_enabled === 'true' ? 'Enabled' : 'Disabled'} · {status?.doc_count ?? 0} docs
                    </div>
                  </div>
                </div>
              </div>

              {/* Model section */}
              <div>
                <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--text-muted)', letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 12 }}>Model</div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                  <div>
                    <label style={labelStyle}>Chat Model</label>
                    {status?.models && status.models.length > 0 ? (
                      <select
                        value={settings.model || ''}
                        onChange={e => setSettings(p => ({...p, model: e.target.value}))}
                        style={{ ...inputStyle, fontFamily: 'var(--font-mono)' }}
                      >
                        {settings.model && !status.models.includes(settings.model) && (
                          <option value={settings.model}>{settings.model} (not in Ollama)</option>
                        )}
                        {status.models.map(m => <option key={m} value={m}>{m}</option>)}
                      </select>
                    ) : (
                      <input style={inputStyle} value={settings.model || ''} onChange={e => setSettings(p => ({...p, model: e.target.value}))} placeholder="qwen3.5:2b" />
                    )}
                  </div>
                  <div>
                    <label style={labelStyle}>Embed Model</label>
                    <input style={{ ...inputStyle, fontFamily: 'var(--font-mono)' }} value={settings.embed_model || ''} onChange={e => setSettings(p => ({...p, embed_model: e.target.value}))} placeholder="qwen3-embedding:0.6b" />
                  </div>
                </div>
              </div>

              {/* Behavior section */}
              <div>
                <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--text-muted)', letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 12 }}>Behavior</div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                  <div>
                    <label style={labelStyle}>System Prompt</label>
                    <textarea
                      style={{ ...inputStyle, resize: 'vertical', fontFamily: 'inherit' }}
                      rows={4}
                      value={settings.system_prompt || ''}
                      onChange={e => setSettings(p => ({...p, system_prompt: e.target.value}))}
                    />
                  </div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                    <input type="checkbox" id="warmup" checked={settings.warmup_on_start === 'true'} onChange={e => setSettings(p => ({...p, warmup_on_start: e.target.checked ? 'true' : 'false'}))} />
                    <label htmlFor="warmup" style={{ fontSize: 13, color: 'var(--text-primary)', cursor: 'pointer' }}>Warmup model on startup</label>
                  </div>
                  <div>
                    <label style={labelStyle}>Keep-Alive Hours (1–24)</label>
                    <input type="number" min="1" max="24" style={{ ...inputStyle, width: 80 }} value={settings.keep_alive_hours || '10'} onChange={e => setSettings(p => ({...p, keep_alive_hours: e.target.value}))} />
                  </div>
                </div>
              </div>

              {/* RAG section */}
              <div>
                <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--text-muted)', letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 12 }}>Retrieval (RAG)</div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                    <input type="checkbox" id="rag_enabled" checked={settings.rag_enabled === 'true'} onChange={e => setSettings(p => ({...p, rag_enabled: e.target.checked ? 'true' : 'false'}))} />
                    <label htmlFor="rag_enabled" style={{ fontSize: 13, color: 'var(--text-primary)', cursor: 'pointer' }}>Enable RAG (inject relevant docs into context)</label>
                  </div>
                  <div>
                    <label style={labelStyle}>Top-K Documents (1–10)</label>
                    <input type="number" min="1" max="10" style={{ ...inputStyle, width: 80 }} value={settings.rag_top_k || '3'} onChange={e => setSettings(p => ({...p, rag_top_k: e.target.value}))} />
                  </div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                    <input type="checkbox" id="mesh_ctx" checked={settings.inject_mesh_context === 'true'} onChange={e => setSettings(p => ({...p, inject_mesh_context: e.target.checked ? 'true' : 'false'}))} />
                    <label htmlFor="mesh_ctx" style={{ fontSize: 13, color: 'var(--text-primary)', cursor: 'pointer' }}>Inject mesh network context (nodes + recent messages)</label>
                  </div>
                </div>
              </div>

              {/* Inference section */}
              <div>
                <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--text-muted)', letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 12 }}>Inference</div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
                    <div>
                      <label style={labelStyle}>Temperature (0–2)</label>
                      <input type="number" min="0" max="2" step="0.05" style={{ ...inputStyle, width: '100%' }} value={settings.temperature ?? '0.3'} onChange={e => setSettings(p => ({...p, temperature: e.target.value}))} />
                      <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 3 }}>Lower = focused, higher = creative</div>
                    </div>
                    <div>
                      <label style={labelStyle}>Top-P (0–1)</label>
                      <input type="number" min="0" max="1" step="0.05" style={{ ...inputStyle, width: '100%' }} value={settings.top_p ?? '0.9'} onChange={e => setSettings(p => ({...p, top_p: e.target.value}))} />
                      <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 3 }}>Nucleus sampling cutoff</div>
                    </div>
                    <div>
                      <label style={labelStyle}>Top-K (1–100)</label>
                      <input type="number" min="1" max="100" style={{ ...inputStyle, width: '100%' }} value={settings.top_k ?? '40'} onChange={e => setSettings(p => ({...p, top_k: e.target.value}))} />
                      <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 3 }}>Token candidates per step</div>
                    </div>
                    <div>
                      <label style={labelStyle}>Max Response Tokens</label>
                      <input type="number" min="64" max="4096" step="64" style={{ ...inputStyle, width: '100%' }} value={settings.num_predict ?? '512'} onChange={e => setSettings(p => ({...p, num_predict: e.target.value}))} />
                      <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 3 }}>Max tokens generated per reply</div>
                    </div>
                  </div>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
                    <div>
                      <label style={labelStyle}>Context Window (num_ctx)</label>
                      <input type="number" min="512" max="8192" step="512" style={{ ...inputStyle, width: '100%' }} value={settings.num_ctx ?? '4096'} onChange={e => setSettings(p => ({...p, num_ctx: e.target.value}))} />
                      <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 3 }}>Lower = faster responses</div>
                    </div>
                    <div>
                      <label style={labelStyle}>GPU Layers (num_gpu)</label>
                      <input type="number" min="0" max="99" style={{ ...inputStyle, width: '100%' }} value={settings.num_gpu ?? '99'} onChange={e => setSettings(p => ({...p, num_gpu: e.target.value}))} />
                      <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 3 }}>99 = all layers on GPU</div>
                    </div>
                  </div>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
                    <div>
                      <label style={labelStyle}>CPU Threads (num_thread)</label>
                      <input type="number" min="1" max="32" style={{ ...inputStyle, width: '100%' }} value={settings.num_thread ?? '6'} onChange={e => setSettings(p => ({...p, num_thread: e.target.value}))} />
                      <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 3 }}>Inference worker threads</div>
                    </div>
                    <div>
                      <label style={labelStyle}>Batch Size (num_batch)</label>
                      <input type="number" min="1" max="2048" step="1" style={{ ...inputStyle, width: '100%' }} value={settings.num_batch ?? '512'} onChange={e => setSettings(p => ({...p, num_batch: e.target.value}))} />
                      <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 3 }}>Prompt processing batch size</div>
                    </div>
                  </div>
                </div>
              </div>

              {/* Save button */}
              <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                <button className="btn btn-primary" onClick={saveSettings} disabled={savingSettings || warmingUp}>
                  {savingSettings ? 'Saving…' : 'Save Settings'}
                </button>
                {settingsSaved && !warmingUp && <span style={{ color: 'var(--accent-green)', fontSize: 13, fontWeight: 500 }}>Saved!</span>}
                {warmingUp && <span style={{ color: 'var(--accent)', fontSize: 13, fontWeight: 500 }}>Loading model…</span>}
                {saveError && <span style={{ color: 'var(--accent-red, #f87171)', fontSize: 13, fontWeight: 500 }}>Error: {saveError}</span>}
              </div>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════
// System Stats Page
// ═══════════════════════════════════════════════
function SystemPage() {
  const { units } = useSettings();
  const [stats, setStats] = useState(null);
  const [error, setError] = useState(null);
  const loadingRef = useRef(false);
  const statsRef = useRef(null);

  useEffect(() => {
    statsRef.current = stats;
  }, [stats]);

  const load = useCallback(async () => {
    if (loadingRef.current) return;
    loadingRef.current = true;
    try {
      const s = await api.get('/api/system/stats');
      setStats(s);
      setError(null);
    } catch(e) {
      if (!statsRef.current) setError('Failed to load system stats');
    } finally {
      loadingRef.current = false;
    }
  }, []);

  useEffect(() => {
    load();
    const iv = setInterval(load, 3000);
    return () => clearInterval(iv);
  }, [load]);

  function fmtUptime(s) {
    if (!s) return '—';
    const d = Math.floor(s / 86400), h = Math.floor((s % 86400) / 3600), m = Math.floor((s % 3600) / 60);
    return d > 0 ? `${d}d ${h}h ${m}m` : h > 0 ? `${h}h ${m}m` : `${m}m`;
  }

  function Bar({ pct, color }) {
    const c = color || (pct > 85 ? 'var(--accent-red)' : pct > 60 ? 'var(--accent-amber)' : 'var(--accent-green)');
    return (
      <div style={{height:6,background:'var(--border)',borderRadius:3,overflow:'hidden'}}>
        <div style={{height:'100%',width:`${Math.min(pct,100)}%`,background:c,borderRadius:3,transition:'width 0.5s'}}/>
      </div>
    );
  }

  function StatCard({ label, value, sub, pct, color }) {
    return (
      <div className="card" style={{padding:'14px 16px',display:'flex',flexDirection:'column',gap:6}}>
        <div style={{fontSize:11,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.08em'}}>{label}</div>
        <div style={{fontSize:24,fontWeight:700,color:'var(--text-primary)',fontFamily:'var(--font-mono)'}}>{value}</div>
        {sub && <div style={{fontSize:11,color:'var(--text-muted)'}}>{sub}</div>}
        {pct != null && <Bar pct={pct} color={color}/>}
      </div>
    );
  }

  function TempBadge({ label, val }) {
    if (val == null) return null;
    const displayVal = units === 'imperial' ? (val * 9/5 + 32).toFixed(1) : val;
    const unit = units === 'imperial' ? '°F' : '°C';
    const color = val > 80 ? 'var(--accent-red)' : val > 65 ? 'var(--accent-amber)' : 'var(--accent-green)';
    return (
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4,padding:'10px 14px',background:'var(--bg-input)',border:'1px solid var(--border)',borderRadius:'var(--radius)'}}>
        <div style={{fontSize:10,color:'var(--text-muted)',textTransform:'uppercase'}}>{label}</div>
        <div style={{fontSize:18,fontWeight:700,color,fontFamily:'var(--font-mono)'}}>{displayVal}{unit}</div>
      </div>
    );
  }

  if (error) return <div className="page"><div style={{color:'var(--accent-red)',padding:16}}>{error}</div></div>;
  if (!stats) return <div className="page"><div style={{color:'var(--text-muted)',padding:16}}>Loading…</div></div>;

  const cpuCores = stats.cpu_cores || [];

  return (
    <div className="page" style={{display:'flex',flexDirection:'column',gap:16}}>
      {/* Top stat cards */}
      <div className="sys-stats-grid">
        <StatCard label="CPU" value={`${stats.cpu_pct ?? '—'}%`} sub={`${cpuCores.length} cores`} pct={stats.cpu_pct}/>
        <StatCard label="GPU" value={`${stats.gpu_pct ?? '—'}%`} sub="GR3D" pct={stats.gpu_pct} color={stats.gpu_pct > 85 ? 'var(--accent-red)' : stats.gpu_pct > 60 ? 'var(--accent-amber)' : 'var(--accent-blue)'}/>
        <StatCard label="RAM" value={`${stats.ram_pct ?? '—'}%`} sub={stats.ram_used_mb != null ? `${stats.ram_used_mb} / ${stats.ram_total_mb} MB` : ''} pct={stats.ram_pct}/>
        <StatCard label="Uptime" value={fmtUptime(stats.uptime_s)} sub={`${stats.process_count ?? '—'} processes`}/>
      </div>

      <div className="sys-two-grid">
        {/* CPU Cores */}
        <div className="card" style={{padding:'14px 16px'}}>
          <div style={{fontSize:12,fontWeight:600,marginBottom:10,color:'var(--text-primary)'}}>CPU Cores</div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {cpuCores.map((c, i) => (
              <div key={i} style={{display:'flex',alignItems:'center',gap:10}}>
                <div className="mono" style={{fontSize:11,color:'var(--text-muted)',width:20}}>C{i}</div>
                <div style={{flex:1}}><Bar pct={c.pct}/></div>
                <div className="mono" style={{fontSize:11,color:'var(--text-primary)',width:32,textAlign:'right'}}>{c.pct}%</div>
                <div className="mono" style={{fontSize:10,color:'var(--text-muted)',width:52,textAlign:'right'}}>{c.freq_mhz}MHz</div>
              </div>
            ))}
          </div>
        </div>

        {/* Memory & Disk */}
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <div className="card" style={{padding:'14px 16px'}}>
            <div style={{fontSize:12,fontWeight:600,marginBottom:10,color:'var(--text-primary)'}}>Memory</div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              <div>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                  <span style={{fontSize:12,color:'var(--text-muted)'}}>RAM</span>
                  <span className="mono" style={{fontSize:12}}>{stats.ram_used_mb} / {stats.ram_total_mb} MB</span>
                </div>
                <Bar pct={stats.ram_pct}/>
              </div>
              {stats.swap_total_mb > 0 && (
                <div>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                    <span style={{fontSize:12,color:'var(--text-muted)'}}>Swap</span>
                    <span className="mono" style={{fontSize:12}}>{stats.swap_used_mb} / {stats.swap_total_mb} MB</span>
                  </div>
                  <Bar pct={stats.swap_pct} color="var(--accent-amber)"/>
                </div>
              )}
            </div>
          </div>
          <div className="card" style={{padding:'14px 16px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
              <div style={{fontSize:12,fontWeight:600,color:'var(--text-primary)'}}>Storage</div>
              {stats.disk_health && (
                <div style={{fontSize:11,fontWeight:600,padding:'2px 8px',borderRadius:4,
                  background: stats.disk_health==='PASSED' ? 'rgba(74,222,128,0.15)' : 'rgba(239,68,68,0.15)',
                  color: stats.disk_health==='PASSED' ? 'var(--accent-green)' : 'var(--accent-red)',
                  border: `1px solid ${stats.disk_health==='PASSED' ? 'var(--accent-green)' : 'var(--accent-red)'}`
                }}>{stats.disk_health}</div>
              )}
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              <div>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                  <span style={{fontSize:12,color:'var(--text-muted)'}}>System (eMMC)</span>
                  <span className="mono" style={{fontSize:12}}>{stats.disk_used_gb} / {stats.disk_total_gb} GB</span>
                </div>
                <Bar pct={stats.disk_pct}/>
              </div>
              {stats.nvme_total_gb != null && (
                <div>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                    <span style={{fontSize:12,color:'var(--text-muted)'}}>Data (NVMe)</span>
                    <span className="mono" style={{fontSize:12}}>{stats.nvme_used_gb} / {stats.nvme_total_gb} GB</span>
                  </div>
                  <Bar pct={stats.nvme_pct}/>
                </div>
              )}
              {(stats.disk_read_mbps != null || stats.disk_write_mbps != null) && (
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginTop:2}}>
                  <div style={{background:'var(--bg-input)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'8px 10px'}}>
                    <div style={{fontSize:10,color:'var(--text-muted)',textTransform:'uppercase',marginBottom:2}}>NVMe Read</div>
                    <div className="mono" style={{fontSize:14,fontWeight:600,color:'var(--accent-cyan)'}}>{stats.disk_read_mbps ?? '—'} MB/s</div>
                  </div>
                  <div style={{background:'var(--bg-input)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'8px 10px'}}>
                    <div style={{fontSize:10,color:'var(--text-muted)',textTransform:'uppercase',marginBottom:2}}>NVMe Write</div>
                    <div className="mono" style={{fontSize:14,fontWeight:600,color:'var(--accent-amber)'}}>{stats.disk_write_mbps ?? '—'} MB/s</div>
                  </div>
                </div>
              )}
              {stats.disk_life_pct_used != null && (
                <div>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                    <span style={{fontSize:12,color:'var(--text-muted)'}}>NVMe Life Used</span>
                    <span className="mono" style={{fontSize:12}}>{stats.disk_life_pct_used}%</span>
                  </div>
                  <Bar pct={stats.disk_life_pct_used} color="var(--accent-amber)"/>
                </div>
              )}
              {(stats.disk_power_on_hours != null || stats.disk_total_written_tb != null || stats.disk_total_read_tb != null) && (
                <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
                  {stats.disk_power_on_hours != null && (
                    <div>
                      <div style={{fontSize:10,color:'var(--text-muted)'}}>Power-on</div>
                      <div className="mono" style={{fontSize:12,fontWeight:600}}>{stats.disk_power_on_hours.toLocaleString()} hrs</div>
                    </div>
                  )}
                  {stats.disk_total_written_tb != null && (
                    <div>
                      <div style={{fontSize:10,color:'var(--text-muted)'}}>Total Written</div>
                      <div className="mono" style={{fontSize:12,fontWeight:600}}>{stats.disk_total_written_tb} TB</div>
                    </div>
                  )}
                  {stats.disk_total_read_tb != null && (
                    <div>
                      <div style={{fontSize:10,color:'var(--text-muted)'}}>Total Read</div>
                      <div className="mono" style={{fontSize:12,fontWeight:600}}>{stats.disk_total_read_tb} TB</div>
                    </div>
                  )}
                </div>
              )}
            </div>
          </div>
        </div>
      </div>

      {/* Temperatures */}
      <div className="card" style={{padding:'14px 16px'}}>
        <div style={{fontSize:12,fontWeight:600,marginBottom:10,color:'var(--text-primary)'}}>Temperatures</div>
        <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
          <TempBadge label="CPU" val={stats.temp_cpu}/>
          <TempBadge label="GPU" val={stats.temp_gpu}/>
          <TempBadge label="Hotspot" val={stats.temp_tj}/>
          <TempBadge label="CPU Cores" val={stats.temp_soc0}/>
          <TempBadge label="I/O & Video" val={stats.temp_soc1}/>
          <TempBadge label="Memory Ctrl" val={stats.temp_soc2}/>
          <TempBadge label="M.2 Drive" val={stats.disk_temp_c}/>
        </div>
      </div>

      {/* Power */}
      {(stats.power_in_mw != null) && (
        <div className="card" style={{padding:'14px 16px'}}>
          <div style={{fontSize:12,fontWeight:600,marginBottom:10,color:'var(--text-primary)'}}>Power Consumption</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
            {[['Total Input', stats.power_in_mw], ['CPU + GPU + CV', stats.power_cpu_gpu_mw], ['SOC', stats.power_soc_mw]].map(([label, mw]) => (
              mw != null && (
                <div key={label} style={{background:'var(--bg-input)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'10px 14px'}}>
                  <div style={{fontSize:10,color:'var(--text-muted)',textTransform:'uppercase',marginBottom:4}}>{label}</div>
                  <div className="mono" style={{fontSize:18,fontWeight:700,color:'var(--accent-cyan)'}}>{(mw/1000).toFixed(2)}W</div>
                  <div style={{fontSize:10,color:'var(--text-muted)'}}>{mw} mW</div>
                </div>
              )
            ))}
          </div>
        </div>
      )}

      {/* Network */}
      <div className="card" style={{padding:'14px 16px'}}>
        <div style={{fontSize:12,fontWeight:600,marginBottom:10,color:'var(--text-primary)'}}>Network (cumulative)</div>
        <div style={{display:'flex',gap:24}}>
          <div><div style={{fontSize:11,color:'var(--text-muted)'}}>Sent</div><div className="mono" style={{fontSize:16,fontWeight:600}}>{stats.net_sent_mb} MB</div></div>
          <div><div style={{fontSize:11,color:'var(--text-muted)'}}>Received</div><div className="mono" style={{fontSize:16,fontWeight:600}}>{stats.net_recv_mb} MB</div></div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════
// GPS Location Sharing Section
// ═══════════════════════════════════════════════
function GpsShareSection({ nodes }) {
  const [cfg, setCfg]         = useState(null);   // {mode, nodes: [...], channels: [...], interval}
  const [channels, setChannels] = useState([]);
  const [saving, setSaving]   = useState(false);
  const [saved,  setSaved]    = useState(false);
  const [error,  setError]    = useState(null);
  const [warning, setWarning] = useState(null);

  useEffect(() => {
    api.get('/api/gps/share').then(d => { if (d && !d.error) setCfg(d); });
    api.get('/api/channels').then(d => { if (Array.isArray(d)) setChannels(d); });
  }, []);

  async function save() {
    if (!cfg) return;
    setSaving(true); setError(null); setWarning(null);
    try {
      const res = await api.put('/api/gps/share', cfg);
      if (res.error) { setError(res.error); }
      else {
        setSaved(true); setTimeout(() => setSaved(false), 2000);
        if (res.warning) setWarning(res.warning);
      }
    } catch(e) { setError(e.message || 'Request failed'); }
    setSaving(false);
  }

  function toggleNode(id) {
    setCfg(p => {
      const has = p.nodes.includes(id);
      return { ...p, nodes: has ? p.nodes.filter(n => n !== id) : [...p.nodes, id] };
    });
  }

  function toggleChannel(num) {
    setCfg(p => {
      const has = (p.channels || []).includes(num);
      return { ...p, channels: has ? p.channels.filter(ch => ch !== num) : [...(p.channels || []), num] };
    });
  }

  if (!cfg) return <div style={{color:'var(--text-muted)',fontSize:13}}>Loading…</div>;

  const IS = {
    background:'var(--bg-input)', border:'1px solid var(--border)',
    color:'var(--text-primary)', borderRadius:'var(--radius)',
    padding:'6px 10px', fontSize:13, outline:'none', fontFamily:'inherit',
  };
  const SL = {fontSize:11,fontWeight:700,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:12};
  const FL = {fontSize:11,fontWeight:600,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:4};

  // Remote nodes only (exclude own node and fallback)
  const remoteNodes = nodes.filter(n => n.node_id !== 'local_gps');

  const modeLabels = { off: 'Off', all: 'Broadcast to All', selected: 'Selected Targets' };
  const modeColors = { off: 'var(--text-muted)', all: 'var(--accent-green)', selected: 'var(--accent-blue)' };

  return (
    <div className="card" style={{marginBottom:16}}>
      <div style={SL}>GPS Location Sharing</div>
      <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:16,lineHeight:1.5}}>
        Control whether your GPS position is broadcast over the mesh radio and to whom.
        Turning sharing off also disables the radio's own automatic position broadcasts.
      </div>

      {/* Mode selector */}
      <div style={{marginBottom:16}}>
        <div style={FL}>Sharing Mode</div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginTop:6}}>
          {['off','all','selected'].map(m => (
            <button key={m} onClick={() => setCfg(p => ({...p, mode: m}))}
              style={{
                padding:'8px 18px', borderRadius:'var(--radius)', cursor:'pointer',
                border:`1px solid ${cfg.mode === m ? modeColors[m] : 'var(--border)'}`,
                background: cfg.mode === m ? (m === 'off' ? 'var(--bg-input)' : m === 'all' ? 'var(--accent-green-dim)' : 'var(--accent-blue-dim)') : 'var(--bg-input)',
                color: cfg.mode === m ? modeColors[m] : 'var(--text-secondary)',
                fontFamily:'inherit', fontSize:13, fontWeight: cfg.mode === m ? 600 : 400,
                transition:'all 150ms',
              }}>
              {modeLabels[m]}
            </button>
          ))}
        </div>
        {cfg.mode === 'off' && (
          <div style={{marginTop:8,fontSize:12,color:'var(--text-muted)'}}>
            Your GPS position is not shared with any mesh nodes, including automatic radio broadcasts.
          </div>
        )}
        {cfg.mode === 'all' && (
          <div style={{marginTop:8,fontSize:12,color:'var(--accent-green)'}}>
            Your position will be broadcast to all nodes on the mesh.
          </div>
        )}
        {cfg.mode === 'selected' && (
          <div style={{marginTop:8,fontSize:12,color:'var(--accent-blue)'}}>
            Your position will be sent only to the channels and nodes you select below.
          </div>
        )}
      </div>

      {/* Target selector — shown only in "selected" mode */}
      {cfg.mode === 'selected' && (
        <div style={{marginBottom:16}}>
          <div style={FL}>Share On Channels</div>
          {channels.length === 0 ? (
            <div style={{fontSize:12,color:'var(--text-muted)',marginTop:6}}>
              No channels configured yet.
            </div>
          ) : (
            <div style={{display:'flex',flexDirection:'column',gap:6,marginTop:6}}>
              {channels.map(ch => {
                const checked = (cfg.channels || []).includes(ch.channel_num);
                return (
                  <label key={ch.channel_num}
                    style={{
                      display:'flex', alignItems:'center', gap:10, cursor:'pointer',
                      padding:'8px 12px', borderRadius:'var(--radius)',
                      background: checked ? 'var(--accent-green-dim)' : 'var(--bg-input)',
                      border:`1px solid ${checked ? 'var(--accent-green)' : 'var(--border)'}`,
                    }}>
                    <input type="checkbox" checked={checked}
                      onChange={() => toggleChannel(ch.channel_num)}
                      style={{accentColor:'var(--accent-green)',width:16,height:16,flexShrink:0}}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:500,color:'var(--text-primary)'}}>{ch.name}</div>
                      <div className="mono" style={{fontSize:10,color:'var(--text-muted)'}}>Channel {ch.channel_num}</div>
                    </div>
                    {checked && (
                      <span style={{fontSize:10,color:'var(--accent-green)',fontWeight:600,flexShrink:0}}>SHARING</span>
                    )}
                  </label>
                );
              })}
            </div>
          )}
        </div>
      )}

      {cfg.mode === 'selected' && (
        <div style={{marginBottom:16}}>
          <div style={FL}>Share Directly With Nodes</div>
          {remoteNodes.length === 0 ? (
            <div style={{fontSize:12,color:'var(--text-muted)',marginTop:6}}>
              No other nodes known yet — connect to the mesh first.
            </div>
          ) : (
            <div style={{display:'flex',flexDirection:'column',gap:6,marginTop:6,maxHeight:240,overflowY:'auto'}}>
              {remoteNodes.map(n => {
                const checked = cfg.nodes.includes(n.node_id);
                return (
                  <label key={n.node_id}
                    style={{
                      display:'flex', alignItems:'center', gap:10, cursor:'pointer',
                      padding:'8px 12px', borderRadius:'var(--radius)',
                      background: checked ? 'var(--accent-blue-dim)' : 'var(--bg-input)',
                      border:`1px solid ${checked ? 'var(--accent-blue)' : 'var(--border)'}`,
                      transition:'all 150ms',
                    }}>
                    <input type="checkbox" checked={checked}
                      onChange={() => toggleNode(n.node_id)}
                      style={{accentColor:'var(--accent-blue)',width:16,height:16,flexShrink:0}}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:500,color:'var(--text-primary)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                        {n.alias || n.long_name}
                      </div>
                      <div className="mono" style={{fontSize:10,color:'var(--text-muted)'}}>{n.node_id}</div>
                    </div>
                    {checked && (
                      <span style={{fontSize:10,color:'var(--accent-blue)',fontWeight:600,flexShrink:0}}>SHARING</span>
                    )}
                  </label>
                );
              })}
            </div>
          )}
          {(cfg.nodes.length > 0 || (cfg.channels || []).length > 0) && (
            <div style={{marginTop:6,fontSize:12,color:'var(--text-muted)'}}>
              {(cfg.channels || []).length} channel{(cfg.channels || []).length !== 1 ? 's' : ''} and {cfg.nodes.length} node{cfg.nodes.length !== 1 ? 's' : ''} selected
            </div>
          )}
        </div>
      )}

      {/* Interval — shown when sharing is active */}
      {cfg.mode !== 'off' && (
        <div style={{marginBottom:16}}>
          <div style={FL}>Broadcast Interval</div>
          <div style={{display:'flex',gap:8,alignItems:'center',marginTop:6,flexWrap:'wrap'}}>
            {[10,30,60,120,300].map(s => (
              <button key={s} onClick={() => setCfg(p => ({...p, interval: s}))}
                className={`tab-btn ${cfg.interval === s ? 'active' : ''}`}
                style={{minWidth:52}}>
                {s < 60 ? `${s}s` : `${s/60}m`}
              </button>
            ))}
            <span style={{fontSize:11,color:'var(--text-muted)'}}>
              — position sent every {cfg.interval < 60 ? `${cfg.interval}s` : `${cfg.interval/60}m`}
            </span>
          </div>
        </div>
      )}

      {/* Save */}
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <button className="btn btn-primary" onClick={save} disabled={saving}>
          {saving ? 'Saving…' : 'Apply'}
        </button>
        {saved   && <span style={{color:'var(--accent-green)',fontSize:13}}>✓ Applied</span>}
        {error   && <span style={{color:'var(--accent-red)',fontSize:13}}>{error}</span>}
        {warning && <span style={{color:'var(--accent-amber)',fontSize:12,lineHeight:1.4}}>{warning}</span>}
        {cfg.mode !== 'off' && (
          <span style={{marginLeft:'auto',fontSize:11,color:'var(--text-muted)'}}>
            Changes take effect immediately — no restart needed.
          </span>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════
// Restart Setup card (mobile only)
// ═══════════════════════════════════════════════
function RestartSetupCard({ SL }) {
  const [working, setWorking] = useState(false);
  const [error, setError] = useState(null);

  const restart = () => {
    // Hand off to the native bridge. AppViewModel.showSetupWizard already:
    //   • POSTs /api/hotspot/start to Atlas (4 s fire-and-forget) so single-radio
    //     Atlas drops its LAN and brings the hotspot back up
    //   • Clears the saved LAN URLs so the next probe goes straight to hotspot
    //   • Resets the wizard to the hotspot-connect step
    // If Atlas can't reach a known LAN on its own it falls back to the hotspot
    // automatically after ~30 seconds, so a missed request still recovers.
    setWorking(true);
    setError(null);
    const bridge = window.AtlasAndroid || window.AtlasIOS;
    if (bridge && bridge.showSetupWizard) {
      bridge.showSetupWizard();
    } else {
      setError('Setup wizard is only available in the Atlas mobile app.');
      setWorking(false);
    }
  };

  return (
    <div className="card" style={{marginBottom:16}}>
      <div style={SL}>Atlas Connection</div>
      <div style={{fontSize:12,color:'var(--text-muted)',lineHeight:1.45,marginBottom:12}}>
        Restart setup to drop Atlas's current LAN connection, bring its hotspot back up,
        and re-pair this phone from scratch. If Atlas can't find a known LAN on its own
        it falls back to the hotspot automatically after about 30 seconds.
      </div>
      <button className="btn btn-primary" onClick={restart} disabled={working}>
        {working ? 'Switching to hotspot…' : 'Restart Setup'}
      </button>
      {error && (
        <div style={{marginTop:10,fontSize:12,color:'var(--accent-red)'}}>{error}</div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════
// General Settings Page
// ═══════════════════════════════════════════════
function SettingsPage({ onSettingsSaved, themeMode, onThemeModeChange, hiddenPages, onHiddenPagesChange, onResetSidebarOrder, defaultPages, nodes }) {
  const [settings, setSettings] = useState(null);
  const [errors, setErrors] = useState({});
  const [saved, setSaved] = useState(false);
  const [saving, setSaving] = useState(false);
  const isAtlasMobileApp = isAtlasMobileClient();

  useEffect(() => {
    api.get('/api/settings').then(s => { if (s) setSettings(s); });
  }, []);

  async function save() {
    const errs = validateSettings(settings);
    if (Object.keys(errs).length > 0) { setErrors(errs); return; }
    setErrors({});
    setSaving(true);
    try {
      await api.put('/api/settings', settings);
      setSaved(true);
      setTimeout(() => setSaved(false), 2000);
      if (onSettingsSaved) onSettingsSaved(settings);
    } finally {
      setSaving(false);
    }
  }

  function Field({ label, name, type='text', min, max, options, hint }) {
    if (!settings) return null;
    const val = settings[name] ?? '';
    const err = errors[name];
    const update = v => { setSettings(p => ({...p, [name]: v})); setErrors(p => ({...p, [name]: undefined})); };
    const inputStyle = {background:'var(--bg-input)',border:`1px solid ${err ? 'var(--accent-red)' : 'var(--border)'}`,color:'var(--text-primary)',borderRadius:'var(--radius)',padding:'6px 10px',fontSize:13,width:'100%',outline:'none',fontFamily:'inherit',boxSizing:'border-box'};
    return (
      <div>
        <div style={{fontSize:11,fontWeight:600,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:3}}>{label}</div>
        {hint && <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:5,lineHeight:1.3}}>{hint}</div>}
        {type === 'select' ? (
          <select value={val} onChange={e => update(e.target.value)} style={inputStyle}>
            {options.map(([v,l]) => <option key={v} value={v}>{l}</option>)}
          </select>
        ) : type === 'checkbox' ? (
          <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',marginTop:4}}>
            <input type="checkbox" checked={val === 'true'} onChange={e => update(e.target.checked ? 'true' : 'false')} style={{accentColor:'var(--accent-green)',width:16,height:16}}/>
            <span style={{fontSize:13,color:'var(--text-muted)'}}>Enabled</span>
          </label>
        ) : (
          <input type={type} value={val} min={min} max={max}
            onChange={e => update(e.target.value)}
            style={inputStyle}
            onFocus={e => !err && (e.target.style.borderColor='var(--accent-green)')}
            onBlur={e => !err && (e.target.style.borderColor='var(--border)')}/>
        )}
        {err && <div style={{color:'var(--accent-red)',fontSize:11,marginTop:3}}>{err}</div>}
      </div>
    );
  }

  if (!settings) return <div className="page"><div style={{color:'var(--text-muted)',padding:16}}>Loading…</div></div>;

  const SL = {fontSize:11,fontWeight:700,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:12};
  const FL = {fontSize:11,fontWeight:600,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:4};

  return (
    <div className="page">

      {/* Mobile-only: Setup wizard restart */}
      {isAtlasMobileApp && (
        <RestartSetupCard SL={SL}/>
      )}

      {/* 2-col grid: Connection | Dashboard, Nodes | Alerts */}
      <div className="two-col" style={{marginBottom:16}}>
        <div className="card">
          <div style={SL}>Connection</div>
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <Field label="Serial Port" name="serial_port" hint="Restart to apply" type="text"/>
            <Field label="Web Port" name="web_port" hint="Restart to apply" type="number" min={1024} max={65535}/>
          </div>
        </div>
        <div className="card">
          <div style={SL}>Dashboard</div>
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <Field label="Refresh Interval (s)" name="dashboard_refresh_s" type="number" min={1} max={60} hint="How often to poll for updates"/>
            <Field label="Date Format" name="date_format" type="select" options={[['relative','Relative (2m ago)'],['absolute','Absolute (14:32:01)']]}/>
            <Field label="Units" name="units" type="select" options={[['metric','Metric (km, °C)'],['imperial','Imperial (mi, °F)']]}/>
            <Field label="Time Zone" name="timezone" type="select" options={TIMEZONE_OPTIONS}
              hint="Clock and timestamps render in this zone. IANA zones follow daylight-saving rules automatically."/>
          </div>
        </div>
        <div className="card">
          <div style={SL}>Nodes</div>
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <Field label="Show Offline Nodes" name="show_offline_nodes" type="checkbox" hint="Display nodes not recently heard"/>
            <Field label="Online Window (hours)" name="node_online_window_h" type="number" min={1} max={24} hint="Hours since last heard to consider online"/>
            <Field label="Default Map Zoom" name="map_default_zoom" type="number" min={1} max={19}/>
          </div>
        </div>
        <div className="card">
          <div style={SL}>Alerts</div>
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <Field label="Battery Warning (%)" name="battery_alert_pct" type="number" min={5} max={50} hint="Alert when battery falls below this"/>
            <Field label="Offline Threshold (min)" name="node_offline_min" type="number" min={5} max={1440} hint="Alert after this many silent minutes"/>
          </div>
        </div>
      </div>

      {/* Personalization — full width */}
      <div className="card" style={{marginBottom:16}}>
        <div style={SL}>Personalization</div>
        <div style={{marginBottom:14}}>
          <div>
            <div style={FL}>Theme</div>
            <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:8}}>Dark mode matches the current Atlas look</div>
            <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
              {[
                ['dark', 'Dark'],
                ['light', 'Light'],
              ].map(([value, label]) => (
                <button key={value} onClick={() => onThemeModeChange(value)}
                  className={`btn btn-sm ${themeMode === value ? 'btn-primary' : ''}`}
                  style={{minWidth:84}}>
                  {label}
                </button>
              ))}
            </div>
          </div>
        </div>
        <div style={{borderTop:'1px solid var(--border)',paddingTop:12}}>
          <div style={FL}>Sidebar Pages</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:10,marginTop:6}}>
            {(defaultPages || []).filter(p => !ALWAYS_VISIBLE_PAGES.includes(p.id)).map(p => (
              <label key={p.id} style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer',background:'var(--bg-input)',padding:'5px 12px',borderRadius:'var(--radius)',border:`1px solid ${hiddenPages.includes(p.id)?'var(--border)':'var(--border-bright)'}`}}>
                <input type="checkbox"
                  checked={!hiddenPages.includes(p.id)}
                  onChange={e => {
                    const next = e.target.checked ? hiddenPages.filter(id => id !== p.id) : [...hiddenPages, p.id];
                    onHiddenPagesChange(next);
                  }}
                  style={{accentColor:'var(--accent-green)',width:14,height:14}}/>
                <span style={{fontSize:12,color:hiddenPages.includes(p.id)?'var(--text-muted)':'var(--text-secondary)'}}>{p.label}</span>
              </label>
            ))}
          </div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{fontSize:11,color:'var(--text-muted)'}}>Drag &amp; drop sidebar icons to reorder</div>
            <button className="btn btn-sm" onClick={onResetSidebarOrder}>Reset Order</button>
          </div>
        </div>
      </div>

      {/* Device Configuration — full width */}
      <DeviceConfigSection />

      {/* GPS Location Sharing — full width */}
      <GpsShareSection nodes={nodes || []} />

      {/* Software Update — full width */}
      <SoftwareUpdateSection />

      {/* Danger Zone — factory reset */}
      <FactoryResetSection />

      {/* Save */}
      <div className="settings-actions" style={{marginTop:4}}>
        <button className="btn btn-primary" onClick={save} disabled={saving}>{saving ? 'Saving…' : 'Save Settings'}</button>
        {saved && <span style={{color:'var(--accent-green)',fontSize:13}}>Saved!</span>}
        {Object.keys(errors).length > 0 && <span style={{color:'var(--accent-red)',fontSize:13}}>{Object.keys(errors).length} error(s) — fix highlighted fields.</span>}
        <span style={{fontSize:11,color:'var(--text-muted)',marginLeft:'auto'}}>Connection settings require an app restart to take effect.</span>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════
// Software Update Section
// ═══════════════════════════════════════════════
function SoftwareUpdateSection() {
  const [info, setInfo] = useState(null);          // light local info from GET
  const [check, setCheck] = useState(null);        // remote check result from POST
  const [checking, setChecking] = useState(false);
  const [error, setError] = useState('');
  const [confirming, setConfirming] = useState(false);
  const [install, setInstall] = useState(null);    // {startVersion} while updating
  const [status, setStatus] = useState(null);      // /api/update/status payload
  const [unreachable, setUnreachable] = useState(0);
  const pollRef = useRef(null);
  const logRef = useRef(null);

  useEffect(() => {
    api.get('/api/update/check').then(i => {
      setInfo(i);
      // Resume the progress view if an update is already running (e.g. the
      // page reloaded mid-update, or another client started one).
      if (i && i.update_running) setInstall({ startVersion: i.version });
    }).catch(() => {});
    return () => clearInterval(pollRef.current);
  }, []);

  // Poll status while an update runs. The service restarts itself partway
  // through, so fetch failures are expected — keep polling through them.
  useEffect(() => {
    if (!install) return;
    pollRef.current = setInterval(async () => {
      try {
        const s = await api.get('/api/update/status', { timeoutMs: 8000 });
        setUnreachable(0);
        setStatus(s);
        if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight;
        const finished = s.state === 'success' ||
          (!s.running && install.startVersion && s.version && s.version !== install.startVersion);
        if (finished) {
          clearInterval(pollRef.current);
          setStatus(p => ({ ...p, state: 'success' }));
          setTimeout(() => window.location.reload(), 3000);
        } else if (s.state === 'failed') {
          clearInterval(pollRef.current);
        }
      } catch {
        setUnreachable(n => n + 1);
      }
    }, 2500);
    return () => clearInterval(pollRef.current);
  }, [install]);

  async function runCheck() {
    setChecking(true); setError(''); setCheck(null);
    try {
      const r = await api.post('/api/update/check', undefined, { timeoutMs: 45000 });
      setCheck(r);
      if (r.version) setInfo(p => ({ ...(p || {}), ...r }));
    } catch (e) {
      setError(e.message || 'Update check failed');
    } finally {
      setChecking(false);
    }
  }

  async function startInstall() {
    setConfirming(false); setError(''); setStatus(null); setUnreachable(0);
    try {
      await api.post('/api/update/apply');
      setInstall({ startVersion: info?.version });
    } catch (e) {
      setError(e.message || 'Could not start the update');
    }
  }

  const SL = {fontSize:11,fontWeight:700,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:12};
  const muted = {fontSize:12,color:'var(--text-muted)'};
  const state = status?.state;

  return (
    <div className="card" style={{marginBottom:16}}>
      <div style={SL}>Software Update</div>

      <div style={{display:'flex',alignItems:'center',gap:14,flexWrap:'wrap',marginBottom:10}}>
        <div>
          <div style={{fontSize:13,color:'var(--text-primary)',fontWeight:600}}>
            Atlas Control {info?.version ? `· ${info.version}` : ''}
          </div>
          <div style={muted}>
            {info?.installed_at ? `Installed ${info.installed_at.slice(0, 10)} · ` : ''}
            Updates download from GitHub and preserve all data, maps and settings.
          </div>
        </div>
        {!install && (
          <button className="btn btn-sm" style={{marginLeft:'auto'}} onClick={runCheck} disabled={checking}>
            {checking ? 'Checking…' : 'Check for Updates'}
          </button>
        )}
      </div>

      {error && <div style={{color:'var(--accent-red)',fontSize:12,marginBottom:8}}>{error}</div>}

      {/* Check result */}
      {check && !install && (
        check.update_available ? (
          <div style={{border:'1px solid var(--border-bright)',borderRadius:'var(--radius)',padding:'10px 12px'}}>
            <div style={{fontSize:13,color:'var(--accent-green)',fontWeight:600,marginBottom:6}}>
              Update available: {check.latest} ({check.behind} new {check.behind === 1 ? 'commit' : 'commits'})
            </div>
            <div style={{maxHeight:120,overflowY:'auto',marginBottom:10}}>
              {(check.commits || []).map(c => (
                <div key={c.rev} style={{fontSize:12,color:'var(--text-secondary)',padding:'2px 0'}}>
                  <span style={{color:'var(--text-muted)',fontFamily:'monospace'}}>{c.rev}</span>
                  <span style={{color:'var(--text-muted)'}}> {c.date} </span>{c.subject}
                </div>
              ))}
            </div>
            {check.local_changes && (
              <div style={{...muted,color:'var(--accent-yellow, #d8b54a)',marginBottom:8}}>
                This box has local code changes — the update keeps them and installs what it can.
              </div>
            )}
            {!confirming ? (
              <button className="btn btn-primary btn-sm" onClick={() => setConfirming(true)}>
                Install Update
              </button>
            ) : (
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <span style={{fontSize:12,color:'var(--text-secondary)'}}>
                  Atlas restarts when done (~1–3 min). Install now?
                </span>
                <button className="btn btn-primary btn-sm" onClick={startInstall}>Yes, install</button>
                <button className="btn btn-sm" onClick={() => setConfirming(false)}>Cancel</button>
              </div>
            )}
          </div>
        ) : (
          <div style={{fontSize:13,color:'var(--accent-green)'}}>
            ✓ Up to date{check.ahead > 0 ? ` (${check.ahead} local commits ahead of the release)` : ''}
          </div>
        )
      )}

      {/* Install progress */}
      {install && (
        <div>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
            {state === 'success' ? (
              <span style={{color:'var(--accent-green)',fontSize:13,fontWeight:600}}>
                ✓ Updated{status?.version ? ` to ${status.version}` : ''} — reloading…
              </span>
            ) : state === 'failed' ? (
              <span style={{color:'var(--accent-red)',fontSize:13,fontWeight:600}}>Update failed — see log below</span>
            ) : (
              <>
                <span className="spinner" style={{width:14,height:14,border:'2px solid var(--border)',borderTopColor:'var(--accent-green)',borderRadius:'50%',display:'inline-block',animation:'spin 1s linear infinite'}}/>
                <span style={{fontSize:13,color:'var(--text-secondary)'}}>
                  {unreachable >= 2 ? 'Atlas is restarting — reconnecting…' : 'Installing update…'}
                </span>
              </>
            )}
          </div>
          {status?.log && (
            <pre ref={logRef} style={{background:'var(--bg-input)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:10,fontSize:11,lineHeight:1.5,maxHeight:200,overflowY:'auto',whiteSpace:'pre-wrap',color:'var(--text-secondary)',margin:0}}>
              {status.log}
            </pre>
          )}
          {state === 'failed' && (
            <button className="btn btn-sm" style={{marginTop:8}} onClick={() => { setInstall(null); setStatus(null); setCheck(null); }}>
              Dismiss
            </button>
          )}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════
// Factory Reset Section (Danger Zone)
// ═══════════════════════════════════════════════
function FactoryResetSection() {
  const [snapshot, setSnapshot] = useState(null);
  const [deviceConnected, setDeviceConnected] = useState(false);
  const [deviceStatus, setDeviceStatus] = useState('');
  const [confirmOpen, setConfirmOpen] = useState(false);
  const [confirmText, setConfirmText] = useState('');
  const [resetting, setResetting] = useState(false);
  const [capturing, setCapturing] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);

  const refreshStatus = React.useCallback(async () => {
    try {
      const r = await api.get('/api/factory-defaults');
      setSnapshot(r?.snapshot || null);
      setDeviceConnected(!!r?.device_connected);
      setDeviceStatus(r?.device_status || '');
      if (r?.capture_error) setError(r.capture_error);
    } catch (e) { /* ignore poll errors */ }
  }, []);

  // Lazy-capture on mount, then re-poll every 5s while the device is offline
  // so the panel becomes usable as soon as the radio link comes back.
  useEffect(() => {
    refreshStatus();
    const id = setInterval(() => {
      // Stop polling once we have a snapshot — re-capture is on demand only.
      if (!snapshot) refreshStatus();
    }, 5000);
    return () => clearInterval(id);
  }, [refreshStatus, snapshot]);

  const recapture = async () => {
    setError(null);
    setCapturing(true);
    try {
      const r = await api.post('/api/factory-defaults/capture', {});
      setSnapshot(r?.snapshot || null);
      setDeviceConnected(true);
      setDeviceStatus('connected');
    } catch (e) {
      setError(e.message || String(e));
      // Refresh in the background so the status line reflects current reality.
      refreshStatus();
    } finally {
      setCapturing(false);
    }
  };

  const runReset = async () => {
    setResetting(true);
    setError(null);
    setResult(null);
    try {
      const r = await api.post('/api/factory-reset', {});
      setResult(r);
      setConfirmOpen(false);
      setConfirmText('');
      // Give the radio a moment to reboot before reloading the UI so the
      // dashboard refetches a clean state.
      setTimeout(() => { window.location.reload(); }, 2500);
    } catch (e) {
      setError(e.message || String(e));
    } finally {
      setResetting(false);
    }
  };

  const SL = {fontSize:11,fontWeight:700,color:'var(--accent-red)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:10};
  const cardStyle = {marginBottom:16, borderColor:'var(--accent-red)'};

  const fmtCapturedAt = ts => {
    if (!ts) return '—';
    try {
      const d = new Date(ts * 1000);
      return d.toLocaleString();
    } catch { return '—'; }
  };
  const capturedSections = snapshot
    ? Object.keys(snapshot).filter(k => !['captured_at','owner'].includes(k) && snapshot[k] && typeof snapshot[k] === 'object')
    : [];

  return (
    <div className="card" style={cardStyle}>
      <div style={SL}>Danger Zone</div>
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        <div style={{fontSize:13,color:'var(--text-primary)',fontWeight:600}}>Factory Reset</div>
        <div style={{fontSize:12,color:'var(--text-muted)',lineHeight:1.45}}>
          Wipes all messaging history, AI chat history, node directory, telemetry,
          topology, alerts, and GPS coordinate data (positions, phone trackers,
          waypoints, routes, hike sessions, nav favorites, scheduled jobs).
          The Heltec V4 radio is restored to the factory default snapshot
          captured below — only the <span style={{fontFamily:'var(--font-mono)'}}>short_name</span> resets to the firmware default.
          The AI knowledge base, calendar, and app settings are preserved.
        </div>

        {/* Snapshot status & metadata */}
        <div style={{background:'var(--bg-input)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:10,marginTop:6}}>
          <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
            <span style={{fontSize:11,fontWeight:700,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.06em'}}>Heltec snapshot</span>
            {snapshot ? (
              <span style={{fontSize:12,color:'var(--accent-green)'}}>✓ Captured</span>
            ) : (
              <span style={{fontSize:12,color: deviceConnected ? 'var(--accent-amber)' : 'var(--accent-red)'}}>
                {deviceConnected ? 'Not yet captured' : `Device: ${deviceStatus || 'offline'}`}
              </span>
            )}
            <button className="btn btn-sm" onClick={recapture} disabled={capturing} style={{marginLeft:'auto'}}>
              {capturing ? 'Capturing…' : 'Re-capture from device'}
            </button>
          </div>
          {snapshot && (
            <div style={{marginTop:8,display:'grid',gridTemplateColumns:'auto 1fr',rowGap:4,columnGap:12,fontSize:12}}>
              <span style={{color:'var(--text-muted)'}}>Last captured</span>
              <span style={{color:'var(--text-primary)',fontFamily:'var(--font-mono)'}}>{fmtCapturedAt(snapshot.captured_at)}</span>
              <span style={{color:'var(--text-muted)'}}>Long name</span>
              <span style={{color:'var(--text-primary)'}}>{snapshot.owner?.long_name || '—'}</span>
              <span style={{color:'var(--text-muted)'}}>Node ID</span>
              <span style={{color:'var(--text-primary)',fontFamily:'var(--font-mono)'}}>{snapshot.owner?.node_id || '—'}</span>
              <span style={{color:'var(--text-muted)'}}>LoRa region</span>
              <span style={{color:'var(--text-primary)'}}>{snapshot.lora?.region ?? '—'} · preset {snapshot.lora?.modem_preset ?? '—'} · hop_limit {snapshot.lora?.hop_limit ?? '—'} · tx_power {snapshot.lora?.tx_power ?? '—'} dBm</span>
              <span style={{color:'var(--text-muted)'}}>Role / rebroadcast</span>
              <span style={{color:'var(--text-primary)'}}>{snapshot.device?.role ?? '—'} / {snapshot.device?.rebroadcast_mode ?? '—'}</span>
              <span style={{color:'var(--text-muted)'}}>Broadcast intervals</span>
              <span style={{color:'var(--text-primary)'}}>node_info {snapshot.device?.node_info_broadcast_secs ?? '—'}s · position {snapshot.position?.position_broadcast_secs ?? '—'}s · gps_update {snapshot.position?.gps_update_interval ?? '—'}s</span>
              <span style={{color:'var(--text-muted)'}}>Captured sections</span>
              <span style={{color:'var(--text-secondary)',fontSize:11}}>{capturedSections.join(' · ') || '—'}</span>
            </div>
          )}
        </div>

        {error && <div style={{color:'var(--accent-red)',fontSize:12,marginTop:4}}>{error}</div>}
        {result && (
          <div style={{color:'var(--accent-green)',fontSize:12,marginTop:4}}>
            ✓ Reset complete · reloading…
          </div>
        )}
        <div style={{marginTop:8}}>
          <button
            className="btn btn-sm"
            onClick={() => { setConfirmOpen(true); setConfirmText(''); setError(null); setResult(null); }}
            style={{background:'var(--accent-red)',borderColor:'var(--accent-red)',color:'#fff'}}>
            Factory Reset…
          </button>
        </div>
      </div>

      {confirmOpen && (
        <FactoryResetConfirm
          snapshot={snapshot}
          confirmText={confirmText}
          setConfirmText={setConfirmText}
          resetting={resetting}
          error={error}
          fmtCapturedAt={fmtCapturedAt}
          onCancel={() => { if (!resetting) { setConfirmOpen(false); setConfirmText(''); } }}
          onConfirm={runReset}
        />
      )}
    </div>
  );
}

    <div className="rename-overlay" onClick={e => e.target === e.currentTarget && !resetting && onCancel()}>

        <h3 style={{color:'var(--accent-red)',marginBottom:6}}>⚠ Confirm Factory Reset</h3>
        <p style={{fontSize:12,color:'var(--text-muted)',marginTop:0,marginBottom:14,lineHeight:1.5}}>
          This action permanently deletes data from this Atlas Control device
          and rewrites the Heltec V4 radio to its captured factory defaults.
          <strong style={{color:'var(--accent-red)'}}> This cannot be undone.</strong>
        </p>

        <div style={{display:'flex',gap:12,marginBottom:14,flexWrap:'wrap'}}>
          <div style={{flex:'1 1 220px',background:'var(--bg-input)',border:'1px solid var(--accent-red)',borderRadius:'var(--radius)',padding:10}}>
            <div style={{fontSize:11,fontWeight:700,color:'var(--accent-red)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:6}}>Will be deleted</div>
            <ul style={{margin:0,paddingLeft:18,fontSize:12,color:'var(--text-secondary)',lineHeight:1.5}}>
              {wipeList.map((w,i) => <li key={i}>{w}</li>)}
            </ul>
          </div>
          <div style={{flex:'1 1 220px',background:'var(--bg-input)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:10}}>
            <div style={{fontSize:11,fontWeight:700,color:'var(--accent-green)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:6}}>Will be preserved</div>
            <ul style={{margin:0,paddingLeft:18,fontSize:12,color:'var(--text-secondary)',lineHeight:1.5}}>
              {preserveList.map((p,i) => <li key={i}>{p}</li>)}
            </ul>
          </div>
        </div>

        <div style={{background:'var(--bg-input)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:10,marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:6}}>Heltec radio will be restored to</div>
          {snapshot ? (
            <div style={{fontSize:12,color:'var(--text-secondary)',lineHeight:1.6}}>
              <div>Snapshot from <span style={{fontFamily:'var(--font-mono)',color:'var(--text-primary)'}}>{fmtCapturedAt(snapshot.captured_at)}</span></div>
              <div>Long name: <span style={{color:'var(--text-primary)'}}>{snapshot.owner?.long_name || '—'}</span></div>
              <div>Region {snapshot.lora?.region ?? '—'} · preset {snapshot.lora?.modem_preset ?? '—'} · hop_limit {snapshot.lora?.hop_limit ?? '—'} · tx_power {snapshot.lora?.tx_power ?? '—'} dBm</div>
              <div>Role {snapshot.device?.role ?? '—'} · rebroadcast {snapshot.device?.rebroadcast_mode ?? '—'} · node_info every {snapshot.device?.node_info_broadcast_secs ?? '—'}s</div>
              <div>Position broadcast every {snapshot.position?.position_broadcast_secs ?? '—'}s · GPS update every {snapshot.position?.gps_update_interval ?? '—'}s</div>
              <div style={{color:'var(--text-muted)',marginTop:4}}>Short name will reset to the Heltec firmware default.</div>
            </div>
          ) : (
            <div style={{fontSize:12,color:'var(--accent-amber)'}}>
              No snapshot captured yet — the radio's existing config will be left as-is, and only the short_name will reset.

        <label style={{display:'flex',alignItems:'flex-start',gap:8,cursor:resetting?'default':'pointer',marginBottom:10}}>

            onChange={e => setAcknowledged(e.target.checked)}
            style={{accentColor:'var(--accent-red)',width:16,height:16,marginTop:2}}/>
          <span style={{fontSize:12,color:'var(--text-secondary)',lineHeight:1.4}}>
            I understand this will permanently delete all messaging, AI chat, node, and GPS data on Atlas Control.

        <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:6}}>
          Type <span style={{fontFamily:'var(--font-mono)',color:'var(--accent-red)'}}>RESET</span> below to confirm:

        {error && <div style={{color:'var(--accent-red)',fontSize:12,margin:'6px 0'}}>{error}</div>}
        <div className="rename-modal-actions">
          <button className="btn btn-sm" onClick={onCancel} disabled={resetting}>Cancel</button>
          <button
            className="btn btn-sm"
            onClick={onConfirm}
            disabled={resetting || !ready}
            style={{background:'var(--accent-red)',borderColor:'var(--accent-red)',color:'#fff',opacity: ready ? 1 : 0.5}}>
            {resetting ? 'Resetting…' : 'Confirm Factory Reset'}
          </button>
        </div>
      </div>
    </div>
  );
}
