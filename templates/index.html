const EyeOffIcon = () => <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>;
const EyeIcon    = () => <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>;
const ChevronIcon = ({open}) => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" style={{transition:'transform 0.2s',transform:open?'rotate(90deg)':'rotate(0deg)'}}><polyline points="9 18 15 12 9 6"/></svg>;
const HotspotIcon = ({color}) => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={color||'currentColor'} strokeWidth="2" style={{display:'inline',verticalAlign:'middle'}}><circle cx="12" cy="12" r="2"/><path d="M8.56 8.56a5 5 0 0 0 0 6.88"/><path d="M15.44 8.56a5 5 0 0 1 0 6.88"/></svg>;

function WifiSignal({signal}) {
  const bars = signal >= 80 ? 4 : signal >= 60 ? 3 : signal >= 40 ? 2 : signal >= 20 ? 1 : 0;
  const heights = [4, 7, 11, 16];
  return (
    <div className="wifi-signal-bars">
      {heights.map((h, i) => <span key={i} style={{height: h}} className={i < bars ? 'lit' : ''}/>)}
    </div>
  );
}

function WifiPage() {
  const [status, setStatus]     = useState(null);
  const [networks, setNetworks] = useState([]);
  const [scanning, setScanning] = useState(false);
  const [connecting, setConnecting] = useState(false);
  const [selected, setSelected] = useState(null);
  const [password, setPassword] = useState('');
  const [showPass, setShowPass] = useState(false);
  const [manualSSID, setManualSSID] = useState('');
  const [manualPass, setManualPass] = useState('');
  const [showManualPass, setShowManualPass] = useState(false);
  const [msg, setMsg]           = useState(null);
  const [hotspot, setHotspot]         = useState(null);
  const [hsSSID, setHsSSID]           = useState('');
  const [hsPass, setHsPass]           = useState('');
  const [hsWorking, setHsWorking]     = useState(false);
  const [showHsPass, setShowHsPass]   = useState(false);
  const [lastSwitch, setLastSwitch]   = useState(null);
  const [lastScanAt, setLastScanAt]   = useState(null);
  const [activeTab, setActiveTab]     = useState('wifi');

  const errText = (err, fallback) => err?.message || err?.error || fallback;
  const flash = (text, ok = true) => { setMsg({text, ok}); setTimeout(() => setMsg(null), 4500); };

  const loadStatus  = () => api.get('/api/wifi/status').then(d => setStatus(d)).catch(() => {});
  const loadHotspot = (initFields = false) =>
    api.get('/api/hotspot/status').then(d => {
      setHotspot(d);
      if (initFields) {
        if (d.ssid)     setHsSSID(d.ssid);
        if (d.password) setHsPass(d.password);
      }
    }).catch(() => {});

  useEffect(() => { loadStatus(); loadHotspot(true); scan(); }, []);

  useEffect(() => {
    const sw = status?.wifiSwitch;
    if (!sw || !sw.ssid) return;
    const result = sw.result || {};
    const urls = result.accessUrls || status?.accessUrls || [];
    setLastSwitch({
      ssid: result?.lan?.ssid || sw.ssid,
      kind: result?.lan?.kind || 'wifi',
      ip:   result?.lan?.ip || result?.ip || '',
      url:  urls[0] || 'https://atlas.local',
      pending: !!sw.pending,
      limited: !!result?.limited,
      ok: sw.ok,
      message: sw.message || '',
    });
  }, [status]);

  useEffect(() => {
    if (!lastSwitch?.pending) return;
    const timer = setInterval(() => {
      loadStatus();
      loadHotspot();
    }, 3000);
    return () => clearInterval(timer);
  }, [lastSwitch?.pending]);

  // Auto-switch tab to hotspot when hotspot becomes active
  useEffect(() => { if (hotspot?.active) setActiveTab('hotspot'); }, [hotspot?.active]);

  const scan = () => {
    setScanning(true);
    api.get('/api/wifi/networks')
      .then(d => {
        const found = d.networks || [];
        setNetworks(found);
        setLastScanAt(new Date());
        flash(`${found.length} network${found.length !== 1 ? 's' : ''} found`);
      })
      .catch(e => flash(errText(e, 'Scan failed'), false))
      .finally(() => setScanning(false));
  };

  const doConnect = (ssid, pass) => {
    const targetSSID = (ssid || '').trim();
    if (!targetSSID) { flash('SSID is required', false); return; }
    setConnecting(true);
    if (window.AtlasAndroid && window.AtlasAndroid.lanSwitching) window.AtlasAndroid.lanSwitching();
    api.post('/api/wifi/connect', {
      ssid: targetSSID, password: pass || '',
      stopHotspot: true, background: !!hotspot?.active,
    })
      .then(res => {
        const urls = res?.accessUrls || [];
        const primaryUrl = urls[0] || 'https://atlas.local';
        setLastSwitch({
          ssid: res?.lan?.ssid || targetSSID,
          kind: res?.lan?.kind || 'wifi',
          ip:   res?.lan?.ip || res?.ip || '',
          url:  primaryUrl,
          pending: !!res?.pending,
          limited: !!res?.limited,
          ok: res?.pending ? null : true,
          message: res?.message || '',
        });
        flash(
          res?.pending
            ? `Switching to ${targetSSID}… stay on the hotspot until it drops.`
            : res?.message || `Atlas is now on ${res?.lan?.ssid || targetSSID}.`,
          !res?.limited
        );
        if (window.AtlasAndroid?.lanSwitchedTo) {
          const allUrls = [...(res?.accessUrls || [])];
          const hintIp = res?.hintIp || res?.lan?.ip || res?.ip || '';
          if (hintIp) {
            if (!allUrls.some(u => u.includes(hintIp))) allUrls.unshift(`https://${hintIp}`);
            if (!allUrls.some(u => u.includes(':5000') && u.includes(hintIp))) allUrls.push(`http://${hintIp}:5000`);
          }
          window.AtlasAndroid.lanSwitchedTo(JSON.stringify(allUrls), !!res?.pending, hintIp || '');
        }
        setSelected(null); setPassword('');
        setManualSSID(''); setManualPass('');
        loadStatus(); loadHotspot();
        // Don't force a WiFi rescan while a background connect is in progress —
        // the active rescan races nmcli connect on the same interface and can
        // cause the first attempt to fail.
        if (!res?.pending) scan();
      })
      .catch(e => flash(errText(e, 'Connection failed'), false))
      .finally(() => setConnecting(false));
  };

  const disconnect = () =>
    api.post('/api/wifi/disconnect', {})
      .then(() => { setLastSwitch(null); flash('Disconnected from network'); loadStatus(); scan(); })
      .catch(e => flash(errText(e, 'Disconnect failed'), false));

  const startHotspot = () => {
    if (!hsSSID) { flash('SSID is required', false); return; }
    if (hsPass.length < 8) { flash('Password must be at least 8 characters', false); return; }
    setHsWorking(true);
    api.post('/api/hotspot/start', {ssid: hsSSID, password: hsPass})
      .then(() => { setLastSwitch(null); flash('Hotspot started'); loadHotspot(); loadStatus(); })
      .catch(e => flash(errText(e, 'Failed to start hotspot'), false))
      .finally(() => setHsWorking(false));
  };

  const stopHotspot = () => {
    setHsWorking(true);
    api.post('/api/hotspot/stop', {})
      .then(() => { flash('Hotspot stopped'); loadHotspot(); loadStatus(); })
      .catch(e => flash(errText(e, 'Failed to stop hotspot'), false))
      .finally(() => setHsWorking(false));
  };

  const saveHotspotConfig = () => {
    if (!hsSSID) { flash('SSID is required', false); return; }
    api.post('/api/hotspot/config', {ssid: hsSSID, password: hsPass})
      .then(() => flash('Hotspot config saved'))
      .catch(e => flash(errText(e, 'Failed to save config'), false));
  };

  const currentSSID = status?.current?.ssid;
  const currentKind = status?.current?.kind || 'wifi';
  const internetOnline = !!status?.connectivity?.online;
  const connectivityChecked = !!status?.connectivity?.checked;
  const primaryCurrentUrl = (status?.accessUrls || [])[0] || 'https://atlas.local';

  const PassToggle = ({show, onToggle}) => (
    <button className="btn btn-sm" onClick={onToggle}
      style={{display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
      {show ? <EyeOffIcon/> : <EyeIcon/>}
    </button>
  );

  return (
    <div className="page">
      <div style={{display:'flex', flexDirection:'column', gap:14}}>

        {/* Flash message */}
        {msg && (
          <div style={{
            padding:'10px 16px', borderRadius:'var(--radius)',
            background: msg.ok ? 'var(--accent-green-dim)' : 'var(--accent-red-dim)',
            color: msg.ok ? 'var(--accent-green)' : 'var(--accent-red)',
            border: `1px solid ${msg.ok ? 'var(--accent-green)' : 'var(--accent-red)'}`,
            fontSize: 13,
          }}>
            {msg.text}
          </div>
        )}

        {/* ── Status banner ───────────────────────────────────────────────── */}
        <div className="card" style={{padding:'12px 16px'}}>
          <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', flexWrap:'wrap', gap:8}}>
            <div style={{display:'flex', alignItems:'center', gap:10}}>
              <div style={{
                width:34, height:34, borderRadius:9, flexShrink:0,
                display:'flex', alignItems:'center', justifyContent:'center',
                background: hotspot?.active
                  ? 'rgba(87,216,255,0.14)'
                  : currentSSID ? 'rgba(94,242,194,0.14)' : 'rgba(255,255,255,0.05)',
              }}>
                {hotspot?.active
                  ? <HotspotIcon color="var(--accent-cyan)"/>
                  : React.cloneElement(Icons.wifi, {style:{width:16,height:16}})
                }
              </div>
              <div>
                <div style={{fontSize:13, fontWeight:600, color:'var(--text-primary)', lineHeight:1.3}}>
                  {hotspot?.active
                    ? `Hotspot · ${hotspot.ssid || hsSSID || '—'}`
                    : currentSSID
                      ? `${currentKind === 'ethernet' ? 'Ethernet' : 'WiFi'} · ${currentSSID}`
                      : 'Not Connected'
                  }
                </div>
                {!hotspot?.active && currentSSID && (
                  <div style={{fontSize:11, color:'var(--text-muted)', fontFamily:'var(--font-mono)', marginTop:1}}>
                    {status?.current?.ip ? `${status.current.ip} · ` : ''}{primaryCurrentUrl}
                  </div>
                )}
              </div>
            </div>
            <div style={{display:'flex', gap:8, alignItems:'center', flexShrink:0}}>
              <span className={`connection-badge ${!connectivityChecked ? 'offline' : internetOnline ? 'online' : 'offline'}`}>
                <span className="dot"/>
                {!connectivityChecked ? 'UNKNOWN' : internetOnline ? 'INTERNET' : 'LOCAL'}
              </span>
              {hotspot?.active && (
                <button className="btn btn-sm" onClick={stopHotspot} disabled={hsWorking}
                  style={{color:'var(--accent-red)', borderColor:'var(--accent-red)', fontSize:12}}>
                  {hsWorking ? 'Stopping…' : 'Stop'}
                </button>
              )}
              {!hotspot?.active && currentSSID && (
                <button className="btn btn-sm" onClick={disconnect}
                  style={{color:'var(--accent-red)', borderColor:'var(--accent-red)', fontSize:12}}>
                  Disconnect
                </button>
              )}
            </div>
          </div>
        </div>

        {/* ── Mode tabs ───────────────────────────────────────────────────── */}
        <div className="wifi-mode-tabs">
          <button
            className={`wifi-tab-btn${activeTab === 'wifi' ? ' active' : ''}`}
            onClick={() => setActiveTab('wifi')}
          >
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 12.55a11 11 0 0114.08 0"/><path d="M1.42 9a16 16 0 0121.16 0"/><path d="M8.53 16.11a6 6 0 016.95 0"/><circle cx="12" cy="20" r="1" fill="currentColor"/></svg>
            WiFi Network
            {!hotspot?.active && currentSSID && (
              <span style={{width:6,height:6,borderRadius:'50%',background:'var(--accent-green)',flexShrink:0}}/>
            )}
          </button>
          <button
            className={`wifi-tab-btn${activeTab === 'hotspot' ? ' active' : ''}`}
            onClick={() => setActiveTab('hotspot')}
          >
            <HotspotIcon color="currentColor"/>
            Hotspot
            {hotspot?.active && (
              <span style={{width:6,height:6,borderRadius:'50%',background:'var(--accent-cyan)',flexShrink:0}}/>
            )}
          </button>
        </div>

        {/* ══ WiFi Network Tab ════════════════════════════════════════════ */}
        {activeTab === 'wifi' && (
          <>
            {/* Post-connect instructions */}
            {lastSwitch && (
              <div className="wifi-next-step">
                {lastSwitch.pending ? (
                  <><strong>Switching to {lastSwitch.ssid}…</strong><br/>
                  Stay on the Atlas hotspot until it disconnects, then join{' '}
                  <span className="wifi-next-url">{lastSwitch.ssid}</span> and open{' '}
                  <span className="wifi-next-url">{lastSwitch.url}</span>.<br/>
                  If the hotspot comes back, the switch failed — retry with different credentials.</>
                ) : lastSwitch.ok === false ? (
                  <><strong>Atlas could not join {lastSwitch.ssid}.</strong><br/>
                  {lastSwitch.message || 'The connection failed.'}<br/>
                  If the hotspot is back, Atlas is reachable there again and you can retry with corrected credentials.</>
                ) : (
                  <><strong>Atlas joined {lastSwitch.kind === 'ethernet' ? 'Ethernet' : lastSwitch.ssid}.</strong><br/>
                  Connect your device to the same network and open{' '}
                  <span className="wifi-next-url">{lastSwitch.url}</span>.
                  {lastSwitch.ip ? <><br/>Direct IP: <span className="wifi-next-url">{lastSwitch.ip}</span></> : null}</>
                )}
              </div>
            )}

            <div className="card">
              {/* Header with scan button */}
              <div className="card-header">
                <div style={{display:'flex', alignItems:'center', gap:8, flexWrap:'wrap'}}>
                  <h2 className="card-title">Nearby Networks</h2>
                  {networks.length > 0 && (
                    <span style={{
                      fontSize:11, fontFamily:'var(--font-mono)', color:'var(--accent-blue)',
                      padding:'3px 8px', border:'1px solid rgba(90,167,255,0.22)',
                      borderRadius:'999px', background:'rgba(90,167,255,0.08)',
                    }}>{networks.length}</span>
                  )}
                  {lastScanAt && (
                    <span style={{fontSize:11, color:'var(--text-muted)', fontFamily:'var(--font-mono)'}}>
                      {lastScanAt.toLocaleTimeString()}
                    </span>
                  )}
                </div>
                <button className="btn btn-sm btn-primary" onClick={scan} disabled={scanning}>
                  {scanning ? 'Scanning…' : 'Scan'}
                </button>
              </div>

              {/* Network list */}
              <div className="wifi-network-list">
                {networks.length === 0 && !scanning && (
                  <p style={{color:'var(--text-muted)', fontSize:13, textAlign:'center', padding:'18px 0'}}>
                    No networks found — tap Scan to search
                  </p>
                )}
                {networks.map((net, idx) => {
                  const isSelected = selected === net;
                  const needsPass  = net.security && net.security !== 'Open';
                  return (
                    <div key={`${net.ssid||'hidden'}|${net.signal}|${net.security||'open'}|${idx}`}>
                      <div
                        className={`wifi-network-row${net.in_use ? ' active' : ''}${isSelected ? ' selected-row' : ''}`}
                        onClick={() => {
                          if (net.in_use) return;
                          const next = isSelected ? null : net;
                          setSelected(next);
                          setPassword('');
                          setShowPass(false);
                        }}
                      >
                        <WifiSignal signal={net.signal}/>
                        <div style={{flex:1, minWidth:0}}>
                          <div className="wifi-ssid">{net.ssid || '(hidden)'}</div>
                          <div className="wifi-security">{net.security || 'Open'} · {net.signal}%</div>
                        </div>
                        {net.in_use
                          ? <span style={{color:'var(--accent-green)', display:'flex', alignItems:'center'}}>{Icons.check}</span>
                          : <ChevronIcon open={isSelected}/>
                        }
                      </div>

                      {/* Inline connect form */}
                      {isSelected && (
                        <div className="wifi-inline-form">
                          {needsPass && (
                            <div style={{marginBottom:10}}>
                              <label style={{display:'block', fontSize:11, color:'var(--text-muted)', marginBottom:5}}>
                                Password for <strong style={{color:'var(--text-secondary)'}}>{net.ssid}</strong>
                              </label>
                              <div style={{display:'flex', gap:6}}>
                                <input
                                  className="input"
                                  type={showPass ? 'text' : 'password'}
                                  placeholder="Network password"
                                  value={password}
                                  onChange={e => setPassword(e.target.value)}
                                  onKeyDown={e => e.key === 'Enter' && doConnect(net.ssid, password)}
                                  style={{flex:1}}
                                  autoFocus
                                />
                                <PassToggle show={showPass} onToggle={() => setShowPass(p => !p)}/>
                              </div>
                            </div>
                          )}
                          <div style={{display:'flex', gap:8}}>
                            <button
                              className="btn btn-primary"
                              onClick={() => doConnect(net.ssid, password)}
                              disabled={connecting}
                              style={{flex:1}}
                            >
                              {connecting ? 'Connecting…' : `Connect to ${net.ssid}`}
                            </button>
                            <button className="btn" onClick={() => { setSelected(null); setPassword(''); }}>
                              Cancel
                            </button>
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>

              {/* Manual entry */}
              <div style={{marginTop:16, paddingTop:14, borderTop:'1px solid var(--border)'}}>
                <div style={{fontSize:12, color:'var(--text-muted)', marginBottom:8, fontWeight:500}}>
                  Not in the list? Enter manually
                </div>
                <div className="hotspot-grid">
                  <input
                    className="input"
                    type="text"
                    placeholder="Network name (SSID)"
                    value={manualSSID}
                    onChange={e => setManualSSID(e.target.value)}
                    style={{width:'100%'}}
                  />
                  <div style={{display:'flex', gap:6}}>
                    <input
                      className="input"
                      type={showManualPass ? 'text' : 'password'}
                      placeholder="Password (blank if open)"
                      value={manualPass}
                      onChange={e => setManualPass(e.target.value)}
                      onKeyDown={e => e.key === 'Enter' && manualSSID.trim() && doConnect(manualSSID, manualPass)}
                      style={{flex:1}}
                    />
                    <PassToggle show={showManualPass} onToggle={() => setShowManualPass(p => !p)}/>
                  </div>
                </div>
                {manualSSID.trim() && (
                  <button
                    className="btn btn-primary"
                    onClick={() => doConnect(manualSSID, manualPass)}
                    disabled={connecting}
                    style={{width:'100%', marginTop:10}}
                  >
                    {connecting ? 'Connecting…' : `Connect to ${manualSSID.trim()}`}
                  </button>
                )}
              </div>
            </div>
          </>
        )}

        {/* ══ Hotspot Tab ══════════════════════════════════════════════════ */}
        {activeTab === 'hotspot' && (
          <div className="card">
            <div className="card-header">
              <h2 className="card-title">Hotspot Configuration</h2>
              {hotspot && (
                <span className={`connection-badge ${hotspot.active ? 'online' : 'offline'}`}>
                  <span className="dot"/>
                  {hotspot.active ? 'ACTIVE' : 'OFF'}
                </span>
              )}
            </div>

            <div style={{display:'flex', flexDirection:'column', gap:14}}>
              <div className="hotspot-grid">
                <div>
                  <label style={{display:'block', fontSize:12, color:'var(--text-muted)', marginBottom:6}}>
                    Network Name (SSID)
                  </label>
                  <input
                    className="input"
                    type="text"
                    placeholder="atlas_navigate"
                    value={hsSSID}
                    onChange={e => setHsSSID(e.target.value)}
                    style={{width:'100%'}}
                  />
                </div>
                <div>
                  <label style={{display:'block', fontSize:12, color:'var(--text-muted)', marginBottom:6}}>
                    Password <span style={{opacity:0.6}}>(min 8 chars)</span>
                  </label>
                  <div style={{display:'flex', gap:6}}>
                    <input
                      className="input"
                      type={showHsPass ? 'text' : 'password'}
                      placeholder="Min 8 characters"
                      value={hsPass}
                      onChange={e => setHsPass(e.target.value)}
                      style={{flex:1}}
                    />
                    <PassToggle show={showHsPass} onToggle={() => setShowHsPass(p => !p)}/>
                  </div>
                </div>
              </div>

              <div style={{display:'flex', gap:8, flexWrap:'wrap'}}>
                <button className="btn btn-sm" onClick={saveHotspotConfig}
                  style={{flexShrink:0}}>
                  Save Config
                </button>
                {!hotspot?.active
                  ? <button className="btn btn-primary" onClick={startHotspot} disabled={hsWorking} style={{flex:1}}>
                      {hsWorking ? 'Starting…' : 'Start Hotspot'}
                    </button>
                  : <button className="btn" onClick={stopHotspot} disabled={hsWorking}
                      style={{flex:1, color:'var(--accent-red)', borderColor:'var(--accent-red)'}}>
                      {hsWorking ? 'Stopping…' : 'Stop Hotspot'}
                    </button>
                }
              </div>

              {hotspot?.active && (
                <div style={{
                  padding:'10px 14px', borderRadius:'var(--radius)',
                  background:'rgba(87,216,255,0.08)', border:'1px solid rgba(87,216,255,0.2)',

                  <span className="wifi-next-url">10.42.0.1</span>.
                </div>
              )}
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

// CalendarPage
// ═══════════════════════════════════════════════
function CalendarPage() {
  const today = new Date();
  const [viewYear, setViewYear] = useState(today.getFullYear());
  const [viewMonth, setViewMonth] = useState(today.getMonth()); // 0-indexed
  const [events, setEvents] = useState([]);
  const [modal, setModal] = useState(false);
  const [editEvent, setEditEvent] = useState(null);
  const [selectedDay, setSelectedDay] = useState(null);
  const blank = { title: '', description: '', date: '', time: '09:00', end_date: '', end_time: '10:00', all_day: false, color: 'blue' };
  const [form, setForm] = useState(blank);
  const [saving, setSaving] = useState(false);
  const [delId, setDelId] = useState(null);

  const COLOR_OPTS = ['blue','green','amber','red','purple','cyan'];

  function loadEvents() {
    const start = Math.floor(new Date(viewYear, viewMonth, 1).getTime() / 1000);
    const end = Math.floor(new Date(viewYear, viewMonth + 1, 0, 23, 59, 59).getTime() / 1000);
    api.get(`/api/calendar?start=${start}&end=${end}`).then(setEvents).catch(() => {});
  }

  useEffect(() => { loadEvents(); }, [viewYear, viewMonth]);

  function prevMonth() {
    if (viewMonth === 0) { setViewYear(y => y - 1); setViewMonth(11); }
    else setViewMonth(m => m - 1);
  }
  function nextMonth() {
    if (viewMonth === 11) { setViewYear(y => y + 1); setViewMonth(0); }
    else setViewMonth(m => m + 1);
  }

  function openNew(dayNum) {
    const dateStr = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
    setForm({ ...blank, date: dateStr, end_date: dateStr });
    setEditEvent(null);
    setSelectedDay(dayNum);
    setModal(true);
  }

  function openEdit(ev, e) {
    e.stopPropagation();
    const sd = new Date(ev.start_ts * 1000);
    const ed = ev.end_ts ? new Date(ev.end_ts * 1000) : sd;
    const pad = n => String(n).padStart(2,'0');
    setForm({
      title: ev.title, description: ev.description || '',
      date: `${sd.getFullYear()}-${pad(sd.getMonth()+1)}-${pad(sd.getDate())}`,
      time: `${pad(sd.getHours())}:${pad(sd.getMinutes())}`,
      end_date: `${ed.getFullYear()}-${pad(ed.getMonth()+1)}-${pad(ed.getDate())}`,
      end_time: `${pad(ed.getHours())}:${pad(ed.getMinutes())}`,
      all_day: !!ev.all_day, color: ev.color || 'blue',
    });
    setEditEvent(ev);
    setModal(true);
  }

  function buildTimestamp(dateStr, timeStr, allDay) {
    if (!dateStr) return null;
    if (allDay) return Math.floor(new Date(dateStr + 'T00:00:00').getTime() / 1000);
    return Math.floor(new Date(`${dateStr}T${timeStr || '00:00'}:00`).getTime() / 1000);
  }

  async function saveEvent() {
    if (!form.title.trim() || !form.date) return;
    setSaving(true);
    const payload = {
      title: form.title.trim(),
      description: form.description.trim(),
      start_ts: buildTimestamp(form.date, form.time, form.all_day),
      end_ts: form.end_date ? buildTimestamp(form.end_date, form.end_time, form.all_day) : null,
      all_day: form.all_day,
      color: form.color,
    };
    try {
      if (editEvent) { await api.put(`/api/calendar/${editEvent.id}`, payload); }
      else { await api.post('/api/calendar', payload); }
      setModal(false);
      loadEvents();
    } catch(err) {}
    setSaving(false);
  }

  async function deleteEvent() {
    if (!delId) return;
    await api.del(`/api/calendar/${delId}`);
    setDelId(null);
    setModal(false);
    loadEvents();
  }

  // Build calendar grid
  const firstDay = new Date(viewYear, viewMonth, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  const accentMap = { blue:'var(--accent-blue)', green:'var(--accent-green)', amber:'var(--accent-amber)', red:'var(--accent-red)', purple:'var(--accent-purple)', cyan:'var(--accent-cyan)' };

  function eventsForDay(day) {
    const dayStart = Math.floor(new Date(viewYear, viewMonth, day).getTime() / 1000);
    const dayEnd = dayStart + 86399;
    return events.filter(ev => {
      const s = ev.start_ts, e = ev.end_ts || ev.start_ts;
      return s <= dayEnd && e >= dayStart;
    });
  }

  const isToday = (d) => d === today.getDate() && viewMonth === today.getMonth() && viewYear === today.getFullYear();

  return (
    <div className="page" style={{display:'flex',flexDirection:'column',gap:16}}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <button className="btn btn-sm" onClick={prevMonth} style={{padding:'4px 10px'}}>‹</button>
          <span style={{fontSize:18,fontWeight:700,color:'var(--text-primary)',minWidth:160,textAlign:'center'}}>
            {MONTH_NAMES[viewMonth]} {viewYear}
          </span>
          <button className="btn btn-sm" onClick={nextMonth} style={{padding:'4px 10px'}}>›</button>
        </div>
        <button className="btn btn-sm" onClick={() => { setViewYear(today.getFullYear()); setViewMonth(today.getMonth()); }} style={{marginLeft:'auto'}}>Today</button>
      </div>

      {/* Grid */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,flex:1}}>
        {DAY_NAMES.map(d => (
          <div key={d} style={{textAlign:'center',fontSize:11,fontWeight:600,color:'var(--text-muted)',padding:'4px 0',letterSpacing:'0.05em'}}>{d}</div>
        ))}
        {Array.from({length: firstDay}).map((_, i) => <div key={`e${i}`}/>)}
        {Array.from({length: daysInMonth}, (_, i) => i + 1).map(day => {
          const dayEvs = eventsForDay(day);
          return (
            <div key={day}
              onClick={() => openNew(day)}
              style={{
                minHeight:72, background:'var(--bg-card)', border:`1px solid ${isToday(day) ? 'var(--accent-green)' : 'var(--border)'}`,
                borderRadius:'var(--radius)', padding:'4px 6px', cursor:'pointer',
                transition:'background var(--transition)',
              }}
              onMouseOver={e => e.currentTarget.style.background='var(--bg-card-hover)'}
              onMouseOut={e => e.currentTarget.style.background='var(--bg-card)'}
            >
              <div style={{fontSize:12,fontWeight:isToday(day)?700:400,color:isToday(day)?'var(--accent-green)':'var(--text-secondary)',marginBottom:2}}>{day}</div>
              {dayEvs.slice(0,3).map(ev => (
                <div key={ev.id}
                  onClick={e => openEdit(ev, e)}
                  style={{
                    fontSize:10,padding:'1px 5px',borderRadius:3,marginBottom:2,
                    background: (accentMap[ev.color]||accentMap.blue) + '33',
                    borderLeft:`2px solid ${accentMap[ev.color]||accentMap.blue}`,
                    color:'var(--text-primary)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',
                    cursor:'pointer',
                  }}
                  title={ev.title}
                >{ev.title}</div>
              ))}
              {dayEvs.length > 3 && <div style={{fontSize:9,color:'var(--text-muted)'}}>+{dayEvs.length-3} more</div>}
            </div>
          );
        })}
      </div>

      {/* Event Modal */}
      {modal && (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.65)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:3000,padding:16}} onClick={() => setModal(false)}>
          <div style={{background:'var(--bg-card)',border:'1px solid var(--border-bright)',borderRadius:'var(--radius-lg)',padding:24,width:'100%',maxWidth:480,maxHeight:'90vh',overflowY:'auto',boxShadow:'var(--shadow)'}} onClick={e => e.stopPropagation()}>
            <div className="card-header" style={{marginBottom:16}}>
              <span style={{fontSize:15,fontWeight:700,color:'var(--text-primary)'}}>{editEvent ? 'Edit Event' : 'New Event'}</span>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              <input style={{width:'100%',padding:'7px 10px',background:'var(--bg-input)',border:'1px solid var(--border)',borderRadius:'var(--radius)',color:'var(--text-primary)',fontSize:13,outline:'none',boxSizing:'border-box'}} placeholder="Title *" value={form.title} onChange={e => setForm(f=>({...f,title:e.target.value}))} autoFocus/>
              <textarea style={{width:'100%',padding:'7px 10px',background:'var(--bg-input)',border:'1px solid var(--border)',borderRadius:'var(--radius)',color:'var(--text-primary)',fontSize:13,outline:'none',boxSizing:'border-box',resize:'vertical'}} placeholder="Description" rows={2} value={form.description} onChange={e => setForm(f=>({...f,description:e.target.value}))}/>
              <label style={{display:'flex',alignItems:'center',gap:8,fontSize:13,color:'var(--text-primary)'}}>
                <input type="checkbox" checked={form.all_day} onChange={e => setForm(f=>({...f,all_day:e.target.checked}))}/>
                All day
              </label>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                <div>
                  <div style={{fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.06em',color:'var(--text-muted)',marginBottom:4}}>Start date</div>
                  <input style={{width:'100%',padding:'7px 10px',background:'var(--bg-input)',border:'1px solid var(--border)',borderRadius:'var(--radius)',color:'var(--text-primary)',fontSize:13,outline:'none',boxSizing:'border-box'}} type="date" value={form.date} onChange={e => setForm(f=>({...f,date:e.target.value}))}/>
                </div>
                {!form.all_day && (
                  <div>
                    <div style={{fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.06em',color:'var(--text-muted)',marginBottom:4}}>Start time</div>
                    <input style={{width:'100%',padding:'7px 10px',background:'var(--bg-input)',border:'1px solid var(--border)',borderRadius:'var(--radius)',color:'var(--text-primary)',fontSize:13,outline:'none',boxSizing:'border-box'}} type="time" value={form.time} onChange={e => setForm(f=>({...f,time:e.target.value}))}/>
                  </div>
                )}
                <div>
                  <div style={{fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.06em',color:'var(--text-muted)',marginBottom:4}}>End date</div>
                  <input style={{width:'100%',padding:'7px 10px',background:'var(--bg-input)',border:'1px solid var(--border)',borderRadius:'var(--radius)',color:'var(--text-primary)',fontSize:13,outline:'none',boxSizing:'border-box'}} type="date" value={form.end_date} onChange={e => setForm(f=>({...f,end_date:e.target.value}))}/>
                </div>
                {!form.all_day && (
                  <div>
                    <div style={{fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.06em',color:'var(--text-muted)',marginBottom:4}}>End time</div>
                    <input style={{width:'100%',padding:'7px 10px',background:'var(--bg-input)',border:'1px solid var(--border)',borderRadius:'var(--radius)',color:'var(--text-primary)',fontSize:13,outline:'none',boxSizing:'border-box'}} type="time" value={form.end_time} onChange={e => setForm(f=>({...f,end_time:e.target.value}))}/>
                  </div>
                )}
              </div>
              <div>
                <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:6}}>Color</div>
                <div style={{display:'flex',gap:8}}>
                  {COLOR_OPTS.map(c => (
                    <div key={c} onClick={() => setForm(f=>({...f,color:c}))}
                      style={{width:22,height:22,borderRadius:'50%',background:accentMap[c],cursor:'pointer',
                        outline:form.color===c?`2px solid white`:'2px solid transparent',outlineOffset:2}}/>
                  ))}
                </div>
              </div>
              <div style={{display:'flex',gap:8,marginTop:4}}>
                <button className="btn btn-primary" style={{flex:1}} onClick={saveEvent} disabled={saving || !form.title.trim() || !form.date}>
                  {saving ? 'Saving…' : 'Save'}
                </button>
                {editEvent && (
                  <button className="btn" style={{color:'var(--accent-red)',borderColor:'var(--accent-red)'}} onClick={() => setDelId(editEvent.id)}>Delete</button>
                )}
                <button className="btn" onClick={() => setModal(false)}>Cancel</button>
              </div>
              {delId && (
                <div style={{background:'var(--accent-red-dim)',border:'1px solid var(--accent-red)',borderRadius:'var(--radius)',padding:'10px 12px',fontSize:13}}>
                  Delete "{editEvent?.title}"?
                  <div style={{display:'flex',gap:8,marginTop:8}}>
                    <button className="btn btn-sm" style={{background:'var(--accent-red)',color:'#fff',border:'none'}} onClick={deleteEvent}>Delete</button>
                    <button className="btn btn-sm" onClick={() => setDelId(null)}>Cancel</button>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// CalculatorPage
// ═══════════════════════════════════════════════
function CalculatorPage() {
  const [expr, setExpr] = useState('');
  const [result, setResult] = useState(null);
  const [error, setError] = useState('');
  const [history, setHistory] = useState([]);
  const inputRef = useRef(null);

  const BUTTONS = [
    ['7','8','9','÷','('],
    ['4','5','6','×',')'  ],
    ['1','2','3','-','**' ],
    ['0','.','±','+','%'  ],
    ['C','←','sin','cos','tan'],
    ['sqrt','log','log10','pi','e'],
    ['radians','degrees','=','',''],
  ];

  function press(val) {
    if (val === '=') { calculate(); return; }
    if (val === 'C') { setExpr(''); setResult(null); setError(''); return; }
    if (val === '←') { setExpr(e => e.slice(0,-1)); return; }
    if (val === '±') { setExpr(e => e.startsWith('-') ? e.slice(1) : '-' + e); return; }
    if (val === '') return;

    const insertMap = {
      '÷': '/', '×': '*',
      'sin': 'sin(', 'cos': 'cos(', 'tan': 'tan(',
      'sqrt': 'sqrt(', 'log': 'log(', 'log10': 'log10(',
      'radians': 'radians(', 'degrees': 'degrees(',
      'pi': 'pi', 'e': 'e',
    };
    setExpr(e => e + (insertMap[val] ?? val));
    inputRef.current?.focus();
  }

  async function calculate() {
    if (!expr.trim()) return;
    setError('');
    setResult(null);
    try {
      const data = await api.post('/api/calculator', { expression: expr });
      const res = data.result;
      setResult(res);
      setHistory(h => [{ expr, result: res }, ...h].slice(0, 20));
    } catch(err) {
      setError(err.message || 'Calculation error');
    }
  }

  function handleKey(e) {
    if (e.key === 'Enter') { e.preventDefault(); calculate(); }
  }

  function loadFromHistory(item) {
    setExpr(item.expr);
    setResult(item.result);
    setError('');
  }

  const btnStyle = (val) => ({
    padding:'10px 6px', fontSize:13, fontWeight:500, borderRadius:'var(--radius)',
    border:'1px solid var(--border)', background:'var(--bg-card)',
    color: val === '=' ? 'var(--bg-primary)' : val === 'C' ? 'var(--accent-red)' : 'var(--text-primary)',
    background: val === '=' ? 'var(--accent-green)' : val === 'C' ? 'var(--accent-red-dim)' : 'var(--bg-card)',
    cursor: val === '' ? 'default' : 'pointer',
    transition:'background var(--transition)',
    opacity: val === '' ? 0 : 1,
  });

  return (
    <div className="page" style={{display:'flex',gap:20,flexWrap:'wrap',alignItems:'flex-start'}}>
      {/* Calculator panel */}
      <div className="card" style={{width:340,flexShrink:0}}>
        <div className="card-header" style={{marginBottom:14}}>
          <span className="card-title">Scientific Calculator</span>
        </div>

        {/* Display */}
        <div style={{background:'var(--bg-input)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'10px 14px',marginBottom:10}}>
          <input
            ref={inputRef}
            style={{width:'100%',background:'transparent',border:'none',fontSize:15,fontFamily:'var(--font-mono)',padding:0,color:'var(--text-primary)',outline:'none'}}
            value={expr}
            onChange={e => { setExpr(e.target.value); setResult(null); setError(''); }}
            onKeyDown={handleKey}
            placeholder="Enter expression…"
          />
          {result !== null && (
            <div style={{fontSize:20,fontWeight:700,color:'var(--accent-green)',fontFamily:'var(--font-mono)',marginTop:4}}>
              = {typeof result === 'number' ? (Number.isInteger(result) ? result : parseFloat(result.toPrecision(10))) : result}
            </div>
          )}
          {error && <div style={{color:'var(--accent-red)',fontSize:12,marginTop:4}}>{error}</div>}
        </div>

        {/* Button grid */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:5}}>
          {BUTTONS.flat().map((val, i) => (
            <button key={i} style={btnStyle(val)} onClick={() => press(val)}
              onMouseOver={e => { if(val && val!=='=') e.currentTarget.style.background='var(--bg-card-hover)'; }}
              onMouseOut={e => { if(val && val!=='=') e.currentTarget.style.background=btnStyle(val).background; }}
            >{val}</button>
          ))}
        </div>

        {/* Quick reference */}
        <div style={{marginTop:14,fontSize:11,color:'var(--text-muted)',lineHeight:1.7}}>
          <b style={{color:'var(--text-secondary)'}}>Tips:</b> Use Python syntax.
          <br/>sin/cos/tan take radians — wrap with <code>radians()</code> for degrees.
          <br/>e.g. <code>sin(radians(45))</code> → 0.7071
          <br/><code>sqrt(9.8 * 2 * 100)</code> → ballistic velocity
        </div>
      </div>

      {/* History panel */}
      <div className="card" style={{flex:1,minWidth:200}}>
        <div className="card-header" style={{marginBottom:10}}>
          <span className="card-title">History</span>
          {history.length > 0 && (
            <button className="btn btn-sm" style={{fontSize:11}} onClick={() => setHistory([])}>Clear</button>
          )}
        </div>
        {history.length === 0 ? (
          <div className="empty-state">No calculations yet.</div>
        ) : (
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {history.map((item, i) => (
              <div key={i} onClick={() => loadFromHistory(item)}
                style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'8px 12px',cursor:'pointer'}}
                onMouseOver={e => e.currentTarget.style.background='var(--bg-card-hover)'}
                onMouseOut={e => e.currentTarget.style.background='var(--bg-card)'}
              >
                <div style={{fontFamily:'var(--font-mono)',fontSize:12,color:'var(--text-secondary)'}}>{item.expr}</div>
                <div style={{fontFamily:'var(--font-mono)',fontSize:14,fontWeight:600,color:'var(--accent-green)'}}>
                  = {typeof item.result === 'number' ? (Number.isInteger(item.result) ? item.result : parseFloat(item.result.toPrecision(10))) : item.result}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function HikingSection({ nodes, device, gpsStatus }) {
  const MAX_VISIBLE_TRAILS = 250;
  const [parks, setParks] = useState([]);
  const [parksLoading, setParksLoading] = useState(true);
  const [parksError, setParksError] = useState('');
  const [selectedPark, setSelectedPark] = useState('');
  const [trails, setTrails] = useState([]);
  const [trailsLoading, setTrailsLoading] = useState(false);
  const [trailsError, setTrailsError] = useState('');
  const [selectedTrail, setSelectedTrail] = useState('');
  const [trailQuery, setTrailQuery] = useState('');
  const [pendingDest, setPendingDest] = useState(null);
  const [selectorOpen, setSelectorOpen] = useState(() => !isAtlasMobileClient());
  const deferredTrailQuery = useDeferredValue(trailQuery);

  const visibleTrails = useMemo(() => {
    const needle = deferredTrailQuery.trim().toLowerCase();
    let list = trails;
    if (needle) {
      list = trails.filter(trail => {
        const name = String(trail.name || '').toLowerCase();
        return name.includes(needle);
      });
    }
    let sliced = list.slice(0, MAX_VISIBLE_TRAILS);
    if (selectedTrail && !sliced.some(trail => String(trail.id) === selectedTrail)) {
      const activeTrail = trails.find(trail => String(trail.id) === selectedTrail);
      if (activeTrail) sliced = [activeTrail, ...sliced].slice(0, MAX_VISIBLE_TRAILS);
    }
    return sliced;
  }, [trails, deferredTrailQuery, selectedTrail]);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const data = await api.get('/api/hiking/parks');
        if (!cancelled) setParks(Array.isArray(data) ? data : []);
      } catch (e) {
        if (!cancelled) setParksError(e?.message || 'Unable to load National Parks.');
      } finally {
        if (!cancelled) setParksLoading(false);
      }
    })();
    return () => { cancelled = true; };
  }, []);

  useEffect(() => {
    if (!selectedPark) {
      setTrails([]);
      setSelectedTrail('');
      setTrailQuery('');
      setTrailsError('');
      return;
    }

    let cancelled = false;
    setTrailsLoading(true);
    setTrailsError('');
    setTrails([]);
    setSelectedTrail('');
    setTrailQuery('');
    (async () => {
      try {
        const data = await api.get(`/api/hiking/parks/${encodeURIComponent(selectedPark)}/trails`);
        if (!cancelled) setTrails(Array.isArray(data) ? data : []);
      } catch (e) {
        if (!cancelled) setTrailsError(e?.message || 'Unable to load park trails.');
      } finally {
        if (!cancelled) setTrailsLoading(false);
      }
    })();
    return () => { cancelled = true; };
  }, [selectedPark]);

  useEffect(() => {
    if (!selectedTrail) return;
    const trail = trails.find(t => String(t.id) === selectedTrail);
    if (!trail) return;
    setPendingDest({
      lat: Number(trail.lat),
      lon: Number(trail.lon),
      name: trail.name,
    });
  }, [selectedTrail, trails]);

  return (
    <div style={{display:'flex',flexDirection:'column',gap:12,flex:1,minHeight:0}}>
      <div className="card" style={{padding:'16px 18px',margin:'16px 16px 0 16px',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom: selectorOpen ? 14 : 0,cursor:'pointer'}}
          onClick={() => setSelectorOpen(o => !o)}>
          <div style={{
            width:36,height:36,borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',
            background:'linear-gradient(135deg, var(--accent-amber-dim), rgba(90,167,255,0.12))',
            border:'1px solid var(--border)',
            color:'var(--accent-amber)',flexShrink:0
          }}>{Icons.mountain}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:14,fontWeight:700,color:'var(--text-primary)',letterSpacing:'-0.02em'}}>National Park Trails</div>
            <div style={{fontSize:12,color:'var(--text-muted)'}}>
              {selectorOpen ? 'Pick a park first, then choose a trail.' : selectedPark ? `Park selected${selectedTrail ? ' · Trail selected' : ''}` : 'Tap to expand'}
            </div>
          </div>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"
            style={{flexShrink:0, color:'var(--text-muted)', transition:'transform 200ms', transform: selectorOpen ? 'rotate(180deg)' : 'none'}}>
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
        {selectorOpen && (
        <div style={{
          display:'grid',
          gridTemplateColumns:'repeat(auto-fit, minmax(220px, 1fr))',
          gap:12,
          padding:'14px',
          borderRadius:'16px',
          background:'linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01))',
          border:'1px solid var(--border)'
        }}>
          <div>
            <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.05em'}}>Park</div>
            <select
              className="input"
              value={selectedPark}
              onChange={e => setSelectedPark(e.target.value)}
              disabled={parksLoading}
              style={{width:'100%',appearance:'none',WebkitAppearance:'none'}}
            >
              <option value="">{parksLoading ? 'Loading parks…' : 'Select a National Park'}</option>
              {parks.map(park => (
                <option key={park.park_code} value={park.park_code}>
                  {park.name}
                </option>
              ))}
            </select>
          </div>
          <div>
            <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.05em'}}>Trail</div>
            {selectedPark && trails.length > MAX_VISIBLE_TRAILS && (
              <input
                className="input"
                value={trailQuery}
                onChange={e => setTrailQuery(e.target.value)}
                placeholder={`Filter ${trails.length.toLocaleString()} trails…`}
                style={{width:'100%',marginBottom:8}}
              />
            )}
            <select
              className="input"
              value={selectedTrail}
              onChange={e => setSelectedTrail(e.target.value)}
              disabled={!selectedPark || trailsLoading}
              style={{width:'100%',appearance:'none',WebkitAppearance:'none'}}
            >
              <option value="">
                {!selectedPark ? 'Select a park first' : trailsLoading ? 'Loading trails…' : visibleTrails.length ? 'Select a trail' : 'No trails found'}
              </option>
              {visibleTrails.map(trail => (
                <option key={trail.id} value={String(trail.id)}>
                  {trail.name}
                </option>
              ))}
            </select>
          </div>
        </div>
        )}
        {selectorOpen && (parksError || trailsError) && (
          <div style={{
            marginTop:10,fontSize:12,color:'var(--accent-red)',
            background:'var(--accent-red-dim)',border:'1px solid rgba(255,111,111,0.2)',
            borderRadius:'12px',padding:'10px 12px'
          }}>{parksError || trailsError}</div>
        )}
        {selectorOpen && !!selectedPark && !trailsLoading && !trailsError && (
          <div style={{
            marginTop:10,fontSize:12,color:'var(--text-muted)',
            background:'rgba(90,167,255,0.08)',border:'1px solid var(--border)',
            borderRadius:'12px',padding:'10px 12px'
          }}>
            {trails.length.toLocaleString()} trail{trails.length === 1 ? '' : 's'} loaded for the selected park.
            {trails.length > visibleTrails.length && ` Showing ${visibleTrails.length.toLocaleString()} at a time to keep the page responsive.`}
          </div>
        )}
      </div>
      <NavigatePage
        nodes={nodes}
        device={device}
        gpsStatus={gpsStatus}
        initialDest={pendingDest}
        onDestConsumed={() => setPendingDest(null)}
        defaultMode="hiking"
        availableModes={NAV_MODES.filter(m => m.value === 'hiking')}
        autoShowTrailOverlay={false}
        searchPlaceholder="Search within trails, or enter lat, lon…"
      />
    </div>
  );
}

// ═══════════════════════════════════════════════
// Main App
// ═══════════════════════════════════════════════
const DEFAULT_PAGES = [
  { id: 'dashboard', icon: Icons.dashboard,  label: 'Dashboard', group: 'main'  },
  { id: 'mesh',      icon: Icons.topology,   label: 'Mesh',      group: 'mesh'  },
  { id: 'map',       icon: Icons.map,        label: 'Map',       group: 'map'   },
  { id: 'hiking',    icon: Icons.mountain,   label: 'Hiking',    group: 'map'   },
  { id: 'comms',     icon: Icons.messages,   label: 'Messages',  group: 'comms' },
  { id: 'tools',     icon: Icons.calculator, label: 'Tools',     group: 'tools' },
  { id: 'system',    icon: Icons.settings,   label: 'Settings',  group: 'sys'   },
  { id: 'ai',        icon: Icons.ai,         label: 'Ray',       group: 'ai'    },
];
const ALWAYS_VISIBLE_PAGES = ['system'];

function App() {
  const searchParams = new URLSearchParams(window.location.search);
  const isAtlasMobileApp = isAtlasMobileClient();
  const isAtlasMobileAndroid = /AtlasMobileAndroid\//.test(navigator.userAgent);
  const dashboardTitle = 'Atlas Control';
  const initialPage = searchParams.get('page') || 'dashboard';
  const [page, setPage] = useState(initialPage);
  const [stats, setStats] = useState({});
  const [nodes, setNodes] = useState([]);
  const [messages, setMessages] = useState([]);
  const [alerts, setAlerts] = useState([]);
  const [device, setDevice] = useState({});
  const [trackerDevices, setTrackerDevices] = useState([]);
  const [gpsStatus, setGpsStatus] = useState({connected: false, fix: null});
  const [appSettings, setAppSettings] = useState({
    units: 'metric', date_format: 'relative', timezone: 'auto', show_offline_nodes: 'true',
    node_online_window_h: '2', dashboard_refresh_s: '5', map_default_zoom: '13',
    battery_alert_pct: '20', node_offline_min: '30', serial_port: '/dev/ttyACM0',
  });
  const socketRef = useRef(null);
  const intervalRef = useRef(null);
  const [socketConnected, setSocketConnected] = useState(false);

  // Sidebar personalization from localStorage
  const [sidebarOrder, setSidebarOrder] = useState(() => {
    try { const s = localStorage.getItem('sidebarOrder'); return s ? JSON.parse(s) : null; } catch { return null; }
  });
  const [hiddenPages, setHiddenPages] = useState(() => {
    try {
      const s = localStorage.getItem('hiddenPages');
      const parsed = s ? JSON.parse(s) : [];
      return Array.isArray(parsed) ? parsed.filter(id => !ALWAYS_VISIBLE_PAGES.includes(id)) : [];
    } catch { return []; }
  });
  const [themeMode, setThemeMode] = useState(() => localStorage.getItem('uiTheme') || 'dark');
  const [dragItem, setDragItem] = useState(null);
  const [dragOver, setDragOver] = useState(null);

  // Apply persisted UI theme.
  useEffect(() => {
    const root = document.documentElement;
    root.dataset.theme = themeMode === 'light' ? 'light' : 'dark';
    const meta = document.querySelector('meta[name="theme-color"]');
    if (meta) {
      const resolved = getComputedStyle(root).getPropertyValue('--theme-color').trim();
      if (resolved) meta.setAttribute('content', resolved);
    }
  }, [themeMode]);

  const refresh = useCallback(async () => {
    const results = await Promise.allSettled([
      api.get('/api/stats'),
      api.get('/api/nodes'),
      api.get('/api/messages'),
      api.get('/api/alerts'),
      api.get('/api/device'),
      api.get('/api/tracker/devices'),
    ]);
    const values = results.map(r => r.status === 'fulfilled' ? r.value : undefined);
    const [s, n, m, a, d, t] = values;
    if (s !== undefined) setStats(s);
    if (n !== undefined) setNodes(Array.isArray(n) ? n : []);
    if (m !== undefined) setMessages(Array.isArray(m) ? m : []);
    if (a !== undefined) setAlerts(Array.isArray(a) ? a : []);
    if (d !== undefined) setDevice(d || {});
    if (t !== undefined) setTrackerDevices(Array.isArray(t) ? t : []);
  }, []);

  // Load app settings from server
  useEffect(() => {
    api.get('/api/settings').then(s => {
      if (!s || s.error) return;
      setAppSettings(prev => ({...prev, ...s}));
      if (s.ui_theme) {
        setThemeMode(s.ui_theme);
        localStorage.setItem('uiTheme', s.ui_theme);
      }
      if (s.hidden_pages) {
        try {
          const parsed = JSON.parse(s.hidden_pages);
          if (Array.isArray(parsed)) {
            const next = parsed.filter(id => !ALWAYS_VISIBLE_PAGES.includes(id));
            setHiddenPages(next);
            localStorage.setItem('hiddenPages', JSON.stringify(next));
          }
        } catch (_) {}
      }
      if (s.sidebar_order) {
        try {
          const parsed = JSON.parse(s.sidebar_order);
          if (Array.isArray(parsed) && parsed.length) {
            setSidebarOrder(parsed);
            localStorage.setItem('sidebarOrder', JSON.stringify(parsed));
          }
        } catch (_) {}
      }
    }).catch(() => {});
  }, []);

  // Load GPS status on mount
  useEffect(() => {
    api.get('/api/gps').then(s => { if (s) setGpsStatus(s); }).catch(() => {});
  }, []);

  // Data refresh interval — restarts when interval setting changes
  useEffect(() => {
    refresh();
    const baseMs = Math.max(1, parseInt(appSettings.dashboard_refresh_s || '5')) * 1000;
    // When realtime socket updates are healthy, keep a slow background sync
    // instead of hammering the API with full refreshes every few seconds.
    const ms = socketConnected ? Math.max(baseMs, 30000) : baseMs;
    if (intervalRef.current) clearInterval(intervalRef.current);
    intervalRef.current = setInterval(refresh, ms);
    return () => { if (intervalRef.current) clearInterval(intervalRef.current); };
  }, [refresh, appSettings.dashboard_refresh_s, socketConnected]);

  // Map page → room(s) to join
  const pageRooms = {
    dashboard: ['mesh', 'chat'],
    messages:  ['chat'],
    nodes:     ['mesh', 'telemetry'],
    topology:  ['mesh'],
    map:       ['mesh', 'map'],
    hiking:    ['mesh', 'map'],
    navigate:  ['mesh'],
    power:     ['system'],
    alerts:    ['mesh', 'chat'],
    ai:        [],
    system:    ['system'],
    settings:  [],
  };

  // Re-join rooms whenever the active page changes
  useEffect(() => {
    const socket = socketRef.current;
    if (!socket || !socket.connected) return;
    socket.emit('join_rooms', { rooms: pageRooms[page] || [] });
  }, [page]); // eslint-disable-line

  // WebSocket (runs once)
  useEffect(() => {
    try {
      const socket = io(window.location.origin, {
        transports: isAtlasMobileApp ? ['polling'] : ['websocket', 'polling'],
        upgrade: !isAtlasMobileApp,
        // perMessageDeflate is negotiated automatically when server supports it
      });
      socketRef.current = socket;
      // Expose to MapPage so it can subscribe to position_update without a second connection.
      window._atlasSocket = socket;

      socket.on('connect', () => {
        setSocketConnected(true);
        // Announce which rooms this client wants on (re)connect
        socket.emit('join_rooms', { rooms: pageRooms[page] || [] });
      });

      socket.on('disconnect', () => {
        setSocketConnected(false);
      });

      // node_update carries the node dict directly — update state without full refresh
      socket.on('node_update', (data) => {
        if (data && data.node_id) {
          setNodes(prev => {
            const idx = prev.findIndex(n => n.node_id === data.node_id);
            if (idx >= 0) {
              const cur = prev[idx];
              const next = [...prev];
              // Preserve existing GPS coordinates — a non-position packet may
              // arrive with null lat/lon (radio node-DB has no fresh position)
              // and a naive spread would wipe the previously-known location.
              next[idx] = { ...cur, ...data,
                latitude:  data.latitude  ?? cur.latitude,
                longitude: data.longitude ?? cur.longitude,
              };
              return next;
            }
            return [data, ...prev];
          });
        } else {
          refresh();
        }
      });

      // position_update: move node marker to new coords immediately
      socket.on('position_update', (data) => {
        if (data && data.node_id && data.latitude && data.longitude) {
          setNodes(prev => {
            const idx = prev.findIndex(n => n.node_id === data.node_id);
            if (idx < 0) {
              // Node not yet in state — add a stub so it appears on the map
              // immediately. node_update will arrive shortly and fill in the rest.
              return [{
                node_id:    data.node_id,
                long_name:  'Unknown',
                short_name: '???',
                hw_model:   'UNKNOWN',
                latitude:   data.latitude,
                longitude:  data.longitude,
                last_heard: data.timestamp || null,
                ...(data.altitude != null ? { altitude: data.altitude } : {}),
              }, ...prev];
            }
            const next = [...prev];
            next[idx] = {
              ...next[idx],
              latitude:   data.latitude,
              longitude:  data.longitude,
              last_heard: data.timestamp || next[idx].last_heard,
              ...(data.altitude != null ? { altitude: data.altitude } : {}),
            };
            return next;
          });
        }
      });

      // new_message carries the message dict directly
      socket.on('new_message', (data) => {
        if (data && data.from_id) {
          setMessages(prev => {
            // deduplicate by packet_id if present
            if (data.packet_id && prev.some(m => m.packet_id === data.packet_id)) return prev;
            return [data, ...prev].slice(0, 200);
          });
        } else {
          refresh();
        }
      });

      socket.on('new_alert', (data) => {
        refresh();
        if (Notification.permission === 'granted' && data) {
          new Notification(dashboardTitle + ' Alert', { body: data.text || data.node || 'New alert' });
        }
      });

      socket.on('connection_status', () => refresh());

      socket.on('tracker_update', (dev) => {
        if (!dev) return;
        setTrackerDevices(prev => {
          const idx = prev.findIndex(d => d.id === dev.id);
          if (idx >= 0) { const next = [...prev]; next[idx] = dev; return next; }
          return [dev, ...prev];
        });
      });

      socket.on('node_removed', ({ node_id }) => {
        setNodes(prev => prev.filter(n => n.node_id !== node_id));
      });

      socket.on('tracker_removed', ({ id }) => {
        setTrackerDevices(prev => prev.filter(d => d.id !== id));
      });

      socket.on('gps_status', (data) => {
        if (data) setGpsStatus(prev => ({...prev, ...data}));
      });

      socket.on('gps_update', (fix) => {
        if (fix) setGpsStatus(prev => ({...prev, connected: true, fix: {...fix}}));
      });
    } catch(e) { console.log('WebSocket unavailable, using polling'); }
    if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
    return () => {
      setSocketConnected(false);
      if (socketRef.current) socketRef.current.disconnect();
    };
  }, []); // eslint-disable-line

  // Computed ordered + visible sidebar pages
  const orderedPages = useMemo(() => {
    const allIds = DEFAULT_PAGES.map(p => p.id);
    const order = sidebarOrder || allIds;
    // Ensure all pages are represented (handles new pages added after order was saved)
    const fullOrder = [...order, ...allIds.filter(id => !order.includes(id))];
    return fullOrder
      .map(id => DEFAULT_PAGES.find(p => p.id === id))
      .filter(p => p && !hiddenPages.includes(p.id));
  }, [sidebarOrder, hiddenPages]);

  // Sidebar drag-and-drop handlers
  // Drop is handled at the <nav> level so releasing over a divider still works.
  function handleDragStart(e, pageId) {
    setDragItem(pageId);
    e.dataTransfer.effectAllowed = 'move';
  }
  function handleDragEnd() { setDragItem(null); setDragOver(null); }

  // Find the sidebar button whose centre is closest to a given clientY coordinate.
  function closestSidebarPageId(clientY) {
    const btns = document.querySelectorAll('.sidebar-btn[data-page-id]');
    let closest = null, minDist = Infinity;
    for (const btn of btns) {
      const rect = btn.getBoundingClientRect();
      const centre = rect.top + rect.height / 2;
      const dist = Math.abs(clientY - centre);
      if (dist < minDist) { minDist = dist; closest = btn; }
    }
    return closest ? closest.getAttribute('data-page-id') : null;
  }

  function handleSidebarDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    if (!dragItem) return;
    setDragOver(closestSidebarPageId(e.clientY));
  }

  function handleSidebarDragLeave(e) {
    // Only clear the highlight when the cursor leaves the nav entirely.
    if (!e.currentTarget.contains(e.relatedTarget)) setDragOver(null);
  }

  function handleSidebarDrop(e) {
    e.preventDefault();
    setDragOver(null);
    const item = dragItem;
    setDragItem(null);
    if (!item) return;
    const targetId = closestSidebarPageId(e.clientY);
    if (!targetId || targetId === item) return;
    const allIds = DEFAULT_PAGES.map(p => p.id);
    const cur = sidebarOrder || allIds;
    const fullOrder = [...cur, ...allIds.filter(id => !cur.includes(id))];
    const from = fullOrder.indexOf(item);
    const to   = fullOrder.indexOf(targetId);
    if (from === -1 || to === -1) return;
    const next = [...fullOrder];
    next.splice(from, 1);
    next.splice(to, 0, item);
    setSidebarOrder(next);
    localStorage.setItem('sidebarOrder', JSON.stringify(next));
    api.put('/api/settings', { sidebar_order: JSON.stringify(next) }).catch(() => {});
  }

  function onSettingsSaved(newSettings) {
    setAppSettings(prev => ({...prev, ...newSettings}));
  }
  function persistUiPrefs(next) {
    api.put('/api/settings', next).catch(() => {});
    setAppSettings(prev => ({...prev, ...next}));
  }
  function updateThemeMode(mode) {
    setThemeMode(mode);
    localStorage.setItem('uiTheme', mode);
    persistUiPrefs({ ui_theme: mode });
  }
  function updateHiddenPages(hp) {
    const next = hp.filter(id => !ALWAYS_VISIBLE_PAGES.includes(id));
    setHiddenPages(next);
    localStorage.setItem('hiddenPages', JSON.stringify(next));
    persistUiPrefs({ hidden_pages: JSON.stringify(next) });
  }
  function resetSidebarOrder() {
    setSidebarOrder(null);
    localStorage.removeItem('sidebarOrder');
    persistUiPrefs({ sidebar_order: '[]' });
  }

  const hasAlerts = alerts.filter(a => !a.acknowledged).length > 0;
  return (
    <SettingsContext.Provider value={{...appSettings, refresh}}>
      <div className="app" style={isAtlasMobileApp ? {paddingLeft:0, display:'flex', flexDirection:'column', position:'fixed', inset:0, height:'100%', overflow:'hidden'} : null}>
        {!isAtlasMobileApp && (
        <nav className="sidebar"
          onDragOver={handleSidebarDragOver}
          onDragLeave={handleSidebarDragLeave}
          onDrop={handleSidebarDrop}
        >
          <div className="sidebar-logo" title={dashboardTitle}>
            <img src="/static/img/atlas-control-logo.png" alt="Atlas Control"/>
          </div>
          {orderedPages.map((p, i) => (
            <React.Fragment key={p.id}>
              {i > 0 && p.group !== orderedPages[i-1].group && <div className="sidebar-divider"/>}
              <button
                className={`sidebar-btn ${page === p.id ? 'active' : ''} ${dragItem === p.id ? 'dragging' : ''} ${dragOver === p.id && dragItem !== p.id ? 'drag-over' : ''}`}
                onClick={() => setPage(p.id)}
                data-tip={p.label}
                data-page-id={p.id}
                draggable
                onDragStart={e => handleDragStart(e, p.id)}
                onDragEnd={handleDragEnd}
              >
                {p.icon}
                {p.id === 'comms' && hasAlerts && <span className="badge"/>}
              </button>
            </React.Fragment>
          ))}
        </nav>
        )}

        <div className="main-content" style={isAtlasMobileApp ? {marginLeft:0, width:'100%', maxWidth:'100%', padding:'0', flex:'1', minHeight:'0', display:'flex', flexDirection:'column', overflow:'hidden'} : null}>
          <header className="top-bar" style={isAtlasMobileApp ? {padding:'10px 12px', paddingTop: isAtlasMobileAndroid ? '10px' : 'calc(env(safe-area-inset-top, 0px) + 10px)', minHeight:'auto'} : null}>
            <h1>{dashboardTitle}</h1>
            <span className="hide-mobile" style={{fontSize:12,color:'var(--text-muted)',fontFamily:'var(--font-mono)'}}>{appSettings.serial_port || '/dev/ttyACM0'}</span>
            <div style={{marginLeft:'auto',display:'flex',gap:'12px',alignItems:'center'}}>
              <TopBarClock/>
              {device.battery_pct != null && (
                (() => {
                  const batteryBits = [`ATLAS ${device.battery_pct}%`];
                  const batteryStatusLabel = (() => {
                    const phase = String(device.battery_phase || '').toLowerCase();
                    const status = String(device.battery_status || '').toLowerCase();
                    if (phase === 'topping_off') return 'TOPPING OFF';
                    if (status) return status.toUpperCase();
                    if (phase) return phase.replaceAll('_', ' ').toUpperCase();
                    return null;
                  })();
                  if (device.battery_voltage != null) batteryBits.push(`${Number(device.battery_voltage).toFixed(2)}V`);
                  if (device.battery_current_ma != null) batteryBits.push(`${(Math.abs(Number(device.battery_current_ma)) / 1000).toFixed(2)}A`);
                  if (device.battery_power_w != null) batteryBits.push(`${Math.abs(Number(device.battery_power_w)).toFixed(1)}W`);
                  if (batteryStatusLabel) batteryBits.push(batteryStatusLabel);
                  const batteryTitleBits = [];
                  if (device.battery_pct != null) batteryTitleBits.push(`display ${device.battery_pct}%`);
                  if (device.battery_pct_raw != null) batteryTitleBits.push(`raw ${device.battery_pct_raw}%`);
                  if (device.battery_voltage != null) batteryTitleBits.push(`voltage ${Number(device.battery_voltage).toFixed(3)}V`);
                  if (device.battery_voltage_raw != null) batteryTitleBits.push(`raw voltage ${Number(device.battery_voltage_raw).toFixed(3)}V`);
                  if (device.battery_current_ma != null) batteryTitleBits.push(`current ${(Number(device.battery_current_ma) / 1000).toFixed(3)}A`);
                  if (device.battery_power_w != null) batteryTitleBits.push(`power ${Number(device.battery_power_w).toFixed(3)}W`);
                  if (device.battery_power_w_raw != null) batteryTitleBits.push(`raw power ${Number(device.battery_power_w_raw).toFixed(3)}W`);
                  if (device.battery_status) batteryTitleBits.push(`status ${device.battery_status}`);
                  if (device.battery_phase) batteryTitleBits.push(`phase ${device.battery_phase}`);
                  if (device.battery_is_full != null) batteryTitleBits.push(`full ${device.battery_is_full ? 'yes' : 'no'}`);
                  if (device.battery_soc_note) batteryTitleBits.push(`note ${device.battery_soc_note}`);
                  if (device.battery_soc_model) batteryTitleBits.push(`model ${device.battery_soc_model}`);
                  if (device.battery_source) batteryTitleBits.push(`source ${device.battery_source}`);
                  return (
                    <div
                      className={`connection-badge ${
                        device.battery_pct < 20 ? 'offline' : device.battery_pct < 50 ? 'dead-reckoning' : 'online'
                      }`}
                      title={`Atlas battery · ${batteryTitleBits.join(' · ')}`}
                    >
                      <span className="dot"/>
                      <span>{batteryBits.join(' · ')}</span>
                    </div>
                  );
                })()
              )}
              <div className={`connection-badge ${device.connected ? 'online' : 'offline'}`}
                   title={`Meshtastic: ${appSettings.serial_port || '/dev/ttyACM1'}`}>
                <span className="dot"/>
                <span className="hide-mobile">
                  {device.long_name ? `${device.long_name} · ` : ''}{device.connected ? 'CONNECTED' : 'DISCONNECTED'}
                </span>
              </div>
              {(() => {
                const fix = gpsStatus.fix;
                const isDR = fix && fix.fix_qual === 6;
                const badgeClass = !gpsStatus.connected ? 'offline' : isDR ? 'dead-reckoning' : fix ? 'online' : 'offline';
                const label = !gpsStatus.connected ? 'GPS OFF'
                  : isDR ? 'GPS DR'
                  : fix ? `GPS ${fix.sats_in_view != null ? fix.sats_in_view+'sat' : 'FIX'}`
                  : 'GPS NO FIX';
                return (
                  <div className={`connection-badge ${badgeClass}`}
                       title={`GPS: ${gpsStatus.port || '/dev/ttyACM0'}`}>
                    <span className="dot"/>
                    <span className="hide-mobile">{label}</span>
                  </div>
                );
              })()}
            </div>
          </header>

          {page === 'dashboard' && <DashboardPage stats={stats} nodes={nodes} messages={messages} alerts={alerts} setPage={setPage} device={device} gpsStatus={gpsStatus} trackerDevices={trackerDevices} isAtlasMobileApp={isAtlasMobileApp}/>}
          {page === 'mesh'  && <MeshSection nodes={nodes} device={device}/>}
          {page === 'map'   && <MapSection nodes={nodes} trackerDevices={trackerDevices} device={device} gpsStatus={gpsStatus} onRemoveTracker={id => api.del(`/api/tracker/devices/${id}`).then(() => setTrackerDevices(prev => prev.filter(d => d.id !== id)))}/>}
          {page === 'hiking' && <HikingSection nodes={nodes} device={device} gpsStatus={gpsStatus}/>}
          {page === 'comms' && <CommsSection messages={messages} alerts={alerts} setAlerts={setAlerts} nodes={nodes} device={device} gpsStatus={gpsStatus} refresh={refresh}/>}
          {page === 'tools' && <ToolsSection/>}
          {page === 'system' && <SystemSection
            onSettingsSaved={onSettingsSaved}
            themeMode={themeMode}
            onThemeModeChange={updateThemeMode}
            hiddenPages={hiddenPages}
            onHiddenPagesChange={updateHiddenPages}
            onResetSidebarOrder={resetSidebarOrder}
            defaultPages={DEFAULT_PAGES}
            nodes={nodes}
          />}
          {page === 'ai' && <AIPage/>}

          {isAtlasMobileApp && (
            <nav style={{
              display:'flex', flexDirection:'row', flexShrink:0,
              height:'80px',
              borderTop:'1px solid rgba(126,156,191,0.12)',
              background:'linear-gradient(180deg,rgba(14,23,37,0.9),rgba(10,17,28,0.98))',
              paddingBottom:'env(safe-area-inset-bottom,0)',
              overflowX:'auto', scrollbarWidth:'none',
            }}>
              {orderedPages.map(p => (
                <button
                  key={p.id}
                  className={`sidebar-btn ${page === p.id ? 'active' : ''}`}
                  style={{flex:1, borderRadius:0, height:'100%', margin:0, width:'auto', minWidth:44}}
                  onClick={() => setPage(p.id)}
                >
                  {p.icon}
                  {p.id === 'comms' && hasAlerts && <span className="badge"/>}
                </button>
              ))}
            </nav>
          )}
        </div>
      </div>
    </SettingsContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
