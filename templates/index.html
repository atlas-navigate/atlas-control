// Device Configuration Section (Heltec V4 / Meshtastic)
// ═══════════════════════════════════════════════
const DEVICE_ROLES = [
  [0,'CLIENT'],[1,'CLIENT_MUTE'],[2,'ROUTER'],[3,'ROUTER_CLIENT'],
  [4,'REPEATER'],[5,'TRACKER'],[6,'SENSOR'],[7,'TAK'],
  [8,'CLIENT_HIDDEN'],[9,'LOST_AND_FOUND'],
];
const LORA_REGIONS = [
  [0,'UNSET'],[1,'US'],[2,'EU_433'],[3,'EU_868'],[4,'CN'],[5,'JP'],
  [6,'ANZ'],[7,'KR'],[8,'TW'],[9,'RU'],[10,'IN'],[11,'NZ_865'],
  [12,'TH'],[13,'LORA_24'],[14,'UA_433'],[15,'UA_868'],
];
const MODEM_PRESETS = [
  [0,'LONG_FAST'],[1,'LONG_SLOW'],[2,'VERY_LONG_SLOW'],[3,'MEDIUM_SLOW'],
  [4,'MEDIUM_FAST'],[5,'SHORT_SLOW'],[6,'SHORT_FAST'],[7,'LONG_MODERATE'],
];
const REBROADCAST_MODES = [
  [0,'ALL'],[1,'ALL_SKIP_DECODING'],[2,'LOCAL_ONLY'],[3,'KNOWN_ONLY'],
];

// Stable style constants and helper components defined outside DeviceConfigSection
// to prevent React from unmounting/remounting inputs on every parent re-render.
const _DC_SL = {fontSize:11,fontWeight:700,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:10};
const _DC_FL = {fontSize:11,fontWeight:600,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:4};
const _DC_IS = {background:'var(--bg-input)',border:'1px solid var(--border)',color:'var(--text-primary)',borderRadius:'var(--radius)',padding:'6px 10px',fontSize:13,outline:'none',fontFamily:'inherit',width:'100%',boxSizing:'border-box'};

function DeviceConfigRow({label, hint, children}) {
  return (
    <div>
      <div style={_DC_FL}>{label}</div>
      {hint && <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:4,lineHeight:1.4}}>{hint}</div>}
      {children}
    </div>
  );
}

function DeviceConfigSaveBar({section, saving, saved, onSave}) {
  return (
    <div style={{display:'flex',alignItems:'center',gap:10,marginTop:14}}>
      <button className="btn btn-primary btn-sm" onClick={() => onSave(section)} disabled={saving[section]}>
        {saving[section] ? 'Writing…' : 'Write to Device'}
      </button>
      {saved[section] && <span style={{color:'var(--accent-green)',fontSize:12}}>✓ Applied</span>}
    </div>
  );
}

const DeviceConfigSection = React.memo(function DeviceConfigSection() {
  const [cfg, setCfg] = useState(null);
  const [owner, setOwner] = useState({ long_name: '', short_name: '' });
  const [saving, setSaving] = useState({});
  const [saved, setSaved] = useState({});
  const [error, setError] = useState(null);

  const wait = React.useCallback((ms) => new Promise(resolve => setTimeout(resolve, ms)), []);

  const reloadDeviceState = React.useCallback(async () => {
    let lastErr = null;
    for (let i = 0; i < 5; i++) {
      try {
        const [config, ownerInfo] = await Promise.all([
          api.get('/api/device/config'),
          api.get('/api/device/owner').catch(() => ({})),
        ]);
        if (config && !config.error) {
          setCfg(config);
          setError(null);
        } else if (config && config.error) {
          setError(config.error);
        }
        if (ownerInfo) setOwner(ownerInfo);
        return config;
      } catch (err) {
        lastErr = err;
        if (i < 4) await wait(1000);
      }
    }
    throw lastErr || new Error('Unable to load device configuration');
  }, [wait]);

  const waitForDeviceReconnect = React.useCallback(async () => {
    let lastErr = null;
    for (let i = 0; i < 20; i++) {
      try {
        const device = await api.get('/api/device');
        if (device?.connected) return device;
      } catch (err) {
        lastErr = err;
      }
      await wait(1000);
    }
    if (lastErr) throw lastErr;
    throw new Error('Device did not reconnect after applying settings');
  }, [wait]);

  useEffect(() => {
    reloadDeviceState().catch(err => setError(err.message || String(err)));
  }, [reloadDeviceState]);

  const cfgRef = React.useRef(cfg);
  useEffect(() => { cfgRef.current = cfg; }, [cfg]);

  const saveSection = React.useCallback(async (section) => {
    const current = cfgRef.current;
    if (!current || !current[section]) return;
    setError(null);
    setSaving(p => ({...p, [section]: true}));
    try {
      const res = await api.put(`/api/device/config/${section}`, current[section]);
      if (res?.ok === false) throw new Error(res.error || `Failed to save ${section}`);
      await waitForDeviceReconnect();
      await reloadDeviceState();
      setSaved(p => ({...p, [section]: true}));
      setTimeout(() => setSaved(p => ({...p, [section]: false})), 2500);
    } catch (err) {
      setError(err.message || String(err));
    } finally {
      setSaving(p => ({...p, [section]: false}));
    }
  }, [reloadDeviceState, waitForDeviceReconnect]);

  const set = React.useCallback((section, key, val) => {
    setCfg(p => ({ ...p, [section]: { ...p[section], [key]: val } }));
  }, []);

  const SL = _DC_SL;
  const IS = _DC_IS;
  const Row = DeviceConfigRow;
  const SaveBar = ({section}) => <DeviceConfigSaveBar section={section} saving={saving} saved={saved} onSave={saveSection}/>;

  if (!cfg) return (
    <div className="card" style={{marginBottom:16}}>
      <div style={SL}>Device Configuration</div>
      <div style={{color:'var(--text-muted)',fontSize:13}}>
        {error ? `Device not available: ${error}` : cfg === null ? 'Loading…' : 'Device not connected.'}
      </div>
    </div>
  );

  if (!cfg.connected) return (
    <div className="card" style={{marginBottom:16}}>
      <div style={SL}>Device Configuration</div>
      <div style={{color:'var(--text-muted)',fontSize:13}}>Device not connected — connect the Heltec V4 to configure.</div>
    </div>
  );

  return (
    <div className="card" style={{marginBottom:16}}>
      <div style={SL}>Device Configuration — Heltec V4</div>
      <div style={{fontSize:11,color:'var(--accent-amber)',marginBottom:14,background:'var(--accent-amber-dim)',padding:'6px 10px',borderRadius:'var(--radius)',border:'1px solid rgba(245,158,11,0.3)'}}>
        ⚠ Changes are written directly to the radio. The device will reboot to apply some settings.
      </div>

      {/* Owner info */}
      <div style={{marginBottom:20,paddingBottom:16,borderBottom:'1px solid var(--border)'}}>
        <div style={{...SL,marginBottom:8}}>Node Identity</div>
        <div className="device-identity-grid">
          <Row label="Long Name" hint="Up to 39 characters — visible to other mesh nodes">
            <input style={IS} value={owner.long_name || ''} maxLength={39}
              onChange={e => setOwner(p => ({...p, long_name: e.target.value}))}
              placeholder="Atlas Control"/>
          </Row>
          <Row label="Short Name" hint="Up to 4 characters — shown on maps and in node lists">

// Favorites (persisted to server DB)
// ═══════════════════════════════════════════════
function useFavorites() {
  const [favorites, setFavorites] = useState([]);
  useEffect(() => {
    api.get('/api/nav/favorites').then(data => {
      if (Array.isArray(data)) setFavorites(data);
    });
  }, []);
  async function saveFav(name, lat, lon) {
    const fav = await api.post('/api/nav/favorites', { name, lat, lon });
    if (fav && !fav.error) setFavorites(prev => [...prev, fav].sort((a,b) => a.name.localeCompare(b.name)));
    return fav;
  }
  async function renameFav(id, name) {
    const res = await api.patch(`/api/nav/favorites/${id}`, { name });
    if (res && !res.error) setFavorites(prev => prev.map(f => f.id === id ? { ...f, name } : f).sort((a,b) => a.name.localeCompare(b.name)));
    return res;
  }
  function removeFav(id) {
    api.del(`/api/nav/favorites/${id}`);
    setFavorites(prev => prev.filter(f => f.id !== id));
  }
  return { favorites, saveFav, renameFav, removeFav };
}

function fmtNavDist(m) {
  if (m == null) return '—';
  const ft = m * 3.28084;
  if (ft < 1000) return `${Math.round(ft)} ft`;
  const mi = ft / 5280;
  return mi < 10 ? `${mi.toFixed(1)} mi` : `${Math.round(mi)} mi`;
}
function fmtNavDuration(s) {
  if (s == null) return '—';
  const m = Math.floor(s / 60), h = Math.floor(m / 60);
  return h > 0 ? `${h}h ${m % 60}m` : `${m} min`;
}
function isAtlasMobileClient() {
  const searchParams = new URLSearchParams(window.location.search);
  return (
    searchParams.get('embedded') === '1' ||
    /AtlasMobile(Android|IOS)\//.test(navigator.userAgent)
  );
}
function navStepIcon(type, isWalking, size = 16) {
  const s = { width:size, height:size, viewBox:'0 0 24 24', fill:'none', stroke:'currentColor',
              strokeWidth:'2', strokeLinecap:'round', strokeLinejoin:'round' };
  switch (type) {
    case 'depart':
      return isWalking
        ? <svg {...s}><circle cx="12" cy="5" r="1" fill="currentColor" stroke="none"/><path d="M9 19l2-6 3 4 1-3"/><path d="M14 9l-2 1-1 3"/></svg>
        : <svg {...s}><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>;
    case 'arrive':
      return <svg {...s}><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>;
    case 'roundabout': case 'rotary':
      return <svg {...s}><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>;
    case 'merge':
      return <svg {...s}><path d="M8 3v9a4 4 0 004 4h8"/><polyline points="16 12 20 16 16 20"/></svg>;
    case 'on ramp':
      return <svg {...s}><line x1="5" y1="19" x2="19" y2="5"/><polyline points="13 5 19 5 19 11"/></svg>;
    case 'off ramp':
      return <svg {...s}><line x1="5" y1="5" x2="19" y2="19"/><polyline points="13 19 19 19 19 13"/></svg>;
    case 'fork':
      return <svg {...s}><line x1="6" y1="3" x2="6" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 01-9 9"/></svg>;
    default:
      return <svg {...s}><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>;
  }
}
function navStepLabel(maneuver, mode) {
  const isHiking = mode === 'hiking';
  const verb = isHiking ? 'Bear' : 'Turn';
  const modMap = {
    left:'${verb} left', 'slight left':'Slight left', 'sharp left':'Sharp left',
    right:'${verb} right', 'slight right':'Slight right', 'sharp right':'Sharp right',
    straight:'Continue straight', uturn:'U-turn',
  };
  // fix template literal issue with verb
  modMap.left  = `${verb} left`;
  modMap.right = `${verb} right`;
  if (maneuver.type === 'depart')
    return isHiking ? 'Start hiking' : 'Depart';
  if (maneuver.type === 'arrive')  return 'Arrive at destination';
  if (maneuver.type === 'continue' || maneuver.type === 'new name') return 'Continue straight';
  if (maneuver.type === 'use lane') return 'Keep ' + (maneuver.modifier || 'straight');
  return modMap[maneuver.modifier] ||
    (maneuver.type.charAt(0).toUpperCase() + maneuver.type.slice(1));
}

function NavigatePage({
  nodes,
  device,
  gpsStatus,
  initialDest,
  onDestConsumed,
  defaultMode = 'road',
  availableModes = NAV_MODES,
  forceTrailOverlay = false,
  autoShowTrailOverlay = true,
  searchPlaceholder = 'Search address, place, or lat, lon… (or tap map)',
}) {
  const containerRef    = useRef(null);
  const mapRef          = useRef(null);
  const userMarkerRef   = useRef(null);
  const destMarkerRef   = useRef(null);
  const followRef       = useRef(false);
  const routedRef       = useRef(false);
  const offRouteSince   = useRef(null);
  const reroutingRef    = useRef(false);
  const lastCheckRef    = useRef(0);
  const pendingFlyRef   = useRef(null);   // destination to fly to once map is loaded
  const autoRouteRef    = useRef(false);  // set when Navigate Here triggers destination
  const pendingFitRef   = useRef(false);  // set by getRoute; sync effect fits bounds

  const [query,         setQuery]         = useState('');
  const [results,       setResults]       = useState([]);
  const [searching,     setSearching]     = useState(false);
  const [destination,   setDestination]   = useState(null);
  const [mode,          setMode]          = useState(defaultMode);
  const [route,         setRoute]         = useState(null);
  const [routing,       setRouting]       = useState(false);
  const [rerouting,     setRerouting]     = useState(false);
  const [currentStep,   setCurrentStep]   = useState(0);
  const [followMode,    setFollowMode]    = useState(false);
  const [error,         setError]         = useState(null);
  const [showFavorites, setShowFavorites] = useState(false);
  const [savingFav,     setSavingFav]     = useState(null);   // { lat, lon } for new pin
  const [renamingFav,   setRenamingFav]   = useState(null);   // { id, name } for rename
  const [favNameInput,  setFavNameInput]  = useState('');
  const [mapLoaded,     setMapLoaded]     = useState(false);
  const [showTopo,      setShowTopo]      = useState(false);
  const [showHikeTrails,setShowHikeTrails]= useState(false);
  const [directionsOpen,setDirectionsOpen]= useState(() => !isAtlasMobileClient());
  const { favorites, saveFav, renameFav, removeFav } = useFavorites();

  const myNodeId = device?.my_node_id ?? null;
  const myNode   = myNodeId ? nodes.find(n => n.node_id === myNodeId) : null;
  const gpsFix   = gpsStatus?.fix;
  const posLat   = gpsFix?.latitude  ?? myNode?.latitude  ?? null;
  const posLon   = gpsFix?.longitude ?? myNode?.longitude ?? null;

  // ── Init map ─────────────────────────────────────────────────────
  useEffect(() => {
    if (!containerRef.current || mapRef.current) return;
    const center = (posLat != null && posLon != null) ? [posLon, posLat] : [-98.35, 39.5];
    const zoom   = (posLat != null && posLon != null) ? 14 : 4;
    const m = makeAtlasMap(containerRef.current, { center, zoom });
    if (!m) return;
    m.on('error', e => console.error('[atlas-map] navigate error:', e.error));
    m.resize();
    const resizeTimer = setTimeout(() => m.resize(), 200);
    m.on('load', () => {
      // Route source — two layers: solid and dashed (straight-line fallback)
      m.addSource('route', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
      m.addLayer({ id: 'route-casing', type: 'line', source: 'route',
        paint: { 'line-color': '#000', 'line-width': 9, 'line-opacity': 0.4 } });
      m.addLayer({ id: 'route-solid', type: 'line', source: 'route',
        filter: ['!', ['get', 'dashed']],
        paint: { 'line-color': ['get', 'color'], 'line-width': 5, 'line-opacity': 0.95 } });
      m.addLayer({ id: 'route-dashed', type: 'line', source: 'route',
        filter: ['get', 'dashed'],
        paint: { 'line-color': ['get', 'color'], 'line-width': 5,
                 'line-opacity': 0.95, 'line-dasharray': [8, 6] } });
      setMapLoaded(true);
    });
    m.on('click', e => {
      const { lng, lat } = e.lngLat;
      setDestination({ lat, lon: lng, name: `${lat.toFixed(5)}, ${lng.toFixed(5)}` });
    });
    m.on('dragstart', () => { followRef.current = false; setFollowMode(false); });
    mapRef.current = m;
    return () => { clearTimeout(resizeTimer); if (mapRef.current) { mapRef.current.remove(); mapRef.current = null; } };
  }, []); // eslint-disable-line

  // ── Apply destination passed in from map popup "Navigate Here" ───
  useEffect(() => {
    if (!initialDest) return;
    autoRouteRef.current = true;
    setDestination(initialDest);
    setQuery(initialDest.name || '');
    const m = mapRef.current;
    if (m && m.loaded()) {
      m.flyTo({ center: [initialDest.lon, initialDest.lat], zoom: 14 });
    } else {
      // Map not loaded yet (tab just switched) — store for when load fires
      pendingFlyRef.current = initialDest;
    }
    if (onDestConsumed) onDestConsumed();
  }, [initialDest]); // eslint-disable-line

  // ── Fly to pending popup destination once map is ready ───────────
  useEffect(() => {
    if (!mapLoaded) return;
    const dest = pendingFlyRef.current;
    if (!dest) return;
    pendingFlyRef.current = null;
    const m = mapRef.current;
    if (m) m.flyTo({ center: [dest.lon, dest.lat], zoom: 14 });
  }, [mapLoaded]);

  // ── Auto-route when Navigate Here sets destination ───────────────
  // Fires once destination + mapLoaded are both ready after a Navigate Here action.
  useEffect(() => {
    if (!autoRouteRef.current) return;
    if (!destination || !mapLoaded) return;
    if (posLat == null || posLon == null) return;
    autoRouteRef.current = false;
    getRoute();
  }, [destination, mapLoaded, posLat, posLon]); // eslint-disable-line

  // ── User position marker + follow ────────────────────────────────
  useEffect(() => {
    const m = mapRef.current;
    if (!m || posLat == null || posLon == null) return;
    if (userMarkerRef.current) {
      userMarkerRef.current.setLngLat([posLon, posLat]);
    } else {
      const el = document.createElement('div');
      el.style.cssText = 'width:16px;height:16px;background:#00e5a0;border:3px solid #fff;border-radius:50%;box-shadow:0 0 0 2px #00e5a0,0 0 12px #00e5a066;';
      userMarkerRef.current = new maplibregl.Marker({ element: el })
        .setLngLat([posLon, posLat])
        .setPopup(new maplibregl.Popup({ offset: 12 }).setHTML('<b>Your Location</b>'))
        .addTo(m);
    }
    if (followRef.current) m.panTo([posLon, posLat]);
  }, [posLat, posLon]);

  // ── Destination marker ───────────────────────────────────────────
  useEffect(() => {
    const m = mapRef.current;
    if (!m) return;
    if (!destination) {
      if (destMarkerRef.current) { destMarkerRef.current.remove(); destMarkerRef.current = null; }
      return;
    }
    if (destMarkerRef.current) {
      destMarkerRef.current.setLngLat([destination.lon, destination.lat]);
      destMarkerRef.current.getPopup().setHTML(`<b>${escHtml(destination.name || 'Destination')}</b>`);
    } else {
      const el = document.createElement('div');
      el.style.cssText = 'width:0;height:0;border-left:9px solid transparent;border-right:9px solid transparent;border-top:22px solid #ef4444;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5));';
      destMarkerRef.current = new maplibregl.Marker({ element: el, anchor: 'bottom' })
        .setLngLat([destination.lon, destination.lat])
        .setPopup(new maplibregl.Popup({ offset: 12 }).setHTML(`<b>${escHtml(destination.name || 'Destination')}</b>`))
        .addTo(m);
    }
  }, [destination]);

  // ── Geocode ──────────────────────────────────────────────────────
  async function searchAddress() {
    if (!query.trim()) return;
    const rawQuery = query.trim();
    const coordMatch = query.trim().match(/^([+-]?\d+\.?\d*)\s*[,\s]\s*([+-]?\d+\.?\d*)$/);
    if (coordMatch) {
      const lat = parseFloat(coordMatch[1]), lon = parseFloat(coordMatch[2]);
      if (lat >= -90 && lat <= 90 && lon >= -180 && lon <= 180) {
        const name = `${lat.toFixed(6)}, ${lon.toFixed(6)}`;
        setDestination({ lat, lon, name }); setResults([]); setQuery(name); setError(null);
        const m = mapRef.current;
        if (m) {
          if (posLat != null && posLon != null)
            m.fitBounds([[Math.min(posLon,lon), Math.min(posLat,lat)],
                         [Math.max(posLon,lon), Math.max(posLat,lat)]], { padding: 60 });
          else m.setCenter([lon, lat]);
        }
        return;
      }
    }
    setSearching(true); setError(null); setResults([]);
    try {
      let url = '/api/nav/geocode?q=' + encodeURIComponent(rawQuery);
      if (posLat != null && posLon != null) url += `&near_lat=${posLat}&near_lon=${posLon}`;
      const data = await api.get(url);
      let list = Array.isArray(data) ? data : [];
      if (posLat != null && posLon != null && list.length > 1)
        list = list.slice().sort((a, b) =>
          (haversineKm(posLat, posLon, parseFloat(a.lat), parseFloat(a.lon)) || 99999) -
          (haversineKm(posLat, posLon, parseFloat(b.lat), parseFloat(b.lon)) || 99999));
      setResults(list);
      if (!list.length) {
        setError(
          isHiking
            ? 'No park or trail matches in the local index. Try a National Park name, a trail name, coordinates, or tap the map.'
            : 'No results. Enter coordinates (lat, lon) or tap the map to set a destination.'
        );
      }
    } catch (err) {
      const fallback = isHiking
        ? 'Trail search is unavailable right now. Check the local trail index or enter coordinates.'
        : 'Search unavailable offline. Enter coordinates or tap the map.';
      setError(err?.message || fallback);
    } finally { setSearching(false); }
  }

  function selectResult(r) {
    const lat = parseFloat(r.lat), lon = parseFloat(r.lon);
    setDestination({ lat, lon, name: r.display_name });
    setResults([]); setQuery(r.display_name);
    const m = mapRef.current;
    if (m) {
      if (posLat != null && posLon != null)
        m.fitBounds([[Math.min(posLon,lon), Math.min(posLat,lat)],
                     [Math.max(posLon,lon), Math.max(posLat,lat)]], { padding: 60 });
      else m.setCenter([lon, lat]);
    }
  }

  // ── Favorites helpers ────────────────────────────────────────────
  function openSaveFav(lat, lon, suggestion) {
    setFavNameInput(suggestion.slice(0, 60)); setSavingFav({ lat, lon });
  }
  function confirmSaveFav() {
    const name = favNameInput.trim() || 'Unnamed';
    if (renamingFav) {
      renameFav(renamingFav.id, name);
      setRenamingFav(null);
    } else if (savingFav) {
      saveFav(name, savingFav.lat, savingFav.lon);
      setSavingFav(null);
    }
  }
  function openRenameFav(fav) {
    setFavNameInput(fav.name);
    setRenamingFav({ id: fav.id, name: fav.name });
  }
  function goToFavorite(fav) {
    setDestination({ lat: fav.lat, lon: fav.lon, name: fav.name });
    setQuery(fav.name);
    const m = mapRef.current;
    if (m) {
      if (posLat != null && posLon != null)
        m.fitBounds([[Math.min(posLon,fav.lon), Math.min(posLat,fav.lat)],
                     [Math.max(posLon,fav.lon), Math.max(posLat,fav.lat)]], { padding: 50 });
      else m.setCenter([fav.lon, fav.lat]);
    }
  }

  // ── Route request ────────────────────────────────────────────────
  async function getRoute() {
    if (!destination || posLat == null || posLon == null) {
      setError('Need a GPS fix and a destination.'); return;
    }
    setRouting(true); setError(null);
    try {
      if (mode === 'hiking') {
        api.post('/api/nav/routing/prewarm', { lat: destination.lat, lon: destination.lon, profile: 'hiking' }).catch(() => {});
      }
      const data = await api.get(
        `/api/nav/route?from_lat=${posLat}&from_lon=${posLon}` +
        `&to_lat=${destination.lat}&to_lon=${destination.lon}&mode=${mode}`
      );
      if (data.error || !data.routes?.length) {
        let msg = data.error || 'No route found.';
        if (data.straight_line_m != null) msg += ` Straight-line: ${fmtNavDist(data.straight_line_m)}.`;
        setError(msg); return;
      }
      setRoute(data); setCurrentStep(0);
      routedRef.current = true; followRef.current = true; setFollowMode(true);
      offRouteSince.current = null; reroutingRef.current = false; setRerouting(false);
      // Signal the sync effect to fit bounds on the next render.
      // We don't render here directly because mapLoaded in this closure may be
      // a stale value from an earlier render. The sync effect uses mapRef.current
      // and m.loaded() which always reflect real map state.
      pendingFitRef.current = true;
    } catch (e) { setError(e?.message || 'Routing failed — check connectivity.'); }
    finally { setRouting(false); }
  }

  function clearRoute() {
    setDestination(null); setRoute(null); setQuery(''); setResults([]);
    setError(null); setCurrentStep(0);
    routedRef.current = false; followRef.current = false; setFollowMode(false);
    offRouteSince.current = null; reroutingRef.current = false; setRerouting(false);
    const m = mapRef.current;
    if (m && mapLoaded) {
      const src = m.getSource('route');
      if (src) src.setData({ type: 'FeatureCollection', features: [] });
    }
    if (destMarkerRef.current) { destMarkerRef.current.remove(); destMarkerRef.current = null; }
  }

  useEffect(() => {
    setMode(defaultMode);
  }, [defaultMode]);

  // Re-route when mode changes if already routed
  useEffect(() => {
    if (routedRef.current && destination && posLat != null && posLon != null) getRoute();
  }, [mode]); // eslint-disable-line

  // Auto-advance step when within 30 m of maneuver point
  useEffect(() => {
    if (!route || posLat == null || posLon == null) return;
    const steps = route.routes[0]?.legs?.flatMap(leg => leg.steps || []);
    if (!steps || currentStep >= steps.length - 1) return;
    const [sLon, sLat] = steps[currentStep].maneuver.location;
    const dist = haversineKm(posLat, posLon, sLat, sLon);
    if (dist !== null && dist < 0.03)
      setCurrentStep(p => Math.min(p + 1, steps.length - 1));
  }, [posLat, posLon, route, currentStep]);

  // Keep map route source in sync with route state — single authoritative render path.
  // mapLoaded in the dep array guarantees the source exists before we try setData.
  useEffect(() => {
    const m = mapRef.current;
    if (!m) return;
    const src = m.getSource('route');
    if (!src) return;
    if (!route?.routes?.[0]) {
      src.setData({ type: 'FeatureCollection', features: [] });
      return;
    }
    const geom       = route.routes[0].geometry;
    const isStraight = route.routes[0]._source === 'straight_line';
    const modeColor  = { road:'#3b82f6', hiking:'#f59e0b' }[mode] || '#3b82f6';
    src.setData({
      type: 'FeatureCollection',
      features: [{
        type: 'Feature', geometry: geom,
        properties: { color: isStraight ? '#ef4444' : modeColor, dashed: isStraight },
      }],
    });
    // Fit the viewport to the full route when getRoute signals a new route.
    if (pendingFitRef.current) {
      pendingFitRef.current = false;
      const coords = geom.coordinates;
      if (coords && coords.length > 1) {
        const bounds = coords.reduce((b, c) => b.extend(c),
          new maplibregl.LngLatBounds(coords[0], coords[0]));
        m.fitBounds(bounds, { padding: 60, maxZoom: 16 });
      }
    }
  }, [route, mapLoaded, mode]);

  // Off-route detection → auto reroute (throttled to 2 s)
  useEffect(() => {
    if (!route || posLat == null || posLon == null) return;
    if (routing || reroutingRef.current) return;
    const geom = route.routes[0]?.geometry;
    if (!geom || route.routes[0]?._source === 'straight_line') return;
    const now = Date.now();
    if (now - lastCheckRef.current < 2000) return;
    lastCheckRef.current = now;
    const thresh = { road:[0.05,5000], hiking:[0.035,8000] };
    const [maxDist, confirmMs] = thresh[mode] || [0.04, 6000];
    const d = distToRouteKm(posLat, posLon, geom);
    if (d === null) return;
    if (d > maxDist) {
      if (!offRouteSince.current) offRouteSince.current = now;
      else if (now - offRouteSince.current >= confirmMs) {
        offRouteSince.current = null; reroutingRef.current = true;
        setRerouting(true); getRoute();
      }
    } else offRouteSince.current = null;
  }, [posLat, posLon, route]); // eslint-disable-line

  useEffect(() => {
    const m = mapRef.current;
    if (!m || !mapLoaded) return;
    try { m.setLayoutProperty('atlas-topo', 'visibility', showTopo ? 'visible' : 'none'); } catch (_) {}
  }, [showTopo, mapLoaded]);

  // Auto-enable hiking trail overlay when switching to hiking mode
  useEffect(() => {
    setShowHikeTrails(forceTrailOverlay || (autoShowTrailOverlay && mode === 'hiking'));
  }, [mode, forceTrailOverlay, autoShowTrailOverlay]);

  // Toggle AllTrails-style trail overlay layers
  useEffect(() => {
    const m = mapRef.current;
    if (!m || !mapLoaded) return;
    const vis = showHikeTrails ? 'visible' : 'none';
    try { m.setLayoutProperty('atlas-hike-casing', 'visibility', vis); } catch (_) {}
    try { m.setLayoutProperty('atlas-hike-line',   'visibility', vis); } catch (_) {}
    try { m.setLayoutProperty('atlas-hike-track',  'visibility', vis); } catch (_) {}
    try { m.setLayoutProperty('atlas-hike-label',  'visibility', vis); } catch (_) {}
  }, [showHikeTrails, mapLoaded]);

  const routeData = useMemo(() => route?.routes[0], [route]);
  const steps     = useMemo(() => routeData?.legs?.flatMap(leg => leg.steps || []) || [], [routeData]);
  const isHiking  = mode === 'hiking';
  const speedNote = isHiking ? '@ ~2–3 mph on trail' : null;

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:12, flex:1, minHeight:0, overflow:'visible', padding:16 }}>

      {/* Search bar */}
      <div className="card" style={{ padding:'10px 14px', flexShrink:0, position:'relative', zIndex:20, overflow:'visible' }}>
        <div style={{ display:'flex', gap:8, alignItems:'center', flexWrap:'wrap', position:'relative', zIndex:20, overflow:'visible' }}>
          <div style={{ flex:1, minWidth:200, position:'relative' }}>
            <input
              value={query}
              onChange={e => setQuery(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && searchAddress()}
              onBlur={() => setTimeout(() => setResults([]), 150)}
              placeholder={searchPlaceholder}
              style={{ width:'100%', padding:'8px 12px', background:'var(--bg-input)',
                border:'1px solid var(--border)', borderRadius:'var(--radius)',
                color:'var(--text-primary)', fontSize:14, outline:'none' }}
            />
            {results.length > 0 && (
              <div style={{ position:'absolute', top:'calc(100% + 4px)', left:0, right:0,
                background:'var(--bg-card)', border:'1px solid var(--border-bright)',
                borderRadius:'var(--radius)', zIndex:2500, maxHeight:220, overflowY:'auto',
                boxShadow:'var(--shadow)' }}>
                {results.slice(0, 12).map((r, i) => (
                  <div key={i} onClick={() => selectResult(r)}
                    style={{ padding:'9px 12px', cursor:'pointer', fontSize:13,
                      borderBottom:'1px solid var(--border)', color:'var(--text-primary)', lineHeight:1.3 }}
                    onMouseEnter={e => e.currentTarget.style.background='var(--bg-card-hover)'}
                    onMouseLeave={e => e.currentTarget.style.background=''}>
                    <div>{r.display_name}</div>
                    {r.subtitle && <div style={{ fontSize:11, color:'var(--text-secondary)', marginTop:2 }}>{r.subtitle}</div>}
                    {r.type && <div style={{ fontSize:11, color:'var(--text-muted)', marginTop:2 }}>{r.type}</div>}
                  </div>
                ))}
              </div>
            )}
          </div>
          <button className="btn btn-primary btn-sm" onClick={searchAddress} disabled={searching}>
            {searching ? '…' : 'Search'}
          </button>
          {/* Mode buttons */}
          {availableModes.map(m => (
            <button key={m.value} onClick={() => setMode(m.value)} title={m.label}
              style={{ display:'flex', alignItems:'center', gap:5, padding:'6px 10px',
                borderRadius:'var(--radius)', fontSize:12, fontWeight:600, cursor:'pointer',
                background: mode === m.value ? m.color + '22' : 'var(--bg-input)',
                border: `1px solid ${mode === m.value ? m.color : 'var(--border)'}`,
                color: mode === m.value ? m.color : 'var(--text-secondary)',
                transition:'all 0.15s' }}>
              {m.icon}{m.label}
            </button>
          ))}
          {isHiking && (
            <button onClick={() => setShowHikeTrails(t => !t)} title="Toggle trail overlay"
              disabled={forceTrailOverlay}
              style={{ display:'flex', alignItems:'center', gap:5, padding:'6px 10px',
                borderRadius:'var(--radius)', fontSize:12, fontWeight:600, cursor:'pointer',
                background: showHikeTrails ? '#16a34a33' : 'var(--bg-input)',
                border: `1px solid ${showHikeTrails ? '#22c55e' : 'var(--border)'}`,
                color: showHikeTrails ? '#22c55e' : 'var(--text-secondary)',
                transition:'all 0.15s' }}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 17l4-8 3 3 3-5 4 7"/><path d="M3 21h18"/></svg>
              Trails
            </button>
          )}
          <button className="btn btn-primary btn-sm" onClick={getRoute}
            disabled={routing || rerouting || !destination || posLat == null}>
            {rerouting ? 'Rerouting…' : routing ? 'Routing…' : 'Go'}
          </button>
          {(destination || route) && (
            <button className="btn btn-sm" onClick={clearRoute}>Clear</button>
          )}
          {destination && (
            <button className="btn btn-sm" onClick={() => {
              const sug = (destination.name || '').slice(0, 60);
              openSaveFav(destination.lat, destination.lon, sug);
            }} style={{ color:'var(--accent-amber)', display:'flex', alignItems:'center', gap:5 }}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
              Save
            </button>
          )}
          <button className="btn btn-sm" onClick={() => setShowFavorites(f => !f)}
            style={{ background: showFavorites ? 'var(--accent-amber-dim)' : '',
              borderColor: showFavorites ? 'var(--accent-amber)' : '',
              color: showFavorites ? 'var(--accent-amber)' : '',
              display:'flex', alignItems:'center', gap:5 }}>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            {favorites.length > 0 ? `Favorites (${favorites.length})` : 'Favorites'}
          </button>
        </div>
        {error    && <div style={{ marginTop:8, color:'var(--accent-red)', fontSize:13 }}>{error}</div>}
        {rerouting && (
          <div style={{ marginTop:6, color:'var(--accent-amber)', fontSize:12, display:'flex', alignItems:'center', gap:6 }}>
            <span style={{ display:'inline-block', width:8, height:8, borderRadius:'50%',
              background:'var(--accent-amber)', animation:'pulse 1s infinite' }}/>
            Off route — calculating new route…
          </div>
        )}
        {!posLat && (
          <div style={{ marginTop:6, color:'var(--accent-amber)', fontSize:12 }}>
            No GPS fix — tap the map to set a destination anyway.
          </div>
        )}
      </div>

      {/* Favorites panel */}
      {showFavorites && (
        <div className="card" style={{ padding:'10px 14px', flexShrink:0 }}>
          <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:8 }}>
            <div style={{ fontSize:12, fontWeight:600, textTransform:'uppercase',
              letterSpacing:'0.06em', color:'var(--text-muted)', flex:1 }}>Saved Favorites</div>
            <button className="btn btn-sm" disabled={posLat == null}
              onClick={() => openSaveFav(posLat, posLon,
                `Pin ${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`)
              }
              style={{ fontSize:12, display:'flex', alignItems:'center', gap:5 }}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="2.5" fill="currentColor" stroke="none"/></svg>
              Drop Pin Here
            </button>
          </div>
          {favorites.length === 0 ? (
            <div style={{ fontSize:13, color:'var(--text-muted)' }}>
              No favorites yet — search for a place and tap Save, or tap Drop Pin Here.
            </div>
          ) : (
            <div style={{ display:'flex', flexDirection:'column', gap:4, maxHeight:180, overflowY:'auto' }}>
              {favorites.map(fav => {
                const dKm  = (posLat != null && posLon != null) ? haversineKm(posLat, posLon, fav.lat, fav.lon) : null;
                return (
                  <div key={fav.id} style={{ display:'flex', alignItems:'center', gap:8,
                    padding:'7px 10px', background:'var(--bg-input)',
                    borderRadius:'var(--radius)', border:'1px solid var(--border)' }}>
                    <span style={{ color:'var(--accent-amber)', flexShrink:0 }}>
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                    </span>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontSize:13, fontWeight:500, color:'var(--text-primary)',
                        overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{fav.name}</div>
                      {dKm != null && (
                        <div style={{ fontSize:11, color:'var(--text-muted)', fontFamily:'var(--font-mono)' }}>
                          {fmtNavDist(dKm * 1000)} away
                        </div>
                      )}
                    </div>
                    <button className="btn btn-primary btn-sm"
                      style={{ fontSize:11, padding:'3px 10px' }}
                      onClick={() => goToFavorite(fav)}>Go</button>
                    <button onClick={() => openRenameFav(fav)}
                      title="Rename"
                      style={{ background:'none', border:'none', cursor:'pointer',
                        color:'var(--text-muted)', padding:'0 2px', lineHeight:1, display:'flex', alignItems:'center' }}>
                      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    </button>
                    <button onClick={() => removeFav(fav.id)}
                      title="Delete"
                      style={{ background:'none', border:'none', cursor:'pointer',
                        color:'var(--text-muted)', fontSize:18, padding:'0 2px', lineHeight:1 }}>×</button>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {/* Map + directions */}
      <div className="nav-map-directions" style={{ flex:1, display:'flex', gap:12, minHeight:0, position:'relative', zIndex:1 }}>
        {/* Map */}
        <div style={{ flex:2, minWidth:0, position:'relative',
          borderRadius:'var(--radius-lg)', border:'1px solid var(--border)', overflow:'hidden' }}>
          <div ref={containerRef} style={{ position:'absolute', top:0, left:0, right:0, bottom:0 }}/>
          {/* Topo toggle */}
          <button onClick={() => setShowTopo(v => !v)}
            title="Toggle topo overlay"
            style={{ position:'absolute', top:12, right:12, zIndex:1000,
              padding:'6px 10px', borderRadius:16, cursor:'pointer', fontSize:12, fontWeight:600,
              background: showTopo ? 'rgba(167,139,250,0.85)' : 'var(--bg-card)',
              color: showTopo ? '#fff' : 'var(--text-muted)',
              border: showTopo ? 'none' : '1px solid var(--border)',
              boxShadow:'var(--shadow)' }}>
            Topo
          </button>
          {/* Follow / re-center button */}
          {routedRef.current && (
            <button onClick={() => {
                followRef.current = true; setFollowMode(true);
                if (mapRef.current && posLat != null && posLon != null)
                  mapRef.current.panTo([posLon, posLat]);
              }}
              style={{ position:'absolute', bottom:16, right:16, zIndex:1000,
                padding:'8px 14px', borderRadius:20, cursor:'pointer',
                background: followMode ? 'var(--accent-green)' : 'var(--bg-card)',
                color: followMode ? 'var(--bg-primary)' : 'var(--text-primary)',
                border: followMode ? 'none' : '1px solid var(--border)',
                fontFamily:'var(--font-sans)', fontSize:13, fontWeight:600,
                boxShadow:'var(--shadow)', display:'flex', alignItems:'center', gap:6 }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
                <circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/>
              </svg>
              {followMode ? 'Following' : 'Re-center'}
            </button>
          )}
        </div>

        {/* Directions panel */}
        {routeData && (
          <div className="nav-directions-wrapper">
            {/* Collapse toggle (visible on mobile via CSS) */}
            <div className={`nav-directions-toggle ${directionsOpen ? 'open' : ''}`}
              onClick={() => setDirectionsOpen(o => !o)}>
              <span className="nav-directions-toggle-label">Directions</span>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
            <div className={`nav-directions-panel ${directionsOpen ? '' : 'closed'}`}>
            {/* Summary */}
            <div className="card" style={{ padding:'12px 14px', flexShrink:0, borderRadius:'0 0 0 0' }}>
              <div style={{ fontSize:12, fontWeight:600, textTransform:'uppercase',
                letterSpacing:'0.06em', color:'var(--text-muted)', marginBottom:8 }}>Route Summary</div>
              {routeData._source === 'straight_line' && (
                <div style={{ fontSize:11, color:'var(--accent-amber)',
                  background:'rgba(245,158,11,0.1)', border:'1px solid rgba(245,158,11,0.3)',
                  borderRadius:4, padding:'4px 8px', marginBottom:8 }}>
                  Straight-line estimate — no OSRM data for this area.
                  Run: <code>bash setup_osrm_all.sh [state]</code>
                </div>
              )}
              <div style={{ display:'flex', gap:20 }}>
                <div>
                  <div style={{ fontSize:11, color:'var(--text-muted)' }}>DISTANCE</div>
                  <div style={{ fontFamily:'var(--font-mono)', fontSize:18, fontWeight:700, color:'var(--accent-blue)' }}>
                    {fmtNavDist(routeData.distance)}
                  </div>
                </div>
                <div>
                  <div style={{ fontSize:11, color:'var(--text-muted)' }}>ETA</div>
                  <div style={{ fontFamily:'var(--font-mono)', fontSize:18, fontWeight:700, color:'var(--accent-green)' }}>
                    {fmtNavDuration(routeData.duration)}
                  </div>
                  {speedNote && <div style={{ fontSize:10, color:'var(--text-muted)', marginTop:2 }}>{speedNote}</div>}
                </div>
              </div>
            </div>

            {/* Current maneuver */}
            {steps[currentStep] && (
              <div className="card" style={{ padding:'12px 14px', flexShrink:0,
                background:'var(--accent-blue-dim)', borderColor:'rgba(59,130,246,0.3)' }}>
                <div style={{ fontSize:11, fontWeight:600, textTransform:'uppercase',
                  letterSpacing:'0.06em', color:'var(--accent-blue)', marginBottom:6 }}>Next Maneuver</div>
                <div style={{ display:'flex', gap:10, alignItems:'center' }}>
                  <span style={{ display:'flex', alignItems:'center', flexShrink:0 }}>
                    {navStepIcon(steps[currentStep].maneuver.type, isHiking, 28)}
                  </span>
                  <div>
                    <div style={{ fontSize:14, fontWeight:600, color:'var(--text-primary)' }}>
                      {navStepLabel(steps[currentStep].maneuver, mode)}
                    </div>
                    {steps[currentStep].name && (
                      <div style={{ fontSize:12, color:'var(--text-secondary)', marginTop:2 }}>
                        onto {steps[currentStep].name}
                      </div>
                    )}
                    <div style={{ fontSize:11, color:'var(--text-muted)', fontFamily:'var(--font-mono)', marginTop:4 }}>
                      {fmtNavDist(steps[currentStep].distance)} · {fmtNavDuration(steps[currentStep].duration)}
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* All steps */}
            <div className="card" style={{ padding:0, flex:1, overflowY:'auto' }}>
              {steps.map((step, i) => {
                const active = i === currentStep;
                return (
                  <div key={i} onClick={() => setCurrentStep(i)}
                    style={{ padding:'9px 12px', cursor:'pointer',
                      background: active ? 'var(--accent-blue-dim)' : 'transparent',
                      borderBottom:'1px solid var(--border)',
                      borderLeft: active ? '3px solid var(--accent-blue)' : '3px solid transparent',
                      transition:'background var(--transition)' }}>
                    <div style={{ display:'flex', gap:8, alignItems:'flex-start' }}>
                      <span style={{ display:'flex', alignItems:'center', justifyContent:'center',
                        minWidth:20, flexShrink:0,
                        color: active ? 'var(--accent-blue)' : 'var(--text-muted)' }}>
                        {navStepIcon(step.maneuver.type, isHiking, 16)}
                      </span>
                      <div style={{ flex:1, minWidth:0 }}>
                        <div style={{ fontSize:12, fontWeight: active ? 600 : 400,
                          color: active ? 'var(--text-primary)' : 'var(--text-secondary)', lineHeight:1.3 }}>
                          {navStepLabel(step.maneuver, mode)}{step.name ? ` — ${step.name}` : ''}
                        </div>
                        <div style={{ fontSize:11, color:'var(--text-muted)', fontFamily:'var(--font-mono)', marginTop:2 }}>
                          {fmtNavDist(step.distance)}
                        </div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
            </div>{/* end nav-directions-panel */}
          </div>
        )}
      </div>

      {/* Save / Rename favorite modal */}
      {(savingFav || renamingFav) && (
        <div style={{ position:'fixed', inset:0, zIndex:3000, background:'rgba(0,0,0,0.6)',
          display:'flex', alignItems:'center', justifyContent:'center' }}
          onClick={e => { if (e.target === e.currentTarget) { setSavingFav(null); setRenamingFav(null); } }}>
          <div style={{ background:'var(--bg-card)', border:'1px solid var(--border-bright)',
            borderRadius:'var(--radius-lg)', padding:24, width:340, boxShadow:'var(--shadow)' }}>
            <div style={{ fontSize:15, fontWeight:600, marginBottom:6 }}>
              {renamingFav ? 'Rename Favorite' : 'Save Favorite'}
            </div>
            <div style={{ fontSize:12, color:'var(--text-muted)', marginBottom:14 }}>
              {renamingFav
                ? `Current name: ${renamingFav.name}`
                : `${savingFav.lat.toFixed(5)}, ${savingFav.lon.toFixed(5)}`}
            </div>
            <input autoFocus value={favNameInput}
              onChange={e => setFavNameInput(e.target.value)}
              onKeyDown={e => {
                if (e.key === 'Enter') confirmSaveFav();
                if (e.key === 'Escape') { setSavingFav(null); setRenamingFav(null); }
              }}
              placeholder="Name this location…"
              style={{ width:'100%', padding:'9px 12px', background:'var(--bg-input)',
                border:'1px solid var(--border)', borderRadius:'var(--radius)',
                color:'var(--text-primary)', fontSize:14, outline:'none', marginBottom:12 }}
            />
            <div style={{ display:'flex', gap:8, justifyContent:'flex-end' }}>
              <button className="btn btn-sm" onClick={() => { setSavingFav(null); setRenamingFav(null); }}>Cancel</button>
              <button className="btn btn-primary btn-sm" onClick={confirmSaveFav}
                disabled={!favNameInput.trim()}>{renamingFav ? 'Rename' : 'Save'}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════
// Scheduler Page
// ═══════════════════════════════════════════════
function SchedulerPage({ nodes, gpsStatus }) {
  const [jobs, setJobs]         = useState([]);
  const [loading, setLoading]   = useState(true);
  const [modal, setModal]       = useState(false);
  const [editId, setEditId]     = useState(null);
  const [delId, setDelId]       = useState(null);
  const [saving, setSaving]     = useState(false);

  // Form state
  const blank = {
    name: '', job_type: 'message', node_id: '', channel: 0,
    message_text: '', gps_lat: '', gps_lon: '', gps_alt: '0',
    schedule_type: 'interval',
    once_dt: '', interval_value: '30', interval_unit: 'minutes',
    daily_time: '08:00', weekly_time: '08:00',
    days_of_week: [false,false,false,false,false,false,false], // Mon–Sun
  };
  const [form, setForm] = useState(blank);

  const load = () => api.get('/api/jobs').then(j => { setJobs(j); setLoading(false); }).catch(() => setLoading(false));
  useEffect(() => { load(); }, []);

  function openNew() {
    const gpsFix = gpsStatus && gpsStatus.fix;
    setForm({
      ...blank,
      gps_lat: gpsFix ? String(gpsFix.latitude.toFixed(6)) : '',
      gps_lon: gpsFix ? String(gpsFix.longitude.toFixed(6)) : '',
      gps_alt: gpsFix ? String(Math.round(gpsFix.altitude || 0)) : '0',
    });
    setEditId(null);
    setModal(true);
  }

  function openEdit(job) {
    const dow = [0,1,2,3,4,5,6].map(i => !!(job.days_of_week & (1<<i)));
    let interval_value = '30', interval_unit = 'minutes';
    if (job.interval_seconds) {
      if (job.interval_seconds % 86400 === 0) { interval_value = String(job.interval_seconds/86400); interval_unit = 'days'; }
      else if (job.interval_seconds % 3600 === 0) { interval_value = String(job.interval_seconds/3600); interval_unit = 'hours'; }
      else { interval_value = String(job.interval_seconds/60); interval_unit = 'minutes'; }
    }
    const todSecs = job.run_at || 0;
    const hh = String(Math.floor(todSecs/3600)).padStart(2,'0');
    const mm = String(Math.floor((todSecs%3600)/60)).padStart(2,'0');
    const timeStr = `${hh}:${mm}`;
    let once_dt = '';
    if (job.schedule_type === 'once' && job.run_at) {
      const d = new Date(job.run_at * 1000);
      once_dt = d.toISOString().slice(0,16);
    }
    setForm({
      name: job.name, job_type: job.job_type,
      node_id: job.node_id || '', channel: job.channel || 0,
      message_text: job.message_text || '',
      gps_lat: job.gps_lat != null ? String(job.gps_lat) : '',
      gps_lon: job.gps_lon != null ? String(job.gps_lon) : '',
      gps_alt: job.gps_alt != null ? String(job.gps_alt) : '0',
      schedule_type: job.schedule_type,
      once_dt, interval_value, interval_unit,
      daily_time: timeStr, weekly_time: timeStr,
      days_of_week: dow,
    });
    setEditId(job.id);
    setModal(true);
  }

  function buildPayload() {
    const f = form;
    let run_at = null, interval_seconds = null, days_of_week = 0;
    if (f.schedule_type === 'once') {
      run_at = f.once_dt ? Math.floor(new Date(f.once_dt).getTime()/1000) : null;
    } else if (f.schedule_type === 'interval') {
      const mult = {minutes:60, hours:3600, days:86400}[f.interval_unit] || 60;
      interval_seconds = parseInt(f.interval_value || 30) * mult;
    } else if (f.schedule_type === 'daily') {
      const [hh, mm] = (f.daily_time || '08:00').split(':').map(Number);
      run_at = hh*3600 + mm*60;
    } else if (f.schedule_type === 'weekly') {
      const [hh, mm] = (f.weekly_time || '08:00').split(':').map(Number);
      run_at = hh*3600 + mm*60;
      f.days_of_week.forEach((checked, i) => { if (checked) days_of_week |= (1<<i); });
    }
    return {
      name: f.name, job_type: f.job_type,
      node_id: f.node_id || null, channel: parseInt(f.channel) || 0,
      message_text: f.job_type === 'message' ? f.message_text : null,
      gps_lat:  f.job_type === 'gps' ? parseFloat(f.gps_lat) || null : null,
      gps_lon:  f.job_type === 'gps' ? parseFloat(f.gps_lon) || null : null,
      gps_alt:  f.job_type === 'gps' ? parseFloat(f.gps_alt) || 0    : null,
      schedule_type: f.schedule_type, run_at, interval_seconds, days_of_week,
      enabled: 1,
    };
  }

  async function saveJob() {
    if (!form.name.trim()) return;
    setSaving(true);
    try {
      const payload = buildPayload();
      if (editId != null) await api.put(`/api/jobs/${editId}`, payload);
      else await api.post('/api/jobs', payload);
      setModal(false);
      load();
    } catch (e) { alert('Save failed'); }
    finally { setSaving(false); }
  }

  async function deleteJob() {
    await api.del(`/api/jobs/${delId}`);
    setDelId(null);
    load();
  }

  async function toggleJob(job) {
    await api.post(`/api/jobs/${job.id}/toggle`);
    load();
  }

  function fmtSchedule(job) {
    const tod = secs => {
      const h = Math.floor(secs/3600), m = Math.floor((secs%3600)/60);
      return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
    };
    const dayNames = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    if (job.schedule_type === 'once') {
      return job.run_at ? `Once — ${new Date(job.run_at*1000).toLocaleString()}` : 'Once';
    } else if (job.schedule_type === 'interval') {
      const s = job.interval_seconds || 0;
      if (s >= 86400 && s%86400===0) return `Every ${s/86400}d`;
      if (s >= 3600  && s%3600===0)  return `Every ${s/3600}h`;
      return `Every ${Math.round(s/60)}m`;
    } else if (job.schedule_type === 'daily') {
      return `Daily @ ${tod(job.run_at || 0)}`;
    } else if (job.schedule_type === 'weekly') {
      const days = dayNames.filter((_,i) => job.days_of_week & (1<<i)).join(', ');
      return `${days || 'No days'} @ ${tod(job.run_at || 0)}`;
    }
    return job.schedule_type;
  }

  function fmtTarget(job) {
    if (!job.node_id) return 'Broadcast';
    const n = nodes.find(x => x.node_id === job.node_id);
    return n ? (n.alias || n.long_name || job.node_id) : job.node_id;
  }

  const F = ({label, children}) => (
    <div style={{marginBottom:12}}>
      <div style={{fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.06em',
        color:'var(--text-muted)',marginBottom:4}}>{label}</div>
      {children}
    </div>
  );
  const inp = {
    style:{width:'100%',padding:'7px 10px',background:'var(--bg-input)',
      border:'1px solid var(--border)',borderRadius:'var(--radius)',
      color:'var(--text-primary)',fontSize:13,outline:'none',boxSizing:'border-box'},
  };
  const setF = (k,v) => setForm(f => ({...f,[k]:v}));

  return (
    <div className="page" style={{padding:20,overflowY:'auto',height:'100%'}}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20,flexWrap:'wrap'}}>
        <div style={{flex:1}}>
          <div style={{fontSize:18,fontWeight:700,color:'var(--text-primary)'}}>Scheduled Jobs</div>
          <div style={{fontSize:12,color:'var(--text-muted)',marginTop:2}}>
            Automate messages and GPS coordinates to mesh nodes
          </div>
        </div>
        <button className="btn btn-primary" onClick={openNew}>+ New Job</button>
      </div>

      {/* Job list */}
      {loading ? (
        <div style={{color:'var(--text-muted)',fontSize:13}}>Loading…</div>
      ) : jobs.length === 0 ? (
        <div className="card" style={{padding:32,textAlign:'center',color:'var(--text-muted)'}}>
          <div style={{fontSize:32,marginBottom:8}}>🗓</div>
          <div style={{fontSize:14,fontWeight:600,marginBottom:4}}>No scheduled jobs yet</div>
          <div style={{fontSize:12}}>Click <strong>+ New Job</strong> to automate a message or GPS broadcast.</div>
        </div>
      ) : (
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {jobs.map(job => (
            <div key={job.id} className="card" style={{
              padding:'12px 16px',display:'flex',gap:14,alignItems:'center',flexWrap:'wrap',
              opacity: job.enabled ? 1 : 0.55,
            }}>
              {/* Type badge */}
              <div style={{
                fontSize:10,fontWeight:700,letterSpacing:'0.08em',padding:'3px 8px',
                borderRadius:4,flexShrink:0,
                background: job.job_type==='message' ? 'var(--accent-blue-dim)' : 'var(--accent-green-dim)',
                color: job.job_type==='message' ? 'var(--accent-blue)' : 'var(--accent-green)',
              }}>{job.job_type.toUpperCase()}</div>

              {/* Name + details */}
              <div style={{flex:1,minWidth:160}}>
                <div style={{fontSize:14,fontWeight:600,color:'var(--text-primary)'}}>{job.name}</div>
                <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2,display:'flex',gap:10,flexWrap:'wrap'}}>
                  <span>→ {fmtTarget(job)}</span>
                  {job.job_type==='message' && job.channel > 0 && <span>ch {job.channel}</span>}
                  {job.job_type==='message' && <span style={{fontStyle:'italic',maxWidth:240,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                    "{job.message_text}"</span>}
                  {job.job_type==='gps' && <span>{job.gps_lat?.toFixed(5)}, {job.gps_lon?.toFixed(5)}</span>}
                </div>
              </div>

              {/* Schedule */}
              <div style={{minWidth:140,fontSize:12,color:'var(--text-secondary)',fontFamily:'var(--font-mono)'}}>
                {fmtSchedule(job)}
              </div>

              {/* Run info */}
              <div style={{fontSize:11,color:'var(--text-muted)',minWidth:100,fontFamily:'var(--font-mono)'}}>
                <div>Runs: {job.run_count}</div>
                {job.last_run && <div>Last: {timeAgo(job.last_run)}</div>}
                {job.enabled && job.next_run && <div style={{color:'var(--accent-amber)'}}>
                  Next: {timeAgo(job.next_run - Math.floor(Date.now()/1000) < 0
                    ? job.next_run : job.next_run)}
                </div>}
              </div>

              {/* Controls */}
              <div style={{display:'flex',gap:6,flexShrink:0}}>
                <button className="btn btn-sm" onClick={() => toggleJob(job)}
                  style={{
                    background: job.enabled ? 'var(--accent-green-dim)' : '',
                    color: job.enabled ? 'var(--accent-green)' : '',
                    borderColor: job.enabled ? 'var(--accent-green)' : '',
                    fontSize:11,
                  }}>
                  {job.enabled ? 'On' : 'Off'}
                </button>
                <button className="btn btn-sm" onClick={() => openEdit(job)} style={{fontSize:11}}>Edit</button>
                <button className="btn btn-sm" onClick={() => setDelId(job.id)}
                  style={{color:'var(--accent-red)',borderColor:'var(--accent-red)',fontSize:11}}>Del</button>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Create / Edit modal */}
      {modal && (
        <div style={{position:'fixed',inset:0,zIndex:3000,background:'rgba(0,0,0,0.65)',
          display:'flex',alignItems:'center',justifyContent:'center',padding:16}}
          onClick={e => { if(e.target===e.currentTarget) setModal(false); }}>
          <div style={{background:'var(--bg-card)',border:'1px solid var(--border-bright)',
            borderRadius:'var(--radius-lg)',padding:24,width:'100%',maxWidth:480,
            maxHeight:'90vh',overflowY:'auto',boxShadow:'var(--shadow)'}}>
            <div style={{fontSize:16,fontWeight:700,marginBottom:16}}>
              {editId!=null ? 'Edit Job' : 'New Scheduled Job'}
            </div>

            <F label="Job Name">
              <input {...inp} value={form.name}
                onChange={e=>setF('name',e.target.value)} placeholder="e.g. Morning check-in"/>
            </F>

            <F label="Job Type">
              <div style={{display:'flex',gap:8}}>
                {['message','gps'].map(t => (
                  <button key={t} onClick={()=>setF('job_type',t)}
                    className={`btn btn-sm${form.job_type===t?' btn-primary':''}`}
                    style={{flex:1,textTransform:'capitalize'}}>{t==='gps'?'GPS Coordinates':'Message'}</button>
                ))}
              </div>
            </F>

            <F label="Target Node">
              <select {...inp} value={form.node_id} onChange={e=>setF('node_id',e.target.value)}>
                <option value="">Broadcast (all nodes)</option>
                {nodes.map(n => (
                  <option key={n.node_id} value={n.node_id}>
                    {n.alias || n.long_name || n.node_id}
                  </option>
                ))}
              </select>
            </F>

            {form.job_type === 'message' && (<>
              <F label="Channel">
                <input {...inp} type="number" min="0" max="7" value={form.channel}
                  onChange={e=>setF('channel',e.target.value)} placeholder="0"/>
              </F>
              <F label="Message Text">
                <textarea {...inp} rows={3} value={form.message_text}
                  onChange={e=>setF('message_text',e.target.value)}
                  placeholder="Message to send…"
                  style={{...inp.style,resize:'vertical'}}/>
              </F>
            </>)}

            {form.job_type === 'gps' && (<>
              <div style={{display:'flex',gap:8,marginBottom:12}}>
                <F label="Latitude" style={{flex:1}}>
                  <input {...inp} value={form.gps_lat}
                    onChange={e=>setF('gps_lat',e.target.value)} placeholder="38.8977"/>
                </F>
                <F label="Longitude" style={{flex:1}}>
                  <input {...inp} value={form.gps_lon}
                    onChange={e=>setF('gps_lon',e.target.value)} placeholder="-77.0365"/>
                </F>
                <F label="Alt (m)" style={{flex:1}}>
                  <input {...inp} value={form.gps_alt}
                    onChange={e=>setF('gps_alt',e.target.value)} placeholder="0"/>
                </F>
              </div>
              {gpsStatus && gpsStatus.fix && (
                <button className="btn btn-sm" style={{marginBottom:12,fontSize:11}}
                  onClick={()=>setForm(f=>({...f,
                    gps_lat:gpsStatus.fix.latitude.toFixed(6),
                    gps_lon:gpsStatus.fix.longitude.toFixed(6),
                    gps_alt:String(Math.round(gpsStatus.fix.altitude||0))}))}>
                  📍 Use Current GPS Position
                </button>
              )}
            </>)}

            <F label="Schedule Type">
              <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                {[['once','One Time'],['interval','Repeating'],['daily','Daily'],['weekly','Weekly']].map(([v,l])=>(
                  <button key={v} onClick={()=>setF('schedule_type',v)}
                    className={`btn btn-sm${form.schedule_type===v?' btn-primary':''}`}>{l}</button>
                ))}
              </div>
            </F>

            {form.schedule_type === 'once' && (
              <F label="Date & Time">
                <input {...inp} type="datetime-local" value={form.once_dt}
                  onChange={e=>setF('once_dt',e.target.value)}/>
              </F>
            )}

            {form.schedule_type === 'interval' && (
              <F label="Repeat Every">
                <div style={{display:'flex',gap:8}}>
                  <input {...inp} type="number" min="1" value={form.interval_value}
                    onChange={e=>setF('interval_value',e.target.value)}
                    style={{...inp.style,width:80}}/>
                  <select {...inp} value={form.interval_unit}
                    onChange={e=>setF('interval_unit',e.target.value)}
                    style={{...inp.style,flex:1}}>
                    <option value="minutes">Minutes</option>
                    <option value="hours">Hours</option>
                    <option value="days">Days</option>
                  </select>
                </div>
              </F>
            )}

            {form.schedule_type === 'daily' && (
              <F label="Time of Day">
                <input {...inp} type="time" value={form.daily_time}
                  onChange={e=>setF('daily_time',e.target.value)}/>
              </F>
            )}

            {form.schedule_type === 'weekly' && (<>
              <F label="Days of Week">
                <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                  {['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map((d,i)=>(
                    <button key={i} onClick={()=>setForm(f=>{
                      const dow=[...f.days_of_week]; dow[i]=!dow[i]; return {...f,days_of_week:dow};
                    })} className="btn btn-sm"
                      style={{
                        background: form.days_of_week[i] ? 'var(--accent-blue)' : '',
                        color: form.days_of_week[i] ? '#fff' : '',
                        borderColor: form.days_of_week[i] ? 'var(--accent-blue)' : '',
                      }}>{d}</button>
                  ))}
                </div>
              </F>
              <F label="Time of Day">
                <input {...inp} type="time" value={form.weekly_time}
                  onChange={e=>setF('weekly_time',e.target.value)}/>
              </F>
            </>)}

            <div style={{display:'flex',gap:8,marginTop:20,justifyContent:'flex-end'}}>
              <button className="btn btn-sm" onClick={()=>setModal(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={saveJob} disabled={saving||!form.name.trim()}>
                {saving ? 'Saving…' : editId!=null ? 'Save Changes' : 'Create Job'}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Delete confirmation */}
      {delId != null && (
        <div style={{position:'fixed',inset:0,zIndex:3000,background:'rgba(0,0,0,0.65)',
          display:'flex',alignItems:'center',justifyContent:'center'}}
          onClick={e=>{if(e.target===e.currentTarget)setDelId(null);}}>
          <div style={{background:'var(--bg-card)',border:'1px solid var(--border-bright)',
            borderRadius:'var(--radius-lg)',padding:24,width:320,boxShadow:'var(--shadow)'}}>
            <div style={{fontWeight:700,fontSize:15,marginBottom:8}}>Delete Job?</div>
            <div style={{fontSize:13,color:'var(--text-muted)',marginBottom:20}}>
              This job and all its settings will be permanently deleted.
            </div>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button className="btn btn-sm" onClick={()=>setDelId(null)}>Cancel</button>
              <button className="btn btn-sm" onClick={deleteJob}
                style={{background:'var(--accent-red)',color:'#fff',border:'none'}}>Delete</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// Top Bar Clock

function TopBarClock() {
  const { timezone } = useSettings();
  const [now, setNow] = useState(new Date());
  useEffect(() => {
    const t = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(t);
  }, []);
  const tz = resolveTz(timezone);
  const timeStr = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit', timeZone: tz});
  const dateStr = now.toLocaleDateString([], {weekday:'short', month:'short', day:'numeric', timeZone: tz});
  return (
    <div className="top-bar-clock hide-mobile">
      <span className="clock-time">{timeStr}</span>
      <span className="clock-date">{dateStr}</span>
    </div>
  );
}
