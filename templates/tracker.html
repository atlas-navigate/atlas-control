<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#0a0e17"/>
<title>Atlas Tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0e17; --card: #141822; --border: #1e2535;
    --text: #e2e8f0; --muted: #64748b; --accent: #00e5a0;
    --red: #ef4444; --amber: #f59e0b; --blue: #3b82f6;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100dvh; display: flex; flex-direction: column; }
  h1 { font-size: 20px; font-weight: 700; color: var(--accent); }
  .header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .logo { width: 36px; height: 36px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #0a0e17; font-size: 16px; flex-shrink: 0; }
  .content { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 16px; max-width: 480px; margin: 0 auto; width: 100%; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 6px; }
  input[type=text] { width: 100%; background: #0f1520; border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; font-size: 16px; color: var(--text); outline: none; }
  input[type=text]:focus { border-color: var(--accent); }
  .btn { width: 100%; padding: 16px; border-radius: 10px; border: none; font-size: 17px; font-weight: 700; cursor: pointer; transition: opacity .15s; }
  .btn:active { opacity: .75; }
  .btn-primary { background: var(--accent); color: #0a0e17; }
  .btn-stop { background: var(--red); color: #fff; }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .status-row { display: flex; align-items: center; gap: 10px; font-size: 14px; }
  .metric { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .metric:last-child { border-bottom: none; }
  .metric-val { font-family: 'Courier New', monospace; font-size: 14px; color: var(--accent); }
  .color-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .color-swatch { width: 36px; height: 36px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; transition: transform .1s; }
  .color-swatch.selected { border-color: #fff; transform: scale(1.15); }
  .url-box { background: #0f1520; border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: 13px; font-family: monospace; color: var(--accent); word-break: break-all; margin-top: 8px; }
  .error-msg { color: var(--red); font-size: 13px; margin-top: 6px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">A</div>
  <h1>Atlas Tracker</h1>
</div>

<div class="content">

  <!-- Share URL -->
  <div class="card">
    <label>Share this link with teammates</label>
    <div class="url-box" id="share-url"></div>
  </div>

  <!-- Setup -->
  <div class="card" id="setup-card">
    <div style="margin-bottom:16px">
      <label>Your Name / Callsign</label>
      <input type="text" id="name-input" placeholder="e.g. Alpha-1" maxlength="30" autocomplete="off"/>
      <div class="error-msg" id="name-error" style="display:none">Please enter a name.</div>
    </div>
    <div style="margin-bottom:20px">
      <label>Marker Color</label>
      <div class="color-row" id="color-row"></div>
    </div>
    <button class="btn btn-primary" onclick="startTracking()">Start Tracking</button>
  </div>

  <!-- Active status -->
  <div class="card" id="status-card" style="display:none">
    <div class="status-row" style="margin-bottom:16px">
      <span class="status-dot" id="status-dot" style="background:var(--amber)"></span>
      <span id="status-text" style="font-weight:600">Acquiring GPS…</span>
    </div>
    <div>
      <div class="metric"><span>Latitude</span><span class="metric-val" id="m-lat">—</span></div>
      <div class="metric"><span>Longitude</span><span class="metric-val" id="m-lon">—</span></div>
      <div class="metric"><span>Accuracy</span><span class="metric-val" id="m-acc">—</span></div>
      <div class="metric"><span>Altitude</span><span class="metric-val" id="m-alt">—</span></div>
      <div class="metric"><span>Speed</span><span class="metric-val" id="m-spd">—</span></div>
      <div class="metric"><span>Battery</span><span class="metric-val" id="m-bat">—</span></div>
      <div class="metric"><span>Last sent</span><span class="metric-val" id="m-last">—</span></div>
    </div>
    <div style="margin-top:16px">
      <button class="btn btn-stop" onclick="stopTracking()">Stop Tracking</button>
    </div>
  </div>

</div>

<script>
const COLORS = ['#3b82f6','#00e5a0','#f59e0b','#ef4444','#a78bfa','#22d3ee','#ec4899','#84cc16'];
let selectedColor = COLORS[0];
let watchId = null;
let sendInterval = null;
let lastPos = null;
let deviceId = null;
let battery = null;

// Color swatches
const colorRow = document.getElementById('color-row');
COLORS.forEach(c => {
  const s = document.createElement('div');
  s.className = 'color-swatch' + (c === selectedColor ? ' selected' : '');
  s.style.background = c;
  s.onclick = () => {
    selectedColor = c;
    document.querySelectorAll('.color-swatch').forEach(el => el.classList.remove('selected'));
    s.classList.add('selected');
  };
  colorRow.appendChild(s);
});

// Show the friendly URL — always use the current origin so it's always correct
document.getElementById('share-url').textContent = window.location.origin + '/tracker';

// Persistent device ID
deviceId = localStorage.getItem('trackerDeviceId');
if (!deviceId) {
  deviceId = 'ph-' + Math.random().toString(36).slice(2,10) + Date.now().toString(36);
  localStorage.setItem('trackerDeviceId', deviceId);
}

// Restore saved name/color
const savedName = localStorage.getItem('trackerName');
if (savedName) document.getElementById('name-input').value = savedName;
const savedColor = localStorage.getItem('trackerColor');
if (savedColor && COLORS.includes(savedColor)) {
  selectedColor = savedColor;
  document.querySelectorAll('.color-swatch').forEach((el, i) => {
    el.classList.toggle('selected', COLORS[i] === savedColor);
  });
}

// Battery API
if (navigator.getBattery) {
  navigator.getBattery().then(b => {
    battery = b.level;
    b.addEventListener('levelchange', () => { battery = b.level; });
  });
}

function startTracking() {
  const name = document.getElementById('name-input').value.trim();
  if (!name) { document.getElementById('name-error').style.display = 'block'; return; }
  document.getElementById('name-error').style.display = 'none';
  localStorage.setItem('trackerName', name);
  localStorage.setItem('trackerColor', selectedColor);

  document.getElementById('setup-card').style.display = 'none';
  document.getElementById('status-card').style.display = 'block';

  watchId = navigator.geolocation.watchPosition(onPosition, onGpsError, {
    enableHighAccuracy: true, maximumAge: 5000, timeout: 15000,
  });

  sendInterval = setInterval(sendCheckin, 5000);
}

function stopTracking() {
  if (watchId != null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
  if (sendInterval) { clearInterval(sendInterval); sendInterval = null; }
  lastPos = null;
  document.getElementById('setup-card').style.display = 'block';
  document.getElementById('status-card').style.display = 'none';
}

function onPosition(pos) {
  lastPos = pos;
  const c = pos.coords;
  document.getElementById('m-lat').textContent = c.latitude.toFixed(6);
  document.getElementById('m-lon').textContent = c.longitude.toFixed(6);
  document.getElementById('m-acc').textContent = c.accuracy != null ? Math.round(c.accuracy) + ' m' : '—';
  document.getElementById('m-alt').textContent = c.altitude != null ? Math.round(c.altitude) + ' m' : '—';
  document.getElementById('m-spd').textContent = c.speed != null ? (c.speed * 3.6).toFixed(1) + ' km/h' : '—';
  setStatus('ok', 'Tracking — GPS locked');
  sendCheckin();
}

function onGpsError(err) {
  setStatus('error', 'GPS error: ' + err.message);
}

function setStatus(state, msg) {
  document.getElementById('status-text').textContent = msg;
  document.getElementById('status-dot').style.background =
    state === 'ok' ? 'var(--accent)' : state === 'error' ? 'var(--red)' : 'var(--amber)';
}

async function sendCheckin() {
  if (!lastPos) return;
  const name = localStorage.getItem('trackerName') || 'Unknown';
  const c = lastPos.coords;
  if (battery != null) document.getElementById('m-bat').textContent = Math.round(battery * 100) + '%';
  try {
    await fetch('/api/tracker/checkin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        device_id: deviceId, name, color: selectedColor,
        latitude: c.latitude, longitude: c.longitude,
        accuracy: c.accuracy, altitude: c.altitude,
        speed: c.speed, heading: c.heading, battery,
      }),
    });
    document.getElementById('m-last').textContent = new Date().toLocaleTimeString();
  } catch(e) {
    setStatus('error', 'Send failed — check network');
  }
}

if (navigator.wakeLock) navigator.wakeLock.request('screen').catch(() => {});
</script>
</body>
</html>
