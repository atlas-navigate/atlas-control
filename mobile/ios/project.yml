name: AtlasMobile
options:
  deploymentTarget:
    iOS: "17.0"
  bundleIdPrefix: com.atlascontrol
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    DEVELOPMENT_TEAM: ""
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_PREVIEWS: YES

targets:
  AtlasMobile:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AtlasMobile
        excludes:
          - "**/*.md"
          # Stray root-level images live inside Assets.xcassets; the
          # top-level copy is unused and would otherwise be copied into the
          # bundle as a duplicate.
          - "*.png"
    # Info.plist is hand-written at AtlasMobile/Info.plist (referenced via
    # INFOPLIST_FILE below).  Do NOT add an `info:` block here — xcodegen
    # would regenerate Info.plist on every run and drop keys like
    # UISupportedInterfaceOrientations / CFBundleDisplayName.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.atlascontrol.mobile
        INFOPLIST_FILE: AtlasMobile/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0.0"
        ENABLE_BITCODE: NO
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        # WKWebView + iOS 17 crash if mixed-content blocking is left at default
        # for self-signed local hosts.  We allow it explicitly in Info.plist
        # via NSAllowsLocalNetworking + NSAllowsArbitraryLoadsInWebContent.
    dependencies:
      - sdk: CoreBluetooth.framework
      - sdk: NetworkExtension.framework
      - sdk: WebKit.framework
      - sdk: UserNotifications.framework
      - sdk: CoreLocation.framework
      - sdk: Network.framework

    # Entitlements file is hand-written at AtlasMobile/AtlasMobile.entitlements
    # (with comments explaining each capability).  Omitting `properties:`
    # here means xcodegen only wires up CODE_SIGN_ENTITLEMENTS and leaves
    # the file alone.
    entitlements:
      path: AtlasMobile/AtlasMobile.entitlements
