# WebSocket upgrade map
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Rate-limit zones (burst allows a small spike; nodelay serves it immediately)
# api: the dashboard polls ~6 endpoints every refresh AND the mobile apps run
# their own background polling from the same phone IP — at the old 60r/m one
# client exhausted the bucket seconds after connecting, nginx 503'd /api/*,
# and the apps' /api/device recovery probes were throttled too, so a healthy
# Atlas looked "unreachable" (iOS connect-then-drop bug). 10r/s fits the real
# steady-state comfortably while still smothering an abusive client.
limit_req_zone  $binary_remote_addr  zone=api:10m     rate=10r/s;
limit_req_zone  $binary_remote_addr  zone=ai:10m      rate=10r/m;
limit_req_zone  $binary_remote_addr  zone=connect:10m rate=10r/m;
limit_conn_zone $binary_remote_addr  zone=perip:10m;

# Hide nginx version from Server header
server_tokens off;

# Redirect plain HTTP → HTTPS
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS — proxy to Flask on 127.0.0.1:5000
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name atlas atlas.local _;

    ssl_certificate     /etc/ssl/atlas/cert.pem;
    ssl_certificate_key /etc/ssl/atlas/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Max upload size — 4 MB is enough for all API payloads
    client_max_body_size 4M;
    # Per-IP connection cap. Must clear one phone's worst case: a WebView
    # loading tiles in parallel plus the native app's 16-wide discovery
    # probe fan-out — 20 rejected recovery probes mid-session.
    limit_conn perip 64;

    # Security headers (added here at the proxy level for all responses)
    add_header X-Frame-Options          "DENY"            always;
    add_header X-Content-Type-Options   "nosniff"         always;
    add_header X-XSS-Protection         "1; mode=block"   always;
    add_header Referrer-Policy          "no-referrer"     always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Compress text-heavy responses. The compiled JSX bundle, vendor JS, JSON
    # API payloads, and SVG/CSS shrink dramatically and shave seconds off
    # cold loads over the Atlas hotspot.
    gzip                on;
    gzip_vary           on;
    gzip_min_length     1024;
    gzip_comp_level     5;
    gzip_proxied        any;
    gzip_types          text/plain text/css text/javascript text/xml
                        application/javascript application/json application/xml
                        application/xml+rss application/x-javascript
                        image/svg+xml application/manifest+json
                        application/vnd.api+json application/geo+json
                        application/wasm font/ttf font/otf;

    # Bypass Flask for /static/* — the compiled JSX bundle, fonts, and vendor
    # libraries are pure files on disk. Sending them through Werkzeug means
    # every page load wakes a Python worker for a 470 KB asset.
    location /static/app.compiled.js {
        alias /atlas_data/atlas-control/static/app.compiled.js;
        add_header Cache-Control "public, max-age=300, must-revalidate";
        # 5-minute cache forces a refresh on app updates without aggressive
        # cache-busting URLs.
    }

    location /static/vendor/ {
        alias /atlas_data/atlas-control/static/vendor/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    location /static/fonts/ {
        alias /atlas_data/atlas-control/static/fonts/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    location /static/img/ {
        alias /atlas_data/atlas-control/static/img/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    location /static/data/ {
        alias /atlas_data/atlas-control/static/data/;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    # ── Tile serving — bypass Flask for maximum throughput ───────────────────
    location /tiles/topo/ {
        root /atlas_data/atlas-control/static;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri /tiles/transparent.png;
    }

    location = /tiles/topo.pmtiles {
        root /atlas_data/atlas-control/static;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        add_header Accept-Ranges bytes;
    }

    location = /tiles/map.pmtiles {
        root /atlas_data/atlas-control/static;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        add_header Accept-Ranges bytes;
    }

    location /tiles/ {
        root /atlas_data/atlas-control/static;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # SSE / AI streaming — tight rate limit, no buffering (hits Ollama)
    location ~ ^/api/ai/chats/[0-9]+/stream$ {
        limit_req zone=ai burst=5 nodelay;
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
        proxy_connect_timeout 10s;
    }

    # Nav routing — long-haul multi-state routes can cold-start several OSRM
    # regions in series (routing_node.py waits up to 120s per region), so the
    # default 30s /api/ timeout below would 504 before the backend even
    # finishes. Matches the frontend's 600s timeout for this endpoint.
    location /api/nav/route {
        limit_req zone=api burst=100 nodelay;
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 600s;
        proxy_connect_timeout 10s;
    }

    # POST here drives the identical start_navigation() -> routing_node.route()
    # multi-state cold-start path as /api/nav/route above, so it needs the same
    # timeout headroom (GET/DELETE on this path are cheap; the longer timeout
    # doesn't slow them down, it just raises the ceiling).
    location /api/nav/navigate {
        limit_req zone=api burst=100 nodelay;
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 600s;
        proxy_connect_timeout 10s;
    }

    # AI status / CRUD — normal rate limit (no Ollama calls)
    location /api/ai/ {
        limit_req zone=api burst=100 nodelay;
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # WiFi/hotspot connect endpoints — tight rate limit
    location ~ ^/api/(wifi/connect|hotspot/start|hotspot/config) {
        limit_req zone=connect burst=3 nodelay;
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 40s;
        proxy_connect_timeout 10s;
    }

    # General API — moderate rate limit
    location /api/ {
        limit_req zone=api burst=100 nodelay;
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # Main app + WebSocket / Socket.IO
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
        proxy_connect_timeout 10s;
    }
}
